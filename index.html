    cv.width=300; cv.height=120;       // 고해상도 (#1 가독성)
    var ctx=cv.getContext('2d');
    var tex=new THREE.CanvasTexture(cv);
    tex.minFilter=THREE.LinearFilter;
    var mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false,depthWrite:false});
    var sp=new THREE.Sprite(mat);
    sp.scale.set(300*0.0072, 120*0.0072, 1);  // 월드 크기 약간 키움
    sp.position.set(pos.x, pos.y+0.85, pos.z);
    sp.renderOrder=1000;
    sp.visible=_labelsVisible;
    _scene.add(sp);
    var rec={sprite:sp, tex:tex, ctx:ctx, cv:cv, model:model, iss:iss, vPot:(vPot||0),
             ends:ends||null, last:null};
    _wireLabels.push(rec);
    _drawWireLabel(rec, model?Math.abs(model.iinf):iss);  // 초기(정지) 표시
  }
  function _drawWireLabel(rec, A){
    var iTxt='I = '+_fmtCurShort(A);
    var vTxt='V = '+_fmtVoltShort(rec.vPot);
    var key=iTxt+'|'+vTxt;
    if(rec.last===key) return;     // 변화 없으면 스킵(텍스처 재업로드 절약)
    rec.last=key;
    var ctx=rec.ctx, W=rec.cv.width, H=rec.cv.height;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='rgba(8,16,30,0.85)';
    _roundRect(ctx,0,0,W,H,16); ctx.fill();
    ctx.strokeStyle='rgba(120,180,230,0.55)'; ctx.lineWidth=3;
    _roundRect(ctx,1.5,1.5,W-3,H-3,15); ctx.stroke();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    /* 전류 I (위, 황색) — #1 색 구분·큰 폰트 */
    ctx.font='700 44px monospace'; ctx.fillStyle='#ffd24a';
    ctx.fillText(iTxt, W/2, H*0.30);
    /* 전위 V (아래, 청록색 — 높이=전압 강조) */
    ctx.font='700 42px monospace'; ctx.fillStyle='#5fe0c0';
    ctx.fillText(vTxt, W/2, H*0.72);
    rec.tex.needsUpdate=true;
  }
  function _updateLabels(){
    /* 도선 전류 I(t)·전위 V(t) 라벨 갱신 (#3·#4) */
    var t=_physT();
    var tt=_playing?t:0;
    _wireLabels.forEach(function(rec){
      var A;
      if(_playing){
        A=rec.model?_branchCurrentModel(rec.model,t):rec.iss;
      } else {
        A=rec.model?rec.model.i0:rec.iss;   // 정지(초기) 상태
      }
      /* 시변 전위: 양 끝 포트 전위 평균을 최저전위 기준 0V로 환산 */
      if(rec.ends){
        var vA=_portVt(rec.ends.from,rec.ends.fromPort,tt);
        var vB=_portVt(rec.ends.to,rec.ends.toPort,tt);
        rec.vPot=(vA+vB)/2 - _vMin;
      }
      _drawWireLabel(rec, Math.abs(A));
    });
    /* 소자 실시간 물리량 라벨 갱신 (#2) — 저항 전력·축전기 전하·인덕터 자속쇄교수 */
    _labelSprites.forEach(function(L){
      if(L.rec && L.rec.hasMetric) _drawCompLabel(L.rec, tt);
    });
  }

  /* ════════ 카메라 ════════ */
  function _applyCamera(){
    var x=_cam.tx+_cam.dist*Math.cos(_cam.el)*Math.cos(_cam.az);
    var y=_cam.ty+_cam.dist*Math.sin(_cam.el);
    var z=_cam.tz+_cam.dist*Math.cos(_cam.el)*Math.sin(_cam.az);
    _camera.position.set(x,y,z);
    _camera.lookAt(_cam.tx,_cam.ty,_cam.tz);
  }

  /* ════════ 루프 ════════ */
  function _loop(ts){
    var dt=Math.min((ts-(_lastTs||ts))/1000,0.05);
    _lastTs=ts;
    if(_playing) _simTime+=dt;
    _updateFrame(dt);
    _applyCamera();
    _renderer.render(_scene,_camera);
    _updateControls();
    _raf=requestAnimationFrame(_loop);
  }

  /* ════════ 입력(카메라 제어) ════════
   *   PC : 휠=줌, 좌클릭 드래그=위치이동(pan), 우클릭 드래그=시점각도(orbit)
   *   모바일: 핀치=줌, 1손가락 스와이프=위치이동(pan), 2손가락 스와이프=시점각도(orbit)
   *   pan 은 카메라 우(right)·상(up) 벡터 평면에서 타겟점(tx,ty,tz)을 이동. */
  function _camPan(dxPix, dyPix){
    /* 화면 픽셀 이동량 → 월드 이동량. 거리에 비례해 자연스러운 속도. */
    var scale=_cam.dist*0.0016;
    /* forward 방향(카메라가 바라보는 방향, 타겟 기준 단위벡터) */
    var ce=Math.cos(_cam.el), se=Math.sin(_cam.el);
    var ca=Math.cos(_cam.az), sa=Math.sin(_cam.az);
    var fx=-ce*ca, fy=-se, fz=-ce*sa;
    /* right = normalize(cross(forward, worldUp)), worldUp=(0,1,0)
     *   cross(f,(0,1,0)) = (fz, 0, -fx) */
    var rx=fz, ry=0, rz=-fx;
    var rl=Math.hypot(rx,ry,rz)||1; rx/=rl; ry/=rl; rz/=rl;
    /* camUp = cross(right, forward) */
    var ux=ry*fz - rz*fy;
    var uy=rz*fx - rx*fz;
    var uz=rx*fy - ry*fx;
    var ul=Math.hypot(ux,uy,uz)||1; ux/=ul; uy/=ul; uz/=ul;
    /* 끄는 방향으로 장면이 이동(타겟이 같은 방향으로 이동) */
    _cam.tx += (rx*dxPix - ux*dyPix)*scale;
    _cam.ty += (ry*dxPix - uy*dyPix)*scale;
    _cam.tz += (rz*dxPix - uz*dyPix)*scale;
  }
  function _camOrbit(dxPix, dyPix){
    _cam.az -= dxPix*0.008;
    _cam.el = _clamp(_cam.el + dyPix*0.006, 0.08, 1.45);
  }
  function _camZoom(factor){
    _cam.dist=_clamp(_cam.dist*factor, 8, 120);
  }

  function _bindOrbit(){
    /* ── 마우스(PC) ── */
    var mDown=false, mBtn=0, lx=0, ly=0;
    function pd(e){
      /* 터치는 별도 핸들러(아래)에서 처리 — pointerType==='touch' 무시 */
      if(e.pointerType==='touch') return;
      mDown=true; mBtn=e.button; lx=e.clientX; ly=e.clientY;
      e.stopPropagation();
    }
    function pm(e){
      if(e.pointerType==='touch') return;
      if(!mDown) return;
      var dx=e.clientX-lx, dy=e.clientY-ly;
      if(mBtn===2){           /* 우클릭 드래그 → 시점각도 */
        _camOrbit(dx,dy);
      } else {                /* 좌클릭 드래그 → 위치이동 */
        _camPan(dx,dy);
      }
      lx=e.clientX; ly=e.clientY; e.stopPropagation();
    }
    function pu(e){ if(e&&e.pointerType==='touch') return; mDown=false; }
    function wh(e){ _camZoom(e.deltaY>0?1.08:0.92); e.preventDefault(); e.stopPropagation(); }
    /* 우클릭 메뉴 차단(우클릭 드래그를 시점각도로 쓰므로) */
    function ctx(e){ e.preventDefault(); return false; }

    /* ── 터치(모바일) ── */
    var touches={};        // id → {x,y}
    var pinchPrevDist=0, twoPrevMidX=0, twoPrevMidY=0;
    function activeTouchIds(){ return Object.keys(touches); }
    function td(e){
      if(e.pointerType!=='touch') return;
      touches[e.pointerId]={x:e.clientX,y:e.clientY};
      var ids=activeTouchIds();
      if(ids.length===2){
        var a=touches[ids[0]], b=touches[ids[1]];
        pinchPrevDist=Math.hypot(a.x-b.x,a.y-b.y);
        twoPrevMidX=(a.x+b.x)/2; twoPrevMidY=(a.y+b.y)/2;
      }
      e.stopPropagation();
    }
    function tm(e){
      if(e.pointerType!=='touch') return;
      if(!touches[e.pointerId]) return;
      var prev=touches[e.pointerId];
      var dx=e.clientX-prev.x, dy=e.clientY-prev.y;
      touches[e.pointerId]={x:e.clientX,y:e.clientY};
      var ids=activeTouchIds();
      if(ids.length===1){
        /* 1손가락 스와이프 → 위치이동(pan) */
        _camPan(dx,dy);
      } else if(ids.length>=2){
        var a=touches[ids[0]], b=touches[ids[1]];
        var dist=Math.hypot(a.x-b.x,a.y-b.y);
        var midX=(a.x+b.x)/2, midY=(a.y+b.y)/2;
        /* 핀치 줌 */
        if(pinchPrevDist>0){
          var ratio=pinchPrevDist/dist;   // 벌리면 dist↑ → ratio<1 → 확대
          _camZoom(_clamp(ratio,0.5,2));
        }
        /* 2손가락 스와이프(중심 이동) → 시점각도(orbit) */
        _camOrbit(midX-twoPrevMidX, midY-twoPrevMidY);
        pinchPrevDist=dist; twoPrevMidX=midX; twoPrevMidY=midY;
      }
      e.stopPropagation();
    }
    function tu(e){
      if(e.pointerType!=='touch') return;
      delete touches[e.pointerId];
      var ids=activeTouchIds();
      if(ids.length===2){
        var a=touches[ids[0]], b=touches[ids[1]];
        pinchPrevDist=Math.hypot(a.x-b.x,a.y-b.y);
        twoPrevMidX=(a.x+b.x)/2; twoPrevMidY=(a.y+b.y)/2;
      } else {
        pinchPrevDist=0;
      }
    }

    _cv.addEventListener('pointerdown',pd);
    window.addEventListener('pointermove',pm);
    window.addEventListener('pointerup',pu);
    _cv.addEventListener('wheel',wh,{passive:false});
    _cv.addEventListener('contextmenu',ctx);
    _cv.addEventListener('pointerdown',td);
    window.addEventListener('pointermove',tm);
    window.addEventListener('pointerup',tu);
    window.addEventListener('pointercancel',tu);
    _orbit={pd:pd,pm:pm,pu:pu,wh:wh,ctx:ctx,td:td,tm:tm,tu:tu};
  }
  function _unbindOrbit(){
    if(!_orbit)return;
    _cv.removeEventListener('pointerdown',_orbit.pd);
    window.removeEventListener('pointermove',_orbit.pm);
    window.removeEventListener('pointerup',_orbit.pu);
    _cv.removeEventListener('wheel',_orbit.wh);
    _cv.removeEventListener('contextmenu',_orbit.ctx);
    _cv.removeEventListener('pointerdown',_orbit.td);
    window.removeEventListener('pointermove',_orbit.tm);
    window.removeEventListener('pointerup',_orbit.tu);
    window.removeEventListener('pointercancel',_orbit.tu);
    _orbit=null;
  }

  function _updateControls(){
    var btn=document.getElementById('analogy-play-btn');
    if(btn){
      if(_playing){
        btn.textContent='■';
        btn.style.background='#3a1a10';btn.style.borderColor='#7a3020';btn.style.color='#f09070';
        btn.title='정지 (초기화)';
      } else {
        btn.textContent='▶';
        btn.style.background='#13351c';btn.style.borderColor='#2a7040';btn.style.color='#70d090';
        btn.title='시뮬레이션 시작';
      }
    }
    /* 특성값 토글 버튼 상태 */
    var lblBtn=document.getElementById('analogy-label-btn');
    if(lblBtn){
      if(_labelsVisible){
        lblBtn.style.background='#13243a';lblBtn.style.borderColor='#2d6fc0';lblBtn.style.color='#7ec8f0';
      } else {
        lblBtn.style.background='#161b28';lblBtn.style.borderColor='#293650';lblBtn.style.color='#46627f';
      }
    }
    /* HUD 시간·τ 갱신 (#2) */
    var hT=document.getElementById('analogy-hud-t');
    var hTau=document.getElementById('analogy-hud-tau');
    if(hT){
      var tp=_physT(), label;
      if(_domTau>1e-12){
        if(tp<1e-3)      label=(tp*1e6).toFixed(1)+' µs';
        else if(tp<1)    label=(tp*1e3).toFixed(2)+' ms';
        else             label=tp.toFixed(3)+' s';
      } else {
        label=_simTime.toFixed(2)+' s';
      }
      hT.textContent='t = '+label;
    }
    if(hTau) hTau.textContent='τ = '+(_domTau>1e-12?_fmtTau(_domTau):'—');
  }
  function _fmtTau(tau){
    if(tau<1e-3) return (tau*1e6).toFixed(1)+'µs';
    if(tau<1)    return (tau*1e3).toFixed(2)+'ms';
    return tau.toFixed(3)+'s';
  }
  /* 라벨(소자 특성값·도선 전류·전위) 표시/숨김 토글 (#5) */
  function _toggleLabels(){
    _labelsVisible=!_labelsVisible;
    _labelSprites.forEach(function(L){ if(L.sprite)L.sprite.visible=_labelsVisible; });
    _wireLabels.forEach(function(L){ if(L.sprite)L.sprite.visible=_labelsVisible; });
    _updateControls();
  }
  function _showHint(msg){

      'background:rgba(10,16,30,0.85);padding:14px 20px;border-radius:10px;border:1px solid #1e3050;pointer-events:none';
    _hintEl.textContent=msg;
    document.getElementById('canvas-container').appendChild(_hintEl);
  }

  /* ════════ play / stop ════════ */
  function _play(){
    var sr=App.State.solverResult;
    if(!sr||!sr.valid){ showErrorToast&&showErrorToast('회로를 완성해야 시뮬레이션할 수 있습니다.'); return; }
    _playing=true; _simTime=0; _lastTs=0;
    _updateControls();
  }
  function _stop(){
    _playing=false; _simTime=0;
    /* 회전체·레인 초기화 */
    _wheels.forEach(function(w){w.rotor.angle=0;w.rotor.omega=0;if(w.rotor.body)w.rotor.body.angularVelocity.set(0,0,0);w.grp.rotation.z=0;w.glow.material.opacity=0;
      if(w.splash){w.splash.drops.forEach(function(d){d.life=0;d.mesh.visible=false;});w.splashTimer=0;}});
    _dynamics.forEach(function(d){
      if(d.kind==='pump'){d.rotor.angle=0;d.rotor.omega=0;if(d.rotor.body)d.rotor.body.angularVelocity.set(0,0,0);d.grp.rotation.y=0;}
      if(d.kind==='cap'&&d.memb){d.memb.scale.x=d.baseScaleX; if(d.memb.material)d.memb.material.emissiveIntensity=0.25;}
    });
    _lanes.forEach(function(lane){
      var n=lane.parts.length;
      lane.parts.forEach(function(p,i){p.s=(i/n)*lane.total;});
    });
    _updateControls();
  }

  /* ════════ 리소스 정리 ════════ */
  function _disposeScene(){
    if(_scene){
      _scene.traverse(function(o){
        if(o.geometry&&o.geometry.dispose)o.geometry.dispose();
        if(o.material){
          var mats=Array.isArray(o.material)?o.material:[o.material];
          mats.forEach(function(m){ if(m.map&&m.map.dispose)m.map.dispose(); m.dispose&&m.dispose(); });
        }
      });
    }
    _labelSprites.forEach(function(L){ if(L.tex&&L.tex.dispose)L.tex.dispose(); });
    _labelSprites=[];
    _wireLabels.forEach(function(L){ if(L.tex&&L.tex.dispose)L.tex.dispose(); });
    _wireLabels=[];
    _lanes=[]; _wheels=[]; _dynamics=[]; _particlePool=[]; _sharedGeo=null;
    if(_world){ /* Cannon 바디 제거 */
      try{ while(_world.bodies&&_world.bodies.length) _world.removeBody(_world.bodies[0]); }catch(e){}
      _world=null;
    }
    _built=false;
  }

  /* 순수 저항 회로(동적 소자 없음)용 정적 branchModel 구성.
   *   solverResult 의 정상상태 값으로 i0=iinf, v0=vinf 를 채운다.
   *   전류·전압이 시간 불변이므로 라벨(전력 P=I²R 등)이 즉시 올바른 값을 갖는다. */
  function _buildStaticBranchModel(){
    var sr=App.State.solverResult;
    if(!sr||!sr.valid) return null;
    var comps=App.State.components;
    var byComp={}, byWire={}, byNode={}, compNodes={};
    var cn=sr.componentNodes||{};

    /* 소자별 전류(부호 포함) + 전압 */
    comps.forEach(function(c){
      var I=(sr.branchCurrents&&sr.branchCurrents[c.id]!=null)?sr.branchCurrents[c.id]:0;
      /* 부호 있는 전류 s: 포트0→포트1 전위차로 추정(저항), 그 외는 branchCurrents 부호 사용 */
      var s=I;
      if(c.type===TYPE.RESISTOR && sr.portVoltages && sr.portVoltages[c.id]){
        var ports=App.Geo.getCompPorts(c);
        var v0=sr.portVoltages[c.id][ports[0]], v1=sr.portVoltages[c.id][ports[1]];
        if(v0!=null&&v1!=null){ var R=Math.max(c.value||0,1e-12); s=(v0-v1)/R; }
      }
      byComp[c.id]={ i0:I, iinf:I, tau:1e-6, s0:s, sinf:s };
      if(cn[c.id]) compNodes[c.id]=cn[c.id];
    });

    /* 노드 전위(시간 불변) */
    if(sr.nodeVoltages){
      for(var nd in sr.nodeVoltages){
        byNode[nd]={ v0:sr.nodeVoltages[nd], vinf:sr.nodeVoltages[nd], tau:1e-6 };
      }
    }
    byNode[0]={v0:0,vinf:0,tau:1e-6};

    /* 도선 전류 (부호 포함) */
    App.State.wires.forEach(function(w){
      var si=(sr.wireSignedI&&sr.wireSignedI[w.id]!=null)?sr.wireSignedI[w.id]:0;
      var fromComp=App.State.getComponent(w.fromId);
      var toComp=App.State.getComponent(w.toId);
      var isJ=function(cc){return cc&&(cc.type===TYPE.JUNCTION_3||cc.type===TYPE.JUNCTION_4);};
      var refId=null, refIsFrom=true, refPort=null;
      if(!isJ(fromComp)&&byComp[w.fromId]){ refId=w.fromId; refIsFrom=true; refPort=w.fromPort; }
      else if(!isJ(toComp)&&byComp[w.toId]){ refId=w.toId; refIsFrom=false; refPort=w.toPort; }
      var refPortIdx=-1;
      if(refId){
        var rc2=App.State.getComponent(refId);
        refPortIdx=App.Geo.getCompPorts(rc2).indexOf(refPort);
      }
      byWire[w.id]={ i0:Math.abs(si), iinf:Math.abs(si), tau:1e-6,
                     refId:refId, refIsFrom:refIsFrom, refPortIdx:refPortIdx };
    });

    return { byComp:byComp, byWire:byWire,
             byNode:(Object.keys(byNode).length>1?byNode:null),
             compNodes:(Object.keys(compNodes).length?compNodes:null), domTau:0 };
  }

  /* ════════ 공개 API ════════ */
  function start(){
    if(typeof THREE==='undefined'){
      showErrorToast&&showErrorToast('3D 라이브러리(Three.js) 로딩에 실패했습니다. 네트워크를 확인하세요.');
      return;
    }
    _labelsVisible=true;   // 라벨 표시 상태 초기화
    _container=document.getElementById('canvas-container');
    /* 기존 2D 레이어 숨김 (몰입형 3D 뷰) */
    ['canvas-bg','canvas-main','canvas-anim'].forEach(function(id){
      var el=document.getElementById(id); if(el)el.style.visibility='hidden';
    });
    /* 전용 WebGL 캔버스 생성 */
    _cv=document.createElement('canvas');
    _cv.id='canvas-three';
    _cv.style.cssText='position:absolute;top:0;left:0;z-index:3;touch-action:none;';
    _container.appendChild(_cv);

    var W=_container.clientWidth, H=_container.clientHeight;
    _renderer=new THREE.WebGLRenderer({canvas:_cv,antialias:true,alpha:true});
    _renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
    _renderer.setSize(W,H);

    _scene=new THREE.Scene();
    _scene.fog=new THREE.FogExp2(0x0a0e18,0.012);
    _camera=new THREE.PerspectiveCamera(48,W/H,0.1,500);

    /* 조명 */
    _scene.add(new THREE.AmbientLight(0x8fb0d8,0.7));
    var dir=new THREE.DirectionalLight(0xffffff,0.9); dir.position.set(6,14,8); _scene.add(dir);
    var dir2=new THREE.DirectionalLight(0x4060a0,0.4); dir2.position.set(-8,6,-6); _scene.add(dir2);

    /* Cannon 물리 엔진 준비 (있으면) */
    _haveCannon=(typeof CANNON!=='undefined');
    if(_haveCannon){
      try{
        _world=new CANNON.World({gravity:new CANNON.Vec3(0,0,0)});
        _world.allowSleep=false;
      }catch(e){ _haveCannon=false; _world=null; }
    }

    /* ── 과도응답(시상수) 데이터 로드 + 시간 스케일 결정 ──
     *   TransientGraph 가 계산한 amp/τ/방향을 재사용한다(동일 수식 보장).
     *   _simSpeed: 5·τ 과도구간을 화면상 SHOW_SPAN초에 보여주도록 가속.
     *   동적 소자가 없으면 1배(부드러운 가동만). */
    _transData=null; _domTau=0; _simSpeed=1; _branchModel=null;
    try{
      if(App.TransientGraph && App.TransientGraph.getTransientData){
        var td=App.TransientGraph.getTransientData();
        if(td){ _transData=td; _domTau=td.domTau||0; _branchModel=td.branchModel||null; }
      }
    }catch(e){ _transData=null; _branchModel=null; }

    /* 동적 소자(L/C)가 없는 순수 저항 회로는 getTransientData 가 null →
     *   solverResult 로부터 시간 불변(정상상태) branchModel 을 직접 구성한다.
     *   (전류·전위가 시간에 따라 변하지 않으므로 i0=iinf, v0=vinf) */
    if(!_branchModel){
      _branchModel=_buildStaticBranchModel();
    }

    if(_domTau>1e-12){
      /* 화면상 SHOW_SPAN초 동안 물리시간 5·_domTau 가 흐르도록 */
      _simSpeed=(5*_domTau)/SHOW_SPAN;
    } else {
      _simSpeed=1;   // 정적 회로: 실시간(부드러운 가동 _staticBase 기준)
    }

    _buildScene();   // 내부에서 _computeNorm 호출 (정상상태 _maxI 계산)

    /* _maxI 보정: 과도 초기전류(i0)가 정상상태보다 클 수 있으므로
     *   모델의 모든 i0/iinf 최대값으로 갱신 → 입자 속력 정규화 일관성 확보 */
    if(_branchModel){
      var mx=_maxI;
      function scan(obj){ for(var k in obj){ var m=obj[k];
        mx=Math.max(mx,Math.abs(m.i0||0),Math.abs(m.iinf||0)); } }
      if(_branchModel.byComp) scan(_branchModel.byComp);
      if(_branchModel.byWire) scan(_branchModel.byWire);
      if(mx>_maxI) _maxI=mx;
    }

    _applyCamera();
    _bindOrbit();

    /* 리사이즈 */
    _resizeFn=function(){
      var w=_container.clientWidth,h=_container.clientHeight;
      if(_renderer){_renderer.setSize(w,h);_camera.aspect=w/h;_camera.updateProjectionMatrix();}
    };
    window.addEventListener('resize',_resizeFn);

    _buildControls();
    var sr=App.State.solverResult;
    if(!sr||!sr.valid) _showHint('회로가 완성되지 않았습니다.\n편집 모드에서 연결을 완성하세요.');

    /* 정지(초기) 상태로 렌더 시작 — 입자/회전체는 멈춰 있음 */
    _playing=false; _simTime=0; _lastTs=0;
    _stop();
    _raf=requestAnimationFrame(_loop);
  }

  function stop(){
    _playing=false; _simTime=0;
    if(_raf!==null){cancelAnimationFrame(_raf);_raf=null;}
    _unbindOrbit();
    if(_resizeFn){window.removeEventListener('resize',_resizeFn);_resizeFn=null;}
    _disposeScene();
    if(_renderer){ _renderer.dispose&&_renderer.dispose(); _renderer=null; }
    _scene=null; _camera=null;
    if(_cv&&_cv.parentNode){_cv.parentNode.removeChild(_cv);} _cv=null;
    if(_hintEl){_hintEl.remove();_hintEl=null;}
    var ctrl=document.getElementById('analogy-ctrl'); if(ctrl)ctrl.remove();
    var hud=document.getElementById('analogy-hud'); if(hud)hud.remove();
    /* 2D 레이어 복구 */
    ['canvas-bg','canvas-main','canvas-anim'].forEach(function(id){
      var el=document.getElementById(id); if(el)el.style.visibility='';
    });
  }

  /* render: 외부 강제 1프레임 (호환용) */
  function render(){ if(_renderer&&_scene&&_camera){_applyCamera();_renderer.render(_scene,_camera);} }

  return{start:start, stop:stop, render:render};
})();

}());
</script>


<!-- ═══════════════════ Script 10 — Interaction Handler ═══════════════════ -->
<script>
(function(){
'use strict';
var App=window.App;

App.Interaction=(function(){
  var _cv;

  /* ── 제스처 유한상태기계(FSM) ───────────────────────────────────────
   *   none      : 대기
   *   pinch     : 두 손가락 확대/축소
   *   pan       : 빈 공간 드래그 → 화면 이동 (+관성)
   *   drag      : 부품 이동 (삭제존 드롭 가능)
   *   port-drag : 포트에서 끌기 — 짧으면 tap-to-connect, 길면 drag-to-connect
   *   connect   : tap-to-connect 대기 (다음 포트 탭으로 완성)
   *   select    : 도선 선택됨
   * 전이는 onPointerDown/Move/Up에서 발생. _cancelGesture()가 공통 정리.
   * ─────────────────────────────────────────────────────────────────── */
  var gesture='none';
  var activePointers=new Map();

  /* 제스처별 상태 객체 */
  var _pinch={active:false,startDist:0,startScale:1,focalX:0,focalY:0};
  var _pan={active:false,lastX:0,lastY:0,velX:0,velY:0,rafId:null};
  var _drag={comp:null,origGX:0,origGY:0,snapGX:null,snapGY:null,offGX:0,offGY:0,moved:false};
  var _portDrag={fromPort:null,previewX:0,previewY:0,nearPort:null,pressTime:0,timer:null};
  var _sbDrag={active:false,item:null,el:null,moved:false,startX:0,startY:0};
  var PORT_DRAG_MS=200; /* 이 시간 이내 손 떼면 tap-to-connect, 이상이면 drag-to-connect */

  /* 더블탭 추적 (모바일은 pointerId가 매번 바뀌므로 시간+위치 기반) */
  var _lastTapTime=0,_lastTapPid=null,_lastTapX=0,_lastTapY=0;

  /* 연결 미리보기 방향 */
  var _connectPreviewDir='H-first';

  // ═══ 히트 테스트 ═══

  /* 모든 부품 포트를 순회하며 (px,py)에 가장 가까운 포트 반환 (공용 헬퍼)
   *   filterFn(comp): false면 그 부품 건너뜀
   *   maxDist: 이 거리 이내만 후보. 초과 시 null */
  function _nearestPortOf(px,py,maxDist,filterFn){
    var best=null,bestD=Infinity;
    App.State.components.forEach(function(comp){
      if(filterFn&&!filterFn(comp)) return;
      App.Geo.getCompPorts(comp).forEach(function(portId){
        var pp=App.Geo.getPortPixel(comp,portId);
        var d=Math.hypot(px-pp.x,py-pp.y);
        if(d<bestD){bestD=d;best={componentId:comp.id,port:portId};}
      });
    });
    return (best&&bestD<=maxDist)?best:null;
  }

  // 포트 히트 — conPort 활성 시 모든 부품 포트 검사, 아니면 선택된 부품만
  function _hitPort(px,py,pType){
    var hr=pType==='touch'?HIT_RADIUS_TOUCH:HIT_RADIUS_MOUSE;
    var selId=App.State.selectedId;
    var checkAll=!!App.State.connectingPort;
    return _nearestPortOf(px,py,hr,function(comp){
      return checkAll||comp.id===selId;
    });
  }

  // 부품 바디 히트
  function _hitComp(px,py){
    var vt=App.State.viewTransform,cp=CELL_SIZE*vt.scale;
    var comps=App.State.components;
    for(var i=comps.length-1;i>=0;i--){
      var c=comps[i],gp=App.Geo.gridToPixel(c.gridX,c.gridY);
      if(px>=gp.x&&px<=gp.x+cp&&py>=gp.y&&py<=gp.y+cp) return c;
    }
    return null;
  }

  // 도선 히트 (선분 거리 ≤ threshold)
  function _hitWire(px,py){
    var vt=App.State.viewTransform;
    var thr=Math.max(6,6*vt.scale);
    var wires=App.State.wires;
    for(var i=wires.length-1;i>=0;i--){
      var w=wires[i];
      var from=App.State.getComponent(w.fromId),to=App.State.getComponent(w.toId);
      if(!from||!to) continue;
      var p1=App.Geo.getPortPixel(from,w.fromPort);
      var p2=App.Geo.getPortPixel(to,w.toPort);
      var path=App.Geo.calcWirePath(p1.x,p1.y,p2.x,p2.y,w.direction);
      for(var k=0;k<path.length-1;k++){
        if(App.Geo.distToSegment(px,py,path[k].x,path[k].y,path[k+1].x,path[k+1].y)<=thr) return w;
      }
    }
    return null;
  }

  // 도선 꺾임점 핸들 히트
  function _hitWireBend(px,py){
    var wires=App.State.wires;
    for(var i=wires.length-1;i>=0;i--){
      var w=wires[i];
      var bp=App.Geo.getWireBendPoint(w);
      if(!bp) continue;
      if(Math.hypot(px-bp.x,py-bp.y)<=BEND_HIT_RADIUS) return w;
    }
    return null;
  }

  // ═══ 줌 ═══

  function applyZoom(ns,focalX,focalY){
    var vt=App.State.viewTransform,old=vt.scale;
    ns=Math.min(SCALE_MAX,Math.max(SCALE_MIN,ns));
    if(Math.abs(ns-old)<0.001) return;
    var gfx=(focalX-vt.offsetX)/(CELL_SIZE*old),gfy=(focalY-vt.offsetY)/(CELL_SIZE*old);
    vt.scale=ns;vt.offsetX=focalX-gfx*CELL_SIZE*ns;vt.offsetY=focalY-gfy*CELL_SIZE*ns;
    App.Geo.clampOffset();App.Events.emit('viewport:changed');
  }

  // ═══ 팬 ═══

  function cancelInertia(){if(_pan.rafId!==null){cancelAnimationFrame(_pan.rafId);_pan.rafId=null;}}

  function panStart(x,y){
    cancelInertia();_pan.active=true;_pan.lastX=x;_pan.lastY=y;_pan.velX=0;_pan.velY=0;
    _cv.style.cursor='grabbing';
  }
  function updatePan(x,y){
    if(!_pan.active) return;
    var dx=x-_pan.lastX,dy=y-_pan.lastY,vt=App.State.viewTransform;
    vt.offsetX+=dx;vt.offsetY+=dy;App.Geo.clampOffset();
    _pan.velX=_pan.velX*.7+dx*.3;_pan.velY=_pan.velY*.7+dy*.3;
    _pan.lastX=x;_pan.lastY=y;App.Events.emit('viewport:changed');
  }
  function panEnd(){
    _pan.active=false;_cv.style.cursor='';
    if(Math.hypot(_pan.velX,_pan.velY)>INERTIA_THRESHOLD) _startInertia();
  }
  function _startInertia(){
    (function step(){
      _pan.velX*=INERTIA_FRICTION;_pan.velY*=INERTIA_FRICTION;
      var vt=App.State.viewTransform;
      vt.offsetX+=_pan.velX;vt.offsetY+=_pan.velY;App.Geo.clampOffset();
      App.Events.emit('viewport:changed');
      if(Math.hypot(_pan.velX,_pan.velY)>INERTIA_THRESHOLD) _pan.rafId=requestAnimationFrame(step);
      else _pan.rafId=null;
    })();
  }

  // ═══ 더블탭 ═══

  function _onDoubleTap(x,y){
    /* ── 우선순위 1: 선택된 부품 위 더블탭 → 90° 회전 ── */
    if(App.State.selectedId){
      var selComp=App.State.getComponent(App.State.selectedId);
      if(selComp && selComp.type!==TYPE.JUNCTION_4){
        /* 더블탭 위치가 해당 부품 셀 위인지 확인 */
        var ch=_hitComp(x,y);
        if(ch && ch.id===selComp.id){
          App.State.rotateComponent(selComp.id);
          App.PropPanel.show(selComp.id);
          App.EditRenderer.scheduleRender();
          return;
        }
      }

      /* ── 우선순위 2: 선택된 도선 위 더블탭 → 꺾임 방향 토글 ── */
      var selWire=App.State.getWire(App.State.selectedId);
      if(selWire){
        var fw=App.State.getComponent(selWire.fromId);
        var tw=App.State.getComponent(selWire.toId);
        if(fw&&tw){
          var wh2=_hitWire(x,y);
          if(wh2&&wh2.id===selWire.id){
            selWire.direction=selWire.direction==='H-first'?'V-first':'H-first';
            App.Events.emit('state:changed');
            App.PropPanel.refresh();
            return;
          }
        }
      }
    }

    /* ── 우선순위 3: 선택 없이 부품 위 더블탭 → 선택 후 회전 ── */
    var ch2=_hitComp(x,y);
    if(ch2 && ch2.type!==TYPE.JUNCTION_4){
      App.State.selectedId=ch2.id;
      App.State.rotateComponent(ch2.id);
      App.PropPanel.show(ch2.id);
      App.EditRenderer.startSelAnimation();
      App.EditRenderer.scheduleRender();
      return;
    }

    /* ── 기본 더블탭: 뷰 리셋 ── */
    var c=document.getElementById('canvas-container'),vt=App.State.viewTransform;
    vt.scale=1.0;
    vt.offsetX=Math.round((c.clientWidth-GRID_COLS*CELL_SIZE)/2);
    vt.offsetY=Math.round((c.clientHeight-GRID_ROWS*CELL_SIZE)/2);
    App.Geo.clampOffset();App.Events.emit('viewport:changed');
  }

  // ═══ 핀치 ═══

  function _pinchStart(p1,p2){
    _pinch.active=true;_pinch.startDist=Math.hypot(p2.x-p1.x,p2.y-p1.y)||1;
    _pinch.startScale=App.State.viewTransform.scale;
    _pinch.focalX=(p1.x+p2.x)/2;_pinch.focalY=(p1.y+p2.y)/2;
  }
  function _updatePinch(p1,p2){
    if(!_pinch.active) return;
    applyZoom(_pinch.startScale*(Math.hypot(p2.x-p1.x,p2.y-p1.y)/_pinch.startDist),_pinch.focalX,_pinch.focalY);
  }

  // ═══ 드래그 ═══

  function _updateDrag(px,py){
    var vt=App.State.viewTransform,cp=CELL_SIZE*vt.scale;
    var rawGX=(px-vt.offsetX)/cp-_drag.offGX;
    var rawGY=(py-vt.offsetY)/cp-_drag.offGY;
    var sn=App.Geo.clampGrid(Math.round(rawGX),Math.round(rawGY));
    _drag.snapGX=sn.gridX;_drag.snapGY=sn.gridY;_drag.moved=true;
    App.EditRenderer.scheduleRender();
  }
  function _finishDrag(clientX, clientY){
    if(!_drag.comp) return;
    var dz=document.getElementById('delete-zone');

    /* 삭제존 판정: 숨기기 전에 수행 */
    var overDz=_drag.moved && _overDeleteZone(clientX,clientY);

    /* 삭제존 숨기기 */
    if(dz) dz.classList.remove('visible','hover');

    /* 삭제존 드롭 → 삭제 */
    if(overDz){
      var delId=_drag.comp.id;
      _drag.comp.gridX=_drag.origGX;_drag.comp.gridY=_drag.origGY;
      _drag.comp=null;_drag.snapGX=null;_drag.snapGY=null;_drag.moved=false;
      App.State.removeComponent(delId);
      App.PropPanel.hide();
      App.Events.emit('state:changed');
      App.EditRenderer.scheduleRender();
      return;
    }

    if(_drag.moved&&_drag.snapGX!=null){
      if(!App.State.isOccupied(_drag.snapGX,_drag.snapGY,_drag.comp.id)){
        _drag.comp.gridX=_drag.snapGX;_drag.comp.gridY=_drag.snapGY;
        // 이동 완료 후 인접 포트 자동 연결 (state:changed는 내부에서 emit)
        App.State.autoConnectAdjacent(_drag.comp.id);
      } else {
        _drag.comp.gridX=_drag.origGX;_drag.comp.gridY=_drag.origGY;
        App.Events.emit('state:changed');
      }
    }
    _drag.comp=null;_drag.snapGX=null;_drag.snapGY=null;_drag.moved=false;
    App.EditRenderer.scheduleRender();
  }
  function _cancelGesture(){
    var dz=document.getElementById('delete-zone');
    if(dz) dz.classList.remove('visible','hover');
    /* port-drag 타이머·상태 정리 */
    if(_portDrag.timer){ clearTimeout(_portDrag.timer); _portDrag.timer=null; }
    if(gesture==='port-drag'){
      _portDrag.fromPort=null; _portDrag.nearPort=null;
      _cancelConnect();
    }
    if(gesture==='drag'&&_drag.comp){
      _drag.comp.gridX=_drag.origGX;_drag.comp.gridY=_drag.origGY;_drag.comp=null;
      App.Events.emit('state:changed');
    }
    if(gesture==='connect') _cancelConnect();
    if(gesture==='pan'){_pan.active=false;_cv.style.cursor='';}
    cancelInertia();
  }

  // ═══ 도선 연결 로직 (Phase 3 핵심) ═══

  /* 삭제존 위에 있는지 판정 (clientX/Y 기준). 보이지 않으면 false */
  function _overDeleteZone(clientX,clientY){
    var dz=document.getElementById('delete-zone');
    if(!dz||!dz.classList.contains('visible')||clientX==null) return false;
    var r=dz.getBoundingClientRect();
    return clientX>=r.left&&clientX<=r.right&&clientY>=r.top&&clientY<=r.bottom;
  }

  // 연결 시작: 포트 탭 (tap) 또는 포트 드래그 시작
  function _startConnect(portHit){
    App.State.connectingPort=portHit;
    _connectPreviewDir='H-first';
    /* gesture는 호출자(onPointerDown)가 설정 — 여기서 강제 덮어쓰지 않음 */
    if(gesture!=='port-drag') gesture='connect';
    _showConnHint('다른 포트를 탭하여 연결  ·  빈 곳 탭으로 취소');
    App.EditRenderer.startPortAnimation();
    App.EditRenderer.scheduleRender();
  }

  // 연결 완성: 목표 포트 탭
  function _completeConnect(tgt){
    var cp=App.State.connectingPort;
    if(!cp) return;

    // 자기 자신 포트 재탭 → 취소
    if(tgt.componentId===cp.componentId&&tgt.port===cp.port){_cancelConnect();return;}

    // 같은 부품의 다른 포트 연결도 가능 (허용)
    // 이미 연결된 비-JUNCTION 포트: 기존 도선 먼저 제거 후 새 연결
    if(!App.State.isPortFree(tgt.componentId,tgt.port)){
      var existingWires=App.State.getPortWires(tgt.componentId,tgt.port);
      if(existingWires.length>0) App.State.removeWire(existingWires[0].id);
    }
    if(!App.State.isPortFree(cp.componentId,cp.port)){
      var srcWires=App.State.getPortWires(cp.componentId,cp.port);
      if(srcWires.length>0) App.State.removeWire(srcWires[0].id);
    }

    // 중복 도선 방지 (동일 포트 쌍)
    var dup=App.State.wires.some(function(w){
      return(w.fromId===cp.componentId&&w.fromPort===cp.port&&w.toId===tgt.componentId&&w.toPort===tgt.port)||
             (w.fromId===tgt.componentId&&w.fromPort===tgt.port&&w.toId===cp.componentId&&w.toPort===cp.port);
    });
    if(dup){showErrorToast('이미 같은 포트끼리 연결되어 있습니다.');_cancelConnect();return;}

    // 방향 자동 결정 (포트 상대 위치 기반)
    var srcComp=App.State.getComponent(cp.componentId);
    var tgtComp=App.State.getComponent(tgt.componentId);
    var dir='H-first';
    if(srcComp&&tgtComp){
      var p1=App.Geo.getPortPixel(srcComp,cp.port);
      var p2=App.Geo.getPortPixel(tgtComp,tgt.port);
      dir=App.Geo.getBestDirection(p1,p2,cp.componentId,tgt.componentId);
    }

    var newWireId=App.State.genId();
    App.State.addWire({
      id:newWireId,
      fromId:cp.componentId,fromPort:cp.port,
      toId:tgt.componentId,toPort:tgt.port,
      direction:dir,
    });

    // 완성 플래시 트리거
    App.EditRenderer.flashWire(newWireId);

    _cancelConnect();
  }

  // 연결 취소
  function _cancelConnect(){
    App.State.connectingPort=null;
    App.EditRenderer.setWirePreview(null);
    App.EditRenderer.setNearestPort(null);
    App.EditRenderer.stopPortAnimation();
    _showConnHint(null);
    if(gesture!=='port-drag') gesture='none';
    App.EditRenderer.scheduleRender();
  }

  // nearest port 업데이트 (pointermove 중 호출)
  function _updateNearestPort(px,py,pType){
    var hr=pType==='touch'?HIT_RADIUS_TOUCH*1.5:HIT_RADIUS_MOUSE*2;
    var cp=App.State.connectingPort;
    if(!cp) return;
    /* 출발 부품 제외하고 최근접 포트 탐색 */
    var nearest=_nearestPortOf(px,py,hr,function(comp){
      return comp.id!==cp.componentId;
    });
    App.EditRenderer.setNearestPort(nearest);
  }

  // ═══ 힌트 표시 ═══

  function _showConnHint(msg){
    var el=document.getElementById('conn-hint');
    if(!el) return;
    if(msg){el.textContent=msg;el.classList.add('visible');}
    else el.classList.remove('visible');
  }

  // ═══ 포인터 이벤트 ═══

  function onPointerDown(e){
    _cv.setPointerCapture(e.pointerId);
    var x=e.offsetX,y=e.offsetY;
    activePointers.set(e.pointerId,{x:x,y:y});

    // 두 번째 손가락 → 핀치
    if(activePointers.size===2){
      _cancelGesture();
      gesture='pinch';
      var ptrs=Array.from(activePointers.values());
      _pinchStart(ptrs[0],ptrs[1]);
      return;
    }

    cancelInertia();

    // ── 더블탭 감지: 시간 + 위치 기반 (pointerId는 모바일에서 매번 바뀔 수 있음) ──
    var now=Date.now();
    var dx=x-(_lastTapX||0), dy=y-(_lastTapY||0);
    var sameSpot=Math.hypot(dx,dy)<20;  /* 20px 이내 같은 위치 */
    if(sameSpot&&now-_lastTapTime<DOUBLE_TAP_MS){
      _onDoubleTap(x,y);_lastTapTime=0;return;
    }
    _lastTapTime=now;_lastTapX=x;_lastTapY=y;

    // ── 연결 모드 활성 중 ──
    if(App.State.connectingPort){
      var ph=_hitPort(x,y,e.pointerType);
      if(ph){_completeConnect(ph);}
      else{_cancelConnect();}
      return;
    }

    // ── 선택된 도선의 꺾임점 핸들 탭 → direction 즉시 토글 ──
    if(App.State.selectedId){
      var selWire=App.State.getWire(App.State.selectedId);
      if(selWire){
        var bp=App.Geo.getWireBendPoint(selWire);
        if(bp&&Math.hypot(x-bp.x,y-bp.y)<=BEND_HIT_RADIUS){
          selWire.direction=selWire.direction==='H-first'?'V-first':'H-first';
          App.Events.emit('state:changed');
          App.PropPanel.refresh();
          return;
        }
      }
    }

    // ── 포트 히트 → 즉시 port-drag 시작, 빠른 탭이면 tap-to-connect 전환 ──
    var ph2=_hitPort(x,y,e.pointerType);
    if(ph2){
      gesture='port-drag';
      _portDrag.fromPort=ph2;
      _portDrag.previewX=x;
      _portDrag.previewY=y;
      _portDrag.pressTime=Date.now();   /* 누른 시각 기록 */
      _portDrag.nearPort=null;
      _portDrag.timer=null;
      _startConnect(ph2);               /* 프리뷰 즉시 시작 */
      return;
    }

    // ── 도선 히트 ──
    var wh=_hitWire(x,y);
    if(wh){
      App.State.selectedId=wh.id;
      App.PropPanel.show(wh.id);
      App.EditRenderer.startSelAnimation();
      App.EditRenderer.scheduleRender();
      gesture='select';
      /* 도선도 롱프레스 → 컨텍스트 메뉴 */
      _lpStart(x,y,null,wh);
      return;
    }

    // ── 부품 히트 → 드래그 준비 ──
    var ch=_hitComp(x,y);
    if(ch){
      var vt=App.State.viewTransform,cp2=CELL_SIZE*vt.scale;
      var gp=App.Geo.gridToPixel(ch.gridX,ch.gridY);
      _drag.comp=ch;_drag.origGX=ch.gridX;_drag.origGY=ch.gridY;
      _drag.snapGX=ch.gridX;_drag.snapGY=ch.gridY;
      _drag.offGX=(x-gp.x)/cp2;_drag.offGY=(y-gp.y)/cp2;
      _drag.moved=false;
      /* 드래그 시작: 삭제존 표시, top = J4 버튼 하단 (canvas-container 기준) */
      var dz=document.getElementById('delete-zone');
      if(dz){
        var j4btn=document.getElementById('sidebar-item-JUNCTION_4');
        if(!j4btn){
          var items=document.querySelectorAll('.sidebar-item');
          j4btn=items[items.length-1]||null;
        }
        var container=document.getElementById('canvas-container');
        var cRect=container?container.getBoundingClientRect():{top:0};
        var topPx=j4btn
          ? (j4btn.getBoundingClientRect().bottom - cRect.top + 8)
          : 420;
        dz.style.top=Math.max(8,topPx)+'px';
        dz.style.bottom='60px';
        dz.classList.add('visible');
      }
      gesture='drag';
      App.State.selectedId=ch.id;
      App.PropPanel.show(ch.id);
      App.EditRenderer.startSelAnimation();
      App.EditRenderer.scheduleRender();
      // 롱프레스 시작
      _lpStart(x,y,ch);
      return;
    }

    // ── 빈 공간 → 팬 + 선택 해제 ──
    if(App.State.selectedId!==null){
      App.State.selectedId=null;
      App.EditRenderer.stopSelAnimation();
      App.PropPanel.hide();
      App.EditRenderer.scheduleRender();
    }
    gesture='pan';
    panStart(x,y);
  }

  function onPointerMove(e){
    if(!activePointers.has(e.pointerId)) return;
    activePointers.set(e.pointerId,{x:e.offsetX,y:e.offsetY});
    /* 드롭 판정용 마지막 좌표 저장 */
    window._lastPointerClientXY={x:e.clientX,y:e.clientY};

    if(gesture==='pinch'&&activePointers.size>=2){
      var ptrs=Array.from(activePointers.values());_updatePinch(ptrs[0],ptrs[1]);

    } else if(gesture==='pan'){
      updatePan(e.offsetX,e.offsetY);

    } else if(gesture==='drag'&&_drag.comp){
      if(!_drag.moved){
        var gp=App.Geo.gridToPixel(_drag.origGX,_drag.origGY);
        var vt=App.State.viewTransform,cp=CELL_SIZE*vt.scale;
        if(Math.hypot(e.offsetX-(gp.x+_drag.offGX*cp),e.offsetY-(gp.y+_drag.offGY*cp))<4) return;
        _lpCancel(); // 손가락 움직이면 롱프레스 취소
      }
      _updateDrag(e.offsetX,e.offsetY);
      /* 삭제존 hover 강조 */
      var dz=document.getElementById('delete-zone');
      if(dz&&dz.classList.contains('visible')){
        dz.classList.toggle('hover', _overDeleteZone(e.clientX,e.clientY));
      }

    } else if(gesture==='port-drag'){
      _portDrag.previewX=e.offsetX;
      _portDrag.previewY=e.offsetY;
      /* 가장 가까운 연결 가능 포트 강조 */
      _portDrag.nearPort=_hitPort(e.offsetX,e.offsetY,e.pointerType);
      /* 와이어 프리뷰 + 최근접 포트 업데이트 (커서 방향 기준 자동 꺾임) */
      var conP=App.State.connectingPort;
      if(conP){
        var srcComp=App.State.getComponent(conP.componentId);
        if(srcComp){
          var p1=App.Geo.getPortPixel(srcComp,conP.port);
          _connectPreviewDir=App.Geo.getBestDirection(p1,{x:e.offsetX,y:e.offsetY});
          App.EditRenderer.setWirePreview({x1:p1.x,y1:p1.y,x2:e.offsetX,y2:e.offsetY,dir:_connectPreviewDir});
        }
        _updateNearestPort(e.offsetX,e.offsetY,e.pointerType);
      }
      App.EditRenderer.scheduleRender();
    }
  }

  function onPointerUp(e){
    activePointers.delete(e.pointerId);
    _lpCancel();

    if(gesture==='pinch'){
      if(activePointers.size<2){
        _pinch.active=false;
        if(activePointers.size===1){
          var rem=Array.from(activePointers.values())[0];
          gesture='pan';_pan.active=true;_pan.lastX=rem.x;_pan.lastY=rem.y;_pan.velX=0;_pan.velY=0;
        } else gesture='none';
      }
      return;
    }
    if(gesture==='pan'){panEnd();gesture='none';return;}
    if(gesture==='select'){gesture='none';return;}
    if(gesture==='port-drag'){
      var elapsed=Date.now()-(_portDrag.pressTime||0);
      var tgt=_hitPort(e.offsetX,e.offsetY,e.pointerType);

      if(elapsed < PORT_DRAG_MS){
        /* ── 빠른 탭: tap-to-connect 모드로 전환 ──
         * 프리뷰·connectingPort는 그대로 유지 → 'connect' 제스처로 전환
         * 사용자가 두 번째 포트를 탭할 때까지 대기 */
        _portDrag.fromPort=null; _portDrag.nearPort=null;
        gesture='connect';   /* 기존 tap-to-connect 상태 */
        /* hint 메시지 갱신 */
        _showConnHint('다른 포트를 탭하여 연결  ·  빈 곳 탭으로 취소');
        return;
      }

      /* ── 긴 드래그: 현재 위치에서 연결 완성 ── */
      if(tgt && App.State.connectingPort &&
         !(tgt.componentId===App.State.connectingPort.componentId && tgt.port===App.State.connectingPort.port)){
        _completeConnect(tgt);
      } else {
        _cancelConnect();
      }
      _portDrag.fromPort=null; _portDrag.nearPort=null;
      gesture='none';
      return;
    }
    if(gesture==='drag'){_finishDrag(e.clientX, e.clientY);gesture='none';return;}
    gesture='none';
  }

  function onWheel(e){
    e.preventDefault();
    var rect=_cv.getBoundingClientRect();
    var f=e.deltaY<0?WHEEL_ZOOM_STEP:(1/WHEEL_ZOOM_STEP);
    applyZoom(App.State.viewTransform.scale*f,e.clientX-rect.left,e.clientY-rect.top);
  }

  // ═══ 사이드바 드래그 ═══

  function startSidebarDrag(item,clientX,clientY,el){
    _sbDrag.active=true;_sbDrag.item=item;_sbDrag.el=el;
    _sbDrag.startX=clientX;_sbDrag.startY=clientY;_sbDrag.moved=false;
    el.classList.add('dragging');
    var ghost=document.getElementById('drag-ghost');
    App.Symbols.drawMini(ghost,item.type);
    _moveSbGhost(clientX,clientY);
    ghost.style.display='block';
  }

  function _moveSidebarDrag(clientX,clientY){
    if(!_sbDrag.active) return;
    if(!_sbDrag.moved&&Math.hypot(clientX-_sbDrag.startX,clientY-_sbDrag.startY)>5) _sbDrag.moved=true;
    _moveSbGhost(clientX,clientY);
  }

  function _endSidebarDrag(clientX,clientY){
    if(!_sbDrag.active) return;
    document.getElementById('drag-ghost').style.display='none';
    if(_sbDrag.el) _sbDrag.el.classList.remove('dragging');
    if(_sbDrag.moved){
      var cont=document.getElementById('canvas-container');
      var rect=cont.getBoundingClientRect();
      if(clientX>=rect.left&&clientX<=rect.right&&clientY>=rect.top&&clientY<=rect.bottom)
        App.Main.placeComponent(_sbDrag.item,clientX-rect.left,clientY-rect.top);
    } else {
      App.Main.addComponentCenter(_sbDrag.item);
    }
    _sbDrag.active=false;_sbDrag.item=null;_sbDrag.el=null;
  }

  function _moveSbGhost(cx,cy){
    var g=document.getElementById('drag-ghost');
    if(g){g.style.left=cx+'px';g.style.top=cy+'px';}
  }

  function getDraggedId(){return _drag.comp?_drag.comp.id:null;}
  function getDragInfo(){
    if(!_drag.comp||!_drag.moved) return null;
    return{compId:_drag.comp.id,type:_drag.comp.type,rotation:_drag.comp.rotation,snapGX:_drag.snapGX,snapGY:_drag.snapGY};
  }

  // ═══ 롱프레스 상태 ═══
  var _lp={timer:null,px:0,py:0,compId:null,wireId:null};

  function _lpStart(x,y,comp,wire){
    _lp.px=x;_lp.py=y;
    _lp.compId=comp?comp.id:null;
    _lp.wireId=wire?wire.id:null;
    _lp.timer=setTimeout(function(){_lpFire(x,y);},LONGPRESS_MS);
  }
  function _lpCancel(){
    if(_lp.timer!==null){clearTimeout(_lp.timer);_lp.timer=null;}
  }
  function _lpFire(x,y){
    _lp.timer=null;
    var comp=_lp.compId?App.State.getComponent(_lp.compId):null;
    var wire=_lp.wireId?App.State.getWire(_lp.wireId):null;
    if(comp){
      App.State.selectedId=comp.id;
      App.PropPanel.show(comp.id);
      App.EditRenderer.startSelAnimation();
      _showCtxMenu(x,y,comp,null);
    } else if(wire){
      App.State.selectedId=wire.id;
      App.PropPanel.show(wire.id);
      App.EditRenderer.startSelAnimation();
      _showCtxMenu(x,y,null,wire);
    }
  }

  // ═══ 컨텍스트 메뉴 ═══
  var _ctxTargetComp=null;
  var _ctxCloseDelay=null;

  function _showCtxMenu(canvasX,canvasY,comp,wire){
    _ctxTargetComp=comp||wire||null;
    var isWire=!comp&&!!wire;

    /* 선택 상태 동기화 */
    if(comp) App.State.selectedId=comp.id;
    else if(wire) App.State.selectedId=wire.id;

    var menu=document.getElementById('ctx-menu');
    var cont=document.getElementById('canvas-container');
    var rect=cont.getBoundingClientRect();
    var absX=canvasX+rect.left, absY=canvasY+rect.top;

    var mw=160, mh=130;
    var left=Math.min(absX, window.innerWidth -mw-8);
    var top =Math.min(absY+10, window.innerHeight-mh-8);
    if(top<4) top=absY+10;
    menu.style.left=left+'px'; menu.style.top=top+'px';

    /* 도선: 복제 숨김, 회전=꺾임 방향 전환 레이블 변경 */
    var rotateEl=document.getElementById('ctx-rotate');
    var dupEl   =document.getElementById('ctx-dup');
    if(isWire){
      rotateEl.style.display='flex';
      rotateEl.querySelector('.ctx-icon').textContent='⇄';
      rotateEl.childNodes[1].textContent=' 꺾임 방향 전환';
      dupEl.style.display='none';
    } else {
      rotateEl.querySelector('.ctx-icon').textContent='↻';
      rotateEl.childNodes[1].textContent=' 90° 회전';
      dupEl.style.display='flex';
      /* JUNCTION_4는 회전 숨김 */
      rotateEl.style.display=(comp&&comp.type===TYPE.JUNCTION_4)?'none':'flex';
    }

    menu.classList.add('visible');

    /* 외부 닫기 리스너 등록:
     * click 대신 pointerdown 사용 — 캔버스에서 touchstart preventDefault로
     * 합성 click이 차단되어도 pointerdown은 항상 발생함.
     * capture:true 로 메뉴 안 클릭보다 먼저 감지. */
    clearTimeout(_ctxCloseDelay);
    document.removeEventListener('pointerdown',_outsideCloseCtx,{capture:true});
    document.removeEventListener('click',_outsideCloseCtx,{capture:false});

    function _onDocUp(){
      document.removeEventListener('pointerup',_onDocUp,{capture:true});
      /* pointerup 직후 다음 pointerdown부터 외부 닫기 감지 */
      _ctxCloseDelay=setTimeout(function(){
        document.addEventListener('pointerdown',_outsideCloseCtx,{capture:true});
      },50);
    }
    document.addEventListener('pointerup',_onDocUp,{capture:true,once:true});
  }

  function _outsideCloseCtx(e){
    var menu=document.getElementById('ctx-menu');
    if(menu&&!menu.contains(e.target)){
      _closeCtxMenu();
    }
    /* 메뉴 내부 터치면 리스너 유지 (항목 클릭 핸들러에서 닫음) */
  }

  function _closeCtxMenu(){
    clearTimeout(_ctxCloseDelay);
    document.getElementById('ctx-menu').classList.remove('visible');
    document.removeEventListener('pointerdown',_outsideCloseCtx,{capture:true});
    document.removeEventListener('click',_outsideCloseCtx,{capture:false});
    _ctxTargetComp=null;
  }

  // ═══ 키보드 단축키 ═══
  function _deleteSelected(){
    var id=App.State.selectedId;if(!id) return;
    if(App.State.getComponent(id)){App.State.removeComponent(id);App.EditRenderer.stopSelAnimation();App.PropPanel.hide();}
    else if(App.State.getWire(id)){App.State.removeWire(id);App.EditRenderer.stopSelAnimation();App.PropPanel.hide();}
  }
  function _rotateSelected(){
    var id=App.State.selectedId;
    var comp=id?App.State.getComponent(id):null;
    if(!comp) return;
    App.State.rotateComponent(id);
    App.PropPanel.show(id);
  }
  function _escAction(){
    if(App.State.connectingPort){_cancelConnect();return;}
    if(App.State.selectedId!==null){
      App.State.selectedId=null;
      App.EditRenderer.stopSelAnimation();
      App.PropPanel.hide();
      App.EditRenderer.scheduleRender();
    }
  }
  function _duplicateSelected(){
    var id=App.State.selectedId;
    var comp=id?App.State.getComponent(id):null;
    if(!comp) return;
    // 인접한 빈 셀 탐색
    var empty=null;
    outer:for(var r=1;r<=5;r++){
      for(var dg=-r;dg<=r;dg++){for(var dr=-r;dr<=r;dr++){
        if(Math.abs(dg)!==r&&Math.abs(dr)!==r) continue;
        var cg=App.Geo.clampGrid(comp.gridX+dg,comp.gridY+dr);
        if(!App.State.isOccupied(cg.gridX,cg.gridY,null)){empty=cg;break outer;}
      }}
    }
    if(!empty){showErrorToast('복제할 공간이 없습니다.');return;}
    var dup=JSON.parse(JSON.stringify(comp));
    dup.id=App.State.genId();dup.gridX=empty.gridX;dup.gridY=empty.gridY;
    App.State.addComponent(dup);
    App.State.selectedId=dup.id;
    App.PropPanel.show(dup.id);
    App.EditRenderer.startSelAnimation();
  }

  function _setupKeyboard(){
    document.addEventListener('keydown',function(e){
      // 입력 필드에서는 무시 (단, Escape는 허용)
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'){
        if(e.key==='Escape'){e.target.blur();return;}
        return;
      }
      switch(e.key){
        case 'Delete': case 'Backspace': e.preventDefault();_deleteSelected();break;
        case 'r': case 'R': e.preventDefault();_rotateSelected();break;
        case 'Escape': _escAction();break;
        case 'z': case 'Z':
          if(e.ctrlKey||e.metaKey){e.preventDefault();
            if(e.shiftKey) App.State.redo(); else App.State.undo();
            App.EditRenderer.stopSelAnimation();App.PropPanel.refresh();
          } break;
        case 'y': case 'Y':
          if(e.ctrlKey||e.metaKey){e.preventDefault();App.State.redo();App.EditRenderer.stopSelAnimation();App.PropPanel.refresh();}break;
      }
    });
  }

  function _setupCtxMenuHandlers(){
    document.getElementById('ctx-rotate').addEventListener('click',function(e){
      e.stopPropagation();
      var target=_ctxTargetComp;
      _closeCtxMenu();
      if(!target) return;
      var wire=App.State.getWire(target.id);
      if(wire){
        /* 도선: 꺾임 방향 전환 */
        wire.direction=wire.direction==='H-first'?'V-first':'H-first';
        App.Events.emit('state:changed');
        App.PropPanel.refresh();
      } else {
        App.State.selectedId=target.id;
        _rotateSelected();
      }
    });
    document.getElementById('ctx-dup').addEventListener('click',function(e){
      e.stopPropagation();
      var id=_ctxTargetComp?_ctxTargetComp.id:App.State.selectedId;
      _closeCtxMenu();
      if(id){ App.State.selectedId=id; _duplicateSelected(); }
    });
    document.getElementById('ctx-delete').addEventListener('click',function(e){
      e.stopPropagation();
      var id=_ctxTargetComp?_ctxTargetComp.id:App.State.selectedId;
      _closeCtxMenu();
      if(id){ App.State.selectedId=id; _deleteSelected(); }
    });
  }

  function init(){
    _cv=document.getElementById('canvas-main');
    _cv.addEventListener('pointerdown',onPointerDown);
    _cv.addEventListener('pointermove',onPointerMove);
    _cv.addEventListener('pointerup',onPointerUp);
    _cv.addEventListener('pointercancel',onPointerUp);
    _cv.addEventListener('wheel',onWheel,{passive:false});

    /* ── 우클릭 컨텍스트 메뉴 ── */
    _cv.addEventListener('contextmenu',function(e){
      e.preventDefault();
      var rect=_cv.getBoundingClientRect();
      var x=e.clientX-rect.left, y=e.clientY-rect.top;
      /* 부품 히트 */
      var comp=_hitComp(x,y);
      if(comp){
        App.State.selectedId=comp.id;
        App.PropPanel.show(comp.id);
        App.EditRenderer.startSelAnimation();
        _showCtxMenu(x,y,comp,null);
        return;
      }
      /* 도선 히트 */
      var wire=_hitWire(x,y);
      if(wire){
        App.State.selectedId=wire.id;
        App.PropPanel.show(wire.id);
        App.EditRenderer.startSelAnimation();
        _showCtxMenu(x,y,null,wire);
        return;
      }
      /* 선택된 부품 */
      if(App.State.selectedId){
        var sel=App.State.getComponent(App.State.selectedId);
        if(sel){ _showCtxMenu(x,y,sel,null); return; }
        var selW=App.State.getWire(App.State.selectedId);
        if(selW){ _showCtxMenu(x,y,null,selW); }
      }
    });

    var cont=document.getElementById('canvas-container');
    /* touchstart/touchmove preventDefault: 캔버스 요소에서만 적용.
     * 버튼·입력 요소에서 preventDefault하면 합성 click 이벤트가 차단되어
     * mode-btn, 속성 패널 버튼 등 모든 클릭 이벤트가 동작하지 않음. */
    var CANVAS_IDS={
      'canvas-bg':1,'canvas-main':1,'canvas-anim':1,'canvas-container':1
    };
    function _isCanvasTarget(e){
      var t=e.target;
      return t&&(CANVAS_IDS[t.id]||t.tagName==='CANVAS');
    }
    cont.addEventListener('touchstart',function(e){
      if(_isCanvasTarget(e)) e.preventDefault();
    },{passive:false});
    cont.addEventListener('touchmove', function(e){
      if(_isCanvasTarget(e)) e.preventDefault();
    },{passive:false});
    document.addEventListener('pointermove',function(e){_moveSidebarDrag(e.clientX,e.clientY);});
    document.addEventListener('pointerup',  function(e){_endSidebarDrag(e.clientX,e.clientY);});
    _setupKeyboard();
    _setupCtxMenuHandlers();
  }

  return{init,applyZoom,cancelInertia,getDraggedId,getDragInfo,startSidebarDrag,
         deleteSelected:_deleteSelected,rotateSelected:_rotateSelected};
})();

}());
</script>


<!-- ═══════════════════ Script 11 — Transient Graph ═══════════════════ -->
<script>
(function(){
'use strict';
var App=window.App;

App.TransientGraph=(function(){
  /* ── 캔버스 & 애니메이션 상태 ── */
  var _cv=null, _ctx=null;
  var _rafId=null;
  var _running=false;
  var _resizeObs=null;

  /* ── 시뮬레이션 상태 ── */
  var _t=0, _dt=0.5e-3;     // 현재 시간, 적분 스텝(s)
  var _tMax=0.1;            // 그래프 시간축 최대 (5·τ로 자동 보정)
  var _history={};          // { compId → Float32Array } 계산된 전류 곡선
  var _active={};           // { compId → bool } 토글 켜짐 여부
  var _compList=[];         // [{id,type,label,color}] 범례용

  /* 곡선 색상 팔레트 (소자 순서대로 순환 배정) */
  var _colors=['#50c8ff','#ffa040','#60e080','#e060e0','#f0e060','#e08080'];

  /* 극점 정보: _computeTransient에서 계산, _drawGraph 수식 레이블에서 사용
   *   {alpha:1/τ, omegad:감쇠진동 각주파수, isOsc:진동 여부} */
  var _systemPoles={alpha:0, omegad:0, isOsc:false};

  /* 과도응답 핏 데이터 (비유 모드 재사용용)
   *   { compId → {amp, tau, isRising} }  + _domTau(dominant 시상수) */
  var _fitData={};
  var _domTau=0;

  /* 전 소자/도선 시변 전류 모델 (비유 모드 재사용용)
   *   _branchModel = { byComp:{compId:{i0,iinf,tau}}, byWire:{wireId:{i0,iinf,tau}}, domTau }
   *   각 가지 전류는 i(t) = iinf + (i0−iinf)·e^(−t/τ) (1차 회로 가정). */
  var _branchModel=null;

  /* 회로 파라미터 추출 (DC 회로 + 동적 소자 L/C 존재 시에만) */
  function _extractParams(){
    var comps=App.State.components;
    var sr=App.State.solverResult;
    if(!sr||!sr.valid||sr.acPhasor) return null; /* DC만 */

    var caps=comps.filter(function(c){return c.type===TYPE.CAPACITOR;});
    var inds=comps.filter(function(c){return c.type===TYPE.INDUCTOR;});
    var ress=comps.filter(function(c){return c.type===TYPE.RESISTOR;});
    var srcs=comps.filter(function(c){return c.type===TYPE.DC_SOURCE;});

    if(!caps.length&&!inds.length) return null; /* 동적 소자 없음 */

    var Req=ress.reduce(function(s,r){return s+(r.value||0);},0)||1;  // 등가 저항(직렬 합산)
    var Vsrc=srcs.length>0?(srcs[0].value||0):0;                      // 등가 전압원

    return{Req:Req, Vsrc:Vsrc, caps:caps, inds:inds};
  }

  /* ── 과도 응답 수치 해석 (MNA 상태공간 + Crank-Nicolson 사다리꼴 적분) ──
   *
   * 토폴로지 자동 감지:
   *   인덕터(L)·축전기(C)가 같은 노드 쌍 → 병렬 LC, 그 외 → 직렬 RLC
   *
   * 상태변수 x = [노드전압 | 인덕터전류 | 전압원전류]
   *   C_mna·dx/dt + G_mna·x = b   (사다리꼴 적분으로 시간 전진)
   *
   * 시정수 τ: Thevenin 공식 (수치 안정)
   *   τ_L = L·I_inf/V_oc,  τ_C = C·V_inf/I_0
   * 사후처리: 1패스 배열에서 실제 τ·진폭 역산 → 해석적 지수곡선 재생성
   *   (사다리꼴 t=0 forward-diff 과대평가로 인한 수직 점프 제거)
   * ──────────────────────────────────────────────────────────────────── */
  function _computeTransient(params){
    var V=params.Vsrc;
    var caps=params.caps, inds=params.inds;
    var STEPS=1000;
    var result={};
    _branchModel=null;   /* 매 계산마다 초기화 */

    /* ══════════════════════════════════════════════════════════════════
     * MNA 과도응답 솔버 (완전 독립 IC 기반)
     *
     * 시정수 계산 버그 수정:
     *   버그1: caps.forEach에서 인덱스 k 누락 → 외부 k 사용 → 잘못된 ic_sol 참조
     *   버그2: τ_L 계산을 bI[ind.id]에 의존 → 0이면 τ≈0 or overflow
     *
     * 해결: IC 시스템 두 번 풀기
     *   IC_0  (L=개방, C=단락): t=0 초기조건 + V_oc(L), I_0(C)
     *   IC_inf(L=단락, C=개방): t=∞ 정상상태 + I_inf(L), V_inf(C)
     *
     *   τ_L = L · I_inf / V_oc   (Thevenin: R_th = V_oc/I_inf)
     *   τ_C = C · V_inf / I_0    (Thevenin: R_th = V_inf/I_0)
     * ══════════════════════════════════════════════════════════════════ */

    function mat(n){var m=[];for(var i=0;i<n;i++)m.push(new Float64Array(n));return m;}
    function vec(n){return new Float64Array(n);}
    function matvec(A,x){
      var n=x.length,y=vec(n);
      for(var i=0;i<n;i++)for(var j=0;j<n;j++)y[i]+=A[i][j]*x[j];
      return y;
    }
    function solve(A,b){
      var n=b.length;
      var a=A.map(function(r){return Float64Array.from(r);});
      var x=Float64Array.from(b);
      for(var col=0;col<n;col++){
        var mx=col,mv=Math.abs(a[col][col]);
        for(var rr=col+1;rr<n;rr++){var v=Math.abs(a[rr][col]);if(v>mv){mv=v;mx=rr;}}
        if(mv<1e-14)return null;
        if(mx!==col){var t=a[col];a[col]=a[mx];a[mx]=t;var tb=x[col];x[col]=x[mx];x[mx]=tb;}
        var piv=a[col][col];
        for(var r2=col+1;r2<n;r2++){
          var f=a[r2][col]/piv;if(Math.abs(f)<1e-16)continue;
          for(var c2=col;c2<n;c2++)a[r2][c2]-=f*a[col][c2];
          x[r2]-=f*x[col];
        }
      }
      var sol=new Float64Array(n);
      for(var i2=n-1;i2>=0;i2--){
        sol[i2]=x[i2];
        for(var j2=i2+1;j2<n;j2++)sol[i2]-=a[i2][j2]*sol[j2];
        sol[i2]/=a[i2][i2];
      }
      return sol;
    }

    var sr=App.State.solverResult;
    var cn=sr&&sr.componentNodes;
    var comps=App.State.components;

    /* ── 폴백 ── */
    if(!cn){
      var Req=params.Req;
      _fitData={}; _domTau=0;
      var fbByComp={}, fbByWire={};
      inds.forEach(function(ind){
        var R=Math.max(Req,1e-3),L=ind.value||1e-3,tau=L/R,Iinf=V/R;
        _tMax=Math.max(_tMax,tau*5); _domTau=Math.max(_domTau,tau);
        _fitData[ind.id]={amp:Iinf, tau:tau, isRising:true};
        fbByComp[ind.id]={i0:0, iinf:Iinf, tau:tau};
        var a=new Float32Array(STEPS);
        for(var k=0;k<STEPS;k++)a[k]=Iinf*(1-Math.exp(-k/(STEPS-1)*_tMax/tau));
        result[ind.id]=a;
      });
      caps.forEach(function(cap){
        var R=Math.max(Req,1e-3),C=cap.value||1e-6,tau=R*C,I0=V/R;
        _tMax=Math.max(_tMax,tau*5); _domTau=Math.max(_domTau,tau);
        _fitData[cap.id]={amp:I0, tau:tau, isRising:false};
        fbByComp[cap.id]={i0:I0, iinf:0, tau:tau};
        var a=new Float32Array(STEPS);
        for(var k=0;k<STEPS;k++)a[k]=I0*Math.exp(-k/(STEPS-1)*_tMax/tau);
        result[cap.id]=a;
      });
      _branchModel={byComp:fbByComp, byWire:fbByWire, byNode:null, compNodes:null, domTau:_domTau};
      return result;
    }

    /* ── 1. 노드 수 ── */
    var maxNode=0;
    comps.forEach(function(c){
      var nn=cn[c.id];if(!nn)return;
      nn.forEach(function(n){if(n>maxNode)maxNode=n;});
    });
    var nNodes=maxNode;

    /* ── 2. 소자 목록 ── */
    var vsrcs=comps.filter(function(c){
      return c.type===TYPE.DC_SOURCE||c.type===TYPE.AC_SOURCE;
    });
    var nL=inds.length,nVs=vsrcs.length,nC=caps.length;
    var N=nNodes+nL+nVs;
    if(N<=0)return result;

    var L_OFF=nNodes,V_OFF=nNodes+nL;

    function nIdx(n){return n===0?-1:n-1;}
    function stamp2(M,p,q,val){
      if(p>=0)M[p][p]+=val;
      if(q>=0)M[q][q]+=val;
      if(p>=0&&q>=0){M[p][q]-=val;M[q][p]-=val;}
    }

    /* ══════════════════════════════════════════════════════════════════
     * ── 3. IC 시스템 헬퍼 ──────────────────────────────────────────
     * solveIC(shortL, shortC):
     *   shortL=true  → L 단락(V=0 전압원으로 치환)
     *   shortL=false → L 개방(스탬프 없음)
     *   shortC=true  → C 단락(V=0 전압원으로 치환)
     *   shortC=false → C 개방(스탬프 없음)
     *
     * 반환: sol 배열
     *   [0 .. nNodes-1]       : 노드 전압
     *   [nNodes .. +nVs-1]    : 전압원 전류
     *   [nNodes+nVs .. +nL-1] : (shortL=true) 인덕터 단락 전류
     *   [nNodes+nVs+nL .. +nC-1]: (shortC=true) 커패시터 단락 전류
     * ══════════════════════════════════════════════════════════════════ */
    function solveIC(shortL, shortC){
      var nExtra=(shortL?nL:0)+(shortC?nC:0);
      var N2=nNodes+nVs+nExtra;
      var G2=mat(N2),b2=vec(N2);
      var L_IC_OFF=nNodes+nVs;
      var C_IC_OFF=nNodes+nVs+(shortL?nL:0);

      /* 저항 */
      comps.forEach(function(c){
        if(c.type!==TYPE.RESISTOR)return;
        var nn=cn[c.id];if(!nn)return;
        stamp2(G2,nIdx(nn[0]),nIdx(nn[1]),c.value>0?1/c.value:1e6);
      });
      /* 전압원 */
      vsrcs.forEach(function(vs,k){
        var nn=cn[vs.id];if(!nn)return;
        var p=nIdx(nn[0]),q=nIdx(nn[1]),kv=nNodes+k;
        var Vs=vs.type===TYPE.DC_SOURCE?(vs.value||0):0;
        if(p>=0){G2[p][kv]+=1;G2[kv][p]+=1;}
        if(q>=0){G2[q][kv]-=1;G2[kv][q]-=1;}
        b2[kv]=Vs;
      });
      /* 인덕터 */
      var G_OPEN=1e-9; /* 개방 = 1GΩ 저항 (행렬 가역성 보장) */
      inds.forEach(function(ind,k){
        var nn=cn[ind.id];if(!nn)return;
        var p=nIdx(nn[0]),q=nIdx(nn[1]);
        if(shortL){
          /* V=0 전압원(단락) */
          var ki=L_IC_OFF+k;
          if(p>=0){G2[p][ki]+=1;G2[ki][p]+=1;}
          if(q>=0){G2[q][ki]-=1;G2[ki][q]-=1;}
          /* b2[ki]=0: V_L=0 */
        } else {
          /* 개방: 1GΩ 저항으로 근사 (singular 방지) */
          stamp2(G2,p,q,G_OPEN);
        }
      });
      /* 커패시터 */
      caps.forEach(function(cap,k){
        var nn=cn[cap.id];if(!nn)return;
        var p=nIdx(nn[0]),q=nIdx(nn[1]);
        if(shortC){
          /* V=0 전압원(단락) */
          var kc=C_IC_OFF+k;
          if(p>=0){G2[p][kc]+=1;G2[kc][p]+=1;}
          if(q>=0){G2[q][kc]-=1;G2[kc][q]-=1;}
          /* b2[kc]=0 */
        } else {
          /* 개방: 1GΩ 저항으로 근사 (singular 방지) */
          stamp2(G2,p,q,G_OPEN);
        }
      });

      return solve(G2,b2);
    }

    /* IC_0:  L=개방, C=단락 → t=0 초기조건 + V_oc(L), I_0(C) */
    var C_IC0_OFF=nNodes+nVs;  /* (shortL=false이므로 L 추가변수 없음) */
    var sol0=solveIC(false,true);

    /* IC_inf: L=단락, C=개방 → t=∞ 정상상태 + I_inf(L) */
    var L_ICinf_OFF=nNodes+nVs;
    var solinf=solveIC(true,false);

    /* ── 4. MNA 행렬 스탬프 ── */
    var G_mna=mat(N),C_mna=mat(N),b_vec=vec(N);
    comps.forEach(function(c){
      var nn=cn[c.id];if(!nn)return;
      var p=nIdx(nn[0]),q=nIdx(nn[1]);
      if(c.type===TYPE.RESISTOR)  stamp2(G_mna,p,q,c.value>0?1/c.value:1e6);
      if(c.type===TYPE.CAPACITOR) stamp2(C_mna,p,q,c.value||1e-6);
    });
    inds.forEach(function(ind,k){
      var nn=cn[ind.id];if(!nn)return;
      var p=nIdx(nn[0]),q=nIdx(nn[1]),ki=L_OFF+k,Lv=ind.value||1e-3;
      if(p>=0){G_mna[p][ki]-=1;G_mna[ki][p]+=1;}
      if(q>=0){G_mna[q][ki]+=1;G_mna[ki][q]-=1;}
      C_mna[ki][ki]+=Lv;
    });
    vsrcs.forEach(function(vs,k){
      var nn=cn[vs.id];if(!nn)return;
      var p=nIdx(nn[0]),q=nIdx(nn[1]),kv=V_OFF+k;
      var Vs=vs.type===TYPE.DC_SOURCE?(vs.value||0):0;
      if(p>=0){G_mna[p][kv]+=1;G_mna[kv][p]+=1;}
      if(q>=0){G_mna[q][kv]-=1;G_mna[kv][q]-=1;}
      b_vec[kv]=Vs;
    });

    /* ── 5. 초기 상태 x ── */
    var x=vec(N);
    if(sol0){
      for(var i=0;i<nNodes;i++) x[i]=sol0[i];
      for(var k=0;k<nL;k++)     x[L_OFF+k]=0;
      for(var k=0;k<nVs;k++)    x[V_OFF+k]=sol0[nNodes+k];
    }

    /* ── 6. τ 추정 — Thevenin 공식 ─────────────────────────────────
     *
     * τ_L = L · I_inf / V_oc
     *   V_oc: IC_0(L=개방)에서 L 단자 개방전압 (sol0 에서 직접 읽음)
     *   I_inf: IC_inf(L=단락)에서 인덕터 단락전류
     *
     * τ_C = C · V_inf / I_0
     *   V_inf: IC_inf(C=개방)에서 C 양단 전압
     *   I_0: IC_0(C=단락)에서 C 단락전류 = sol0[C_IC0_OFF+k]
     *
     * 이 공식은 회로 복잡도와 무관하게 수치적으로 완전히 안정합니다.
     * dt_try 기반 수치 미분 방법은 C_mna/dt_try 조건수 폭발로 인해
     * 수치 불안정 (예: C=100pF, R=100Ω → dt_try=0.1ns, C/dt=1e3 → ill-conditioned)
     * ──────────────────────────────────────────────────────────────── */
    var tauMax=1e-9;

    inds.forEach(function(ind,k){
      var nn=cn[ind.id];if(!nn)return;
      var p=nIdx(nn[0]),q=nIdx(nn[1]);
      var V_oc=sol0?Math.abs((p>=0?sol0[p]:0)-(q>=0?sol0[q]:0)):0;
      var I_inf=solinf?Math.abs(solinf[L_ICinf_OFF+k]||0):0;
      var tau;
      if(V_oc>1e-12&&I_inf>1e-15) tau=(ind.value||1e-3)*I_inf/V_oc;
      else tau=(ind.value||1e-3)/Math.max(params.Req,1);
      tauMax=Math.max(tauMax,tau*5);
    });

    caps.forEach(function(cap,k){
      var nn=cn[cap.id];if(!nn)return;
      var p=nIdx(nn[0]),q=nIdx(nn[1]);
      var I_0=sol0?Math.abs(sol0[C_IC0_OFF+k]||0):0;
      var V_inf=solinf?Math.abs((p>=0?solinf[p]:0)-(q>=0?solinf[q]:0)):0;
      var tau;
      if(I_0>1e-15&&V_inf>1e-12) tau=(cap.value||1e-6)*V_inf/I_0;
      else tau=Math.max(params.Req,1)*(cap.value||1e-6);
      tauMax=Math.max(tauMax,tau*5);
    });

    /* RLC 공진 주기도 고려 */
    if(nL>0&&nC>0){
      var Ltot=inds.reduce(function(s,l){return s+(l.value||0);},0)||1e-3;
      var Ctot=1/caps.reduce(function(s,c){return s+1/(c.value||1e-6);},0);
      tauMax=Math.max(tauMax,20*Math.sqrt(Ltot*Ctot));
    }

    _tMax=tauMax;
    var dt=_tMax/STEPS;

    /* ══════════════════════════════════════════════════════════════════
     * 전 소자/도선 시변 전류 모델 구축 (비유 모드 재사용)
     *   sol0  : t=0  (L 개방, C 단락) 노드전압 + 전원전류 + C단락전류
     *   solinf: t=∞ (L 단락, C 개방) 노드전압 + 전원전류 + L단락전류
     *   각 가지: i(t) = iinf + (i0 − iinf)·e^{−t/τ_dom}
     * ══════════════════════════════════════════════════════════════════ */
    (function(){
      var domTau=tauMax/5;   // tauMax=5·domTau
      if(!(domTau>1e-15)) domTau=Math.max(params.Req,1)*1e-6;
      var byComp={}, byWire={};

      function nodeVolt(sol,node){ var i=nIdx(node); return (i>=0&&sol)?sol[i]:0; }

      /* 저항: i = (Vp − Vq)/R, 전원: 전압원 전류, L: i0=0·iinf=단락전류, C: i0=단락전류·iinf=0 */
      comps.forEach(function(c){
        var nn=cn[c.id]; if(!nn) return;
        var i0=0, iinf=0;
        if(c.type===TYPE.RESISTOR){
          var R=c.value>0?c.value:1e-6;
          i0  =(nodeVolt(sol0,nn[0])  -nodeVolt(sol0,nn[1])) /R;
          iinf=(nodeVolt(solinf,nn[0])-nodeVolt(solinf,nn[1]))/R;
        } else if(c.type===TYPE.DC_SOURCE||c.type===TYPE.AC_SOURCE){
          var kv=vsrcs.indexOf(c);
          if(kv>=0){ i0=sol0?(sol0[nNodes+kv]||0):0; iinf=solinf?(solinf[nNodes+kv]||0):0; }
        } else if(c.type===TYPE.INDUCTOR){
          var kL=inds.indexOf(c);
          i0=0;  /* t=0 인덕터 전류=0 */
          iinf=(kL>=0&&solinf)?(solinf[L_ICinf_OFF+kL]||0):0;
        } else if(c.type===TYPE.CAPACITOR){
          var kC=caps.indexOf(c);
          i0=(kC>=0&&sol0)?(sol0[C_IC0_OFF+kC]||0):0;
          iinf=0;  /* t=∞ 커패시터 전류=0 */
        }
        byComp[c.id]={i0:i0, iinf:iinf, tau:domTau};
      });

      /* ── 노드별 시변 전위 모델 (#3) ──
       *   v_node(t) = vinf + (v0 − vinf)·e^{−t/τ}
       *   sol0/solinf 의 노드전압을 그대로 사용. 그라운드(node 0)=0V 고정. */
      var byNode={};
      var maxNodeId=0;
      comps.forEach(function(c){ var nn=cn[c.id]; if(nn) nn.forEach(function(n){ if(n>maxNodeId)maxNodeId=n; }); });
      for(var nd=0; nd<=maxNodeId; nd++){
        if(nd===0){ byNode[0]={v0:0,vinf:0,tau:domTau}; continue; }
        byNode[nd]={ v0:nodeVolt(sol0,nd), vinf:nodeVolt(solinf,nd), tau:domTau };
      }

      /* 도선: 양 끝 소자 중 전류를 아는 쪽으로 i(t) 결정 (부호 보존, #2).
       *   부호 기준: fromPort→toPort 가 양(+). 연결 소자의 부호 있는 i0/iinf 를
       *   도선 방향에 맞춰 변환한다. */
      App.State.wires.forEach(function(w){
        var fromComp=App.State.getComponent(w.fromId);
        var toComp=App.State.getComponent(w.toId);
        var isJ=function(cc){return cc&&(cc.type===TYPE.JUNCTION_3||cc.type===TYPE.JUNCTION_4);};
        /* 기준 소자(전류를 아는 쪽) 선택: 분기점이 아닌 쪽 우선 */
        var refId=null, refIsFrom=true, refPort=null;
        if(!isJ(fromComp) && byComp[w.fromId]){ refId=w.fromId; refIsFrom=true; refPort=w.fromPort; }
        else if(!isJ(toComp) && byComp[w.toId]){ refId=w.toId; refIsFrom=false; refPort=w.toPort; }
        if(!refId){ byWire[w.id]={i0:0,iinf:0,tau:domTau,signed:false}; return; }
        var rc=byComp[refId];
        /* refPortIdx: 도선이 붙은 소자 포트의 순서(0/1). 소자 부호전류 s0는
         *   ports[0]→ports[1] 가 +. 도선이 ports[1]에 붙으면 전류가 소자에서
         *   도선으로 나가는(+) 방향이 도선 from→to 와 정렬됨(refIsFrom 고려). */
        var refComp=App.State.getComponent(refId);
        var refPorts=App.Geo.getCompPorts(refComp);
        var refPortIdx=refPorts.indexOf(refPort);
        byWire[w.id]={ i0:Math.abs(rc.i0), iinf:Math.abs(rc.iinf), tau:domTau,
                       refId:refId, refIsFrom:refIsFrom, refPortIdx:refPortIdx };
      });

      /* 소자 전류 부호 보존본 (도선 방향 결정용) */
      comps.forEach(function(c){
        var nn=cn[c.id]; if(!nn) return;
        var s0=0, sinf=0;
        if(c.type===TYPE.RESISTOR){
          var R=c.value>0?c.value:1e-6;
          s0  =(nodeVolt(sol0,nn[0])  -nodeVolt(sol0,nn[1])) /R;
          sinf=(nodeVolt(solinf,nn[0])-nodeVolt(solinf,nn[1]))/R;
        } else if(c.type===TYPE.DC_SOURCE||c.type===TYPE.AC_SOURCE){
          var kv=vsrcs.indexOf(c);
          if(kv>=0){ s0=sol0?(sol0[nNodes+kv]||0):0; sinf=solinf?(solinf[nNodes+kv]||0):0; }
        } else if(c.type===TYPE.INDUCTOR){
          var kL=inds.indexOf(c);
          sinf=(kL>=0&&solinf)?(solinf[L_ICinf_OFF+kL]||0):0;
        } else if(c.type===TYPE.CAPACITOR){
          var kC=caps.indexOf(c);
          s0=(kC>=0&&sol0)?(sol0[C_IC0_OFF+kC]||0):0;
        }
        byComp[c.id].s0=s0; byComp[c.id].sinf=sinf;   // 부호 있는 전류
      });

      _branchModel={ byComp:byComp, byWire:byWire, byNode:byNode,
                     compNodes:cn, domTau:domTau };
    })();
    var isAlg=new Uint8Array(N);
    for(var i=0;i<N;i++){
      var hasC=false;
      for(var j=0;j<N;j++)if(Math.abs(C_mna[i][j])>1e-20){hasC=true;break;}
      isAlg[i]=hasC?0:1;
    }
    var A_mat=mat(N),B_mat=mat(N);
    for(var i=0;i<N;i++)for(var j=0;j<N;j++){
      if(isAlg[i]){
        A_mat[i][j]=G_mna[i][j];
        B_mat[i][j]=0;
      } else {
        A_mat[i][j]=C_mna[i][j]/dt+G_mna[i][j]/2;
        B_mat[i][j]=C_mna[i][j]/dt-G_mna[i][j]/2;
      }
    }

    /* ── 9. 전류 배열 초기화 ── */
    var iL_arrs=inds.map(function(ind){return{id:ind.id,arr:new Float32Array(STEPS)};});
    var iC_arrs=caps.map(function(cap,k){
      return{id:cap.id,arr:new Float32Array(STEPS),nn:cn[cap.id],Cv:cap.value||1e-6};
    });

    /* ── 10. 적분 루프 ── */
    var xp=new Float64Array(x);
    for(var step=0;step<STEPS;step++){

      /* 인덕터 전류: 현재 상태(xp) 기록 */
      for(var k=0;k<nL;k++) iL_arrs[k].arr[step]=Math.abs(xp[L_OFF+k]);

      /* 다음 상태 계산 */
      var rhs=matvec(B_mat,xp);
      for(var i=0;i<N;i++)rhs[i]+=b_vec[i];
      var xn=solve(A_mat,rhs);
      if(!xn)break;

      /* 커패시터 전류: i_C = C · Δv / dt
       * step=0: arr[0] = forward diff (t=0의 실제 초기전류)
       *         arr[1] 은 아래 backward diff로 기록
       * step>0: arr[step+1] = backward diff */
      iC_arrs.forEach(function(ci){
        var nn=ci.nn;if(!nn)return;
        var p=nIdx(nn[0]),q=nIdx(nn[1]);
        var dvn=(p>=0?xn[p]:0)-(q>=0?xn[q]:0);
        var dvp=(p>=0?xp[p]:0)-(q>=0?xp[q]:0);
        var iC=Math.abs(ci.Cv*(dvn-dvp)/dt);
        if(step===0){
          /* t=0 초기값: forward diff v[1]-v[0] 은 첫 스텝의 변화량
           * = 실제 i_C(0+). arr[0]과 arr[1] 모두 동일 값으로 초기화하면
           * 연속적으로 보임 */
          ci.arr[0]=iC;
        }
        if(step+1<STEPS) ci.arr[step+1]=iC;
      });

      xp=xn;
    }

    /* ── 11. 결과 수집 ── */
    iL_arrs.forEach(function(o){result[o.id]=o.arr;});
    iC_arrs.forEach(function(o){result[o.id]=o.arr;});

    /* ── 12. 사후처리: τ·진폭 추출 → 해석적 곡선 재생성 ──────────────
     *
     * 사다리꼴 수치적분은 t=0 첫 스텝에서 forward-diff 과대평가로
     * arr[0]이 실제 곡선보다 크게 나와 수직 점프(급강하/급상승)를 만듦.
     *
     * 해결: 1패스 배열에서 실제 τ와 진폭을 역산한 뒤,
     *   각 소자를 1차 지수 곡선으로 해석적으로 재생성.
     *     증가형(RL):  i(t) = I_inf·(1 - e^{-t/τ})
     *     감소형(RC):  i(t) = I_0·e^{-t/τ}
     *
     * τ 역산: 안정 구간 두 점 t1=0.2T, t2=0.6T (T=1패스 _tMax)
     *   증가형: τ = (t2-t1)/ln((I_inf-i1)/(I_inf-i2))
     *   감소형: τ = (t2-t1)/ln(i1/i2)
     * 진폭 역산: 여러 점에서 e 보정 후 평균 (노이즈 완화)
     * ──────────────────────────────────────────────────────────────── */
    var _tMaxPass1=_tMax;  /* 1패스 시간축 보존 */
    var allArrs=iL_arrs.concat(iC_arrs);

    /* 각 소자별 τ, 진폭, 방향 추출 */
    var fits=allArrs.map(function(o){
      var arr=o.arr, Nf=arr.length;
      var Iend=arr[Nf-1];
      var peak=0;
      for(var ki=0;ki<Nf;ki++) if(Math.abs(arr[ki])>Math.abs(peak)) peak=arr[ki];
      var isRising=Math.abs(Iend)>Math.abs(peak)*0.5;

      var k1=Math.round(Nf*0.2), k2=Math.round(Nf*0.6);
      var t1=k1/(Nf-1)*_tMaxPass1, t2=k2/(Nf-1)*_tMaxPass1;
      var i1=Math.abs(arr[k1]), i2=Math.abs(arr[k2]);
      var Ie=Math.abs(Iend);

      var tau=0;
      if(isRising){
        var r1=Ie-i1, r2=Ie-i2;
        if(r1>1e-30&&r2>1e-30&&r1>r2) tau=(t2-t1)/Math.log(r1/r2);
      } else {
        if(i1>1e-30&&i2>1e-30&&i1>i2) tau=(t2-t1)/Math.log(i1/i2);
      }

      return {o:o, tau:tau, isRising:isRising, Nf:Nf};
    });

    /* dominant τ (가장 느린 소자 기준으로 시간축 결정) */
    var dominantTau=0;
    fits.forEach(function(f){ if(f.tau>1e-30&&isFinite(f.tau)) dominantTau=Math.max(dominantTau,f.tau); });

    /* 비유 모드 재사용 데이터 초기화 */
    _fitData={}; _domTau=dominantTau;

    if(dominantTau>1e-15){
      _tMax=dominantTau*5;
      dt=_tMax/STEPS;
      _systemPoles={alpha:1/dominantTau, omegad:0, isOsc:false};

      /* 각 소자 해석적 재생성 */
      fits.forEach(function(f){
        var arr=f.o.arr, Nf=f.Nf;
        var tau=(f.tau>1e-30&&isFinite(f.tau))?f.tau:dominantTau;

        /* 진폭 추출: 안정 구간 여러 점에서 e 보정 후 평균 */
        var amp=0, cnt=0;
        var kStart=Math.round(Nf*0.1), kEnd=Math.round(Nf*0.6);
        for(var kk=kStart;kk<=kEnd;kk++){
          var tt=kk/(Nf-1)*_tMaxPass1;
          var v=Math.abs(arr[kk]);
          if(f.isRising){
            var d=1-Math.exp(-tt/tau);
            if(d>1e-6){ amp+=v/d; cnt++; }
          } else {
            amp+=v*Math.exp(tt/tau); cnt++;
          }
        }
        amp=cnt>0?amp/cnt:Math.abs(arr[Nf-1]);

        /* 비유 모드용 핏 데이터 저장 */
        _fitData[f.o.id]={amp:amp, tau:tau, isRising:f.isRising};

        /* 새 시간축으로 해석적 곡선 생성 */
        var newArr=new Float32Array(Nf);
        for(var k=0;k<Nf;k++){
          var t=k/(Nf-1)*_tMax;
          newArr[k]=f.isRising
            ? amp*(1-Math.exp(-t/tau))
            : amp*Math.exp(-t/tau);
        }
        f.o.arr=newArr;
      });

      /* 결과 갱신 */
      result={};
      iL_arrs.forEach(function(o){result[o.id]=o.arr;});
      iC_arrs.forEach(function(o){result[o.id]=o.arr;});
    }

    return result;
  }
  function _buildToggles(params){
    var toggleDiv=document.getElementById('transient-toggles');
    var legendDiv=document.getElementById('transient-legend');
    if(!toggleDiv||!legendDiv) return;
    toggleDiv.innerHTML=''; legendDiv.innerHTML='';
    _compList=[];

    var allComps=params.caps.concat(params.inds);
    allComps.forEach(function(c,idx){
      var color=_colors[idx%_colors.length];
      var label=(c.type===TYPE.CAPACITOR?'C':'L')+(idx+1)+
                (c.label?' ('+c.label+')':'');
      _compList.push({id:c.id,type:c.type,label:label,color:color});
      _active[c.id]=true;

      var btn=document.createElement('button');
      btn.className='tp-toggle active';
      btn.textContent=label;
      btn.style.borderColor=color; btn.style.color=color;
      btn.style.background='rgba(0,0,0,0.3)';
      btn.dataset.compId=c.id;
      btn.addEventListener('click',function(){
        _active[c.id]=!_active[c.id];
        btn.classList.toggle('active',_active[c.id]);
        _drawGraph();
      });
      toggleDiv.appendChild(btn);

      var leg=document.createElement('span');
      leg.style.color=color;
      leg.textContent='— '+label+': '+
        (c.type===TYPE.CAPACITOR?'충전전류 i_C(t)':'인덕터전류 i_L(t)');
      legendDiv.appendChild(leg);
    });
  }

  /* ── 단위 보기 좋은 눈금 계산 ──────────────────────────────────────
   * 범위 [0, rawMax] 에 대해 "보기 좋은" 최대값과 눈금 간격을 결정.
   * 예: rawMax=0.00234 → niceMax=0.0025, step=0.0005 (5단계)
   * ─────────────────────────────────────────────────────────────── */
  function _niceScale(rawMax, nDiv){
    if(rawMax<=0) return{max:1,step:0.2};
    var rough=rawMax/nDiv;
    var mag=Math.pow(10,Math.floor(Math.log10(rough)));
    var norm=rough/mag;
    var nice=norm<=1?1:norm<=2?2:norm<=5?5:10;
    var step=nice*mag;
    var niceMax=Math.ceil(rawMax/step)*step;
    return{max:niceMax, step:step};
  }

  /* 값→단위 문자열 (시간용, 전류용 공통) */
  function _fmtVal(v, isTime){
    if(isTime){
      if(Math.abs(v)<1e-9) return '0';
      if(Math.abs(v)<1e-6) return (v*1e9).toPrecision(3)+'ns';
      if(Math.abs(v)<1e-3) return (v*1e6).toPrecision(3)+'µs';
      if(Math.abs(v)<1)    return (v*1e3).toPrecision(3)+'ms';
      return v.toPrecision(3)+'s';
    } else {
      if(Math.abs(v)<1e-12) return '0';
      if(Math.abs(v)<1e-9)  return (v*1e12).toPrecision(3)+'pA';
      if(Math.abs(v)<1e-6)  return (v*1e9 ).toPrecision(3)+'nA';
      if(Math.abs(v)<1e-3)  return (v*1e6 ).toPrecision(3)+'µA';
      if(Math.abs(v)<1)     return (v*1e3 ).toPrecision(3)+'mA';
      return v.toPrecision(4)+'A';
    }
  }

  /* ── 그래프 렌더 (활성 소자 기반 동적 스케일 + 수식 레이블) ── */
  function _drawGraph(){
    if(!_cv||!_ctx) return;

    /* KaTeX 오버레이용 레이블 수집 배열 */
    var _pendingLabels=[];

    var dpr=window.devicePixelRatio||1;
    var rect=_cv.getBoundingClientRect();
    if(rect.width<=0||rect.height<=0) return;

    var isMobile=window.innerWidth<=480;
    var targetH=isMobile
      ? Math.min(160, Math.round(window.innerHeight*0.28))
      : 180;

    _cv.style.height=targetH+'px';

    var physW=Math.round(rect.width*dpr);
    var physH=Math.round(targetH*dpr);
    if(_cv.width!==physW)  _cv.width=physW;
    if(_cv.height!==physH) _cv.height=physH;

    _ctx.setTransform(dpr,0,0,dpr,0,0);

    var W=rect.width, H=targetH;
    _ctx.clearRect(0,0,W,H);

    /* ── 여백 ── */
    var PAD={left:52, right:14, top:12, bottom:28};
    var gW=W-PAD.left-PAD.right;
    var gH=H-PAD.top-PAD.bottom;

    /* ── 배경 ── */
    _ctx.fillStyle='rgba(4,10,24,1)';
    _ctx.fillRect(0,0,W,H);
    _ctx.fillStyle='rgba(14,26,56,0.8)';
    _ctx.fillRect(PAD.left,PAD.top,gW,gH);

    /* ── 활성 소자 데이터 수집 ── */
    var STEPS_N=1000;
    var dataMinI=Infinity, dataMaxI=-Infinity, hasData=false;

    /* x축 동적 범위: 활성 소자들의 데이터에서 수렴 시점 추출
     * 방법: 각 배열에서 최종값의 99%에 처음 도달하는 인덱스 k_eff 계산
     *       → t_eff = k_eff / (N-1) * _tMax
     * xMax = 활성 소자 중 최대 t_eff * 1.1 (약간 여유) */
    var tEffMax=0;
    _compList.forEach(function(c){
      if(!_active[c.id]||!_history[c.id]) return;
      var arr=_history[c.id];
      var N=arr.length;

      /* y 범위 */
      for(var k=0;k<N;k++){
        var v=arr[k];
        if(v<dataMinI) dataMinI=v;
        if(v>dataMaxI) dataMaxI=v;
        hasData=true;
      }

      /* 수렴 시점: 최종값의 99%에 도달하거나, 최댓값의 1%이하로 내려가는 시점 */
      var finalV=arr[N-1];
      var peakV=0;
      for(var k2=0;k2<N;k2++) if(Math.abs(arr[k2])>peakV) peakV=Math.abs(arr[k2]);

      var kEff=N-1;
      if(Math.abs(finalV)>peakV*0.1){
        /* 증가형 (RL): 최종값의 99% 도달 시점 */
        for(var k3=0;k3<N;k3++){
          if(Math.abs(arr[k3])>=Math.abs(finalV)*0.99){kEff=k3;break;}
        }
      } else {
        /* 감소형 (RC): 최댓값의 1% 이하로 떨어지는 시점 */
        for(var k4=0;k4<N;k4++){
          if(Math.abs(arr[k4])<=peakV*0.01){kEff=k4;break;}
        }
      }
      var tEff=kEff/(N-1)*_tMax;
      if(tEff>tEffMax) tEffMax=tEff;
    });

    if(!hasData){ dataMinI=0; dataMaxI=1e-3; }
    if(tEffMax<=0) tEffMax=_tMax;

    /* x축: 활성 소자의 수렴 시점 + 10% 여유 */
    var xRaw=tEffMax*1.1;
    var scaleX=_niceScale(xRaw,5);
    var xMax=scaleX.max;

    /* y축: 활성 소자의 실제 데이터 범위 */
    var absMax=Math.max(Math.abs(dataMinI),Math.abs(dataMaxI),1e-30);
    var scaleY=_niceScale(absMax*1.05,4);
    var yMax=scaleY.max;
    var yMin=(dataMinI<-1e-30)?-scaleY.max:0;
    var yRange=yMax-yMin;

    function toPixX(t){ return PAD.left+t/xMax*gW; }
    function toPixY(iv){ return PAD.top+gH-(iv-yMin)/yRange*gH; }

    /* ── 그리드선 ── */
    _ctx.save();
    var yStep=scaleY.step, xStep=scaleX.step;
    for(var yv=yMin; yv<=yMax+yStep*0.001; yv+=yStep){
      var py=Math.round(toPixY(yv))+0.5;
      if(py<PAD.top-1||py>PAD.top+gH+1) continue;
      var isZero=Math.abs(yv)<yStep*0.01;
      _ctx.strokeStyle=isZero?'rgba(80,140,220,0.6)':'rgba(40,70,130,0.5)';
      _ctx.lineWidth=isZero?1.2:0.7;
      _ctx.beginPath(); _ctx.moveTo(PAD.left,py); _ctx.lineTo(PAD.left+gW,py); _ctx.stroke();
    }
    for(var xv=0; xv<=xMax+xStep*0.001; xv+=xStep){
      var px=Math.round(toPixX(xv))+0.5;
      if(px<PAD.left-1||px>PAD.left+gW+1) continue;
      var isOrg=xv<xStep*0.01;
      _ctx.strokeStyle=isOrg?'rgba(80,140,220,0.6)':'rgba(40,70,130,0.5)';
      _ctx.lineWidth=isOrg?1.2:0.7;
      _ctx.beginPath(); _ctx.moveTo(px,PAD.top); _ctx.lineTo(px,PAD.top+gH); _ctx.stroke();
    }
    _ctx.restore();

    /* ── 축 테두리 ── */
    _ctx.save();
    _ctx.strokeStyle='rgba(60,120,200,0.8)'; _ctx.lineWidth=1.2;
    _ctx.strokeRect(PAD.left+0.5,PAD.top+0.5,gW,gH);
    _ctx.restore();

    /* ── Y 눈금 레이블 ── */
    _ctx.save();
    _ctx.font='bold 10px "Courier New",monospace';
    _ctx.textAlign='right'; _ctx.textBaseline='middle';
    for(var yv2=yMin; yv2<=yMax+yStep*0.001; yv2+=yStep){
      var py2=Math.round(toPixY(yv2))+0.5;
      if(py2<PAD.top-1||py2>PAD.top+gH+1) continue;
      _ctx.fillStyle=Math.abs(yv2)<yStep*0.01?'#a0d0ff':'#c8e0ff';
      _ctx.fillText(_fmtVal(yv2,false), PAD.left-5, py2);
    }
    _ctx.restore();

    /* ── X 눈금 레이블 ── */
    _ctx.save();
    _ctx.font='bold 10px "Courier New",monospace';
    _ctx.textAlign='center'; _ctx.textBaseline='top';
    for(var xv2=0; xv2<=xMax+xStep*0.001; xv2+=xStep){
      var px2=Math.round(toPixX(xv2))+0.5;
      if(px2<PAD.left-1||px2>PAD.left+gW+1) continue;
      _ctx.fillStyle=xv2<xStep*0.01?'#a0d0ff':'#c8e0ff';
      _ctx.fillText(_fmtVal(xv2,true), px2, PAD.top+gH+5);
    }
    _ctx.restore();

    /* ── 커브 렌더 + 수식 레이블 ── */
    /* 레이블 y충돌 방지용 */
    var usedLabelY=[];
    function freeLabelY(preferY, lineH){
      var y=preferY;
      var tries=0;
      while(tries<20){
        var ok=true;
        for(var ui=0;ui<usedLabelY.length;ui++){
          if(Math.abs(usedLabelY[ui]-y)<lineH){ok=false;break;}
        }
        if(ok) break;
        y-=lineH;
