<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>전기회로 시뮬레이터</title>

  <!-- 외부 라이브러리: KaTeX (수식 렌더링) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>

  <!-- 외부 라이브러리: Three.js (3D 렌더링) + Cannon-es (물리 엔진) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script type="module">
    /* Cannon-es 물리 엔진을 전역(window.CANNON)으로 노출.
       모듈 import 방식이라 http(s)로 게시한 환경에서 동작한다.
       로컬 file:// 더블클릭 시엔 로드되지 않을 수 있으며,
       그 경우 AnalogyRenderer가 동일한 적분식으로 자동 폴백한다. */
    import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js';
    window.CANNON = CANNON;
  </script>

  <style>
    /* ════════════════════════════════════════════════════════════════
     * 디자인 토큰 (CSS Custom Properties)
     * ──────────────────────────────────────────────────────────────
     * 색상·간격·반경을 한 곳에서 관리. 값 변경 시 전체 일괄 반영됨.
     * ════════════════════════════════════════════════════════════════ */
    :root {
      /* 배경 계열 */
      --bg-app:        #0d0f1a;   /* 앱 전체 배경 */
      --bg-sidebar:    #111827;   /* 사이드바 */
      --bg-item:       #1a2438;   /* 사이드바 아이템 */
      --bg-panel:      rgba(10,16,30,0.97);   /* 속성 패널 */
      --bg-panel-deep: rgba(6,12,28,0.98);    /* 그래프 패널 */
      --bg-glass:      rgba(17,24,39,0.90);   /* 반투명 버튼 */
      --bg-popup:      rgba(8,14,32,0.98);    /* 값 입력 팝업 */
      --bg-ctx:        rgba(14,22,40,0.97);   /* 컨텍스트 메뉴 */

      /* 테두리 계열 */
      --border-dim:    #1e2d45;   /* 약한 구분선 */
      --border-base:   #1e3050;   /* 기본 테두리 */
      --border-item:   #253450;   /* 아이템 테두리 */
      --border-active: #2d6fc0;   /* 활성 강조 */
      --border-focus:  #4a90d9;   /* 입력 포커스 */

      /* 텍스트 계열 */
      --text-base:     #c8d6e5;   /* 기본 본문 */
      --text-dim:      #506a88;   /* 흐린 텍스트 */
      --text-label:    #607a99;   /* 라벨 */
      --text-accent:   #7ec8f0;   /* 강조(하늘색) */
      --text-accent2:  #9ecfff;   /* 강조(밝은 하늘) */
      --text-title:    #4a90d9;   /* 제목 */

      /* 위험(삭제) 계열 */
      --danger-bg:     #3a1010;
      --danger-border: #5a2020;
      --danger-text:   #f08080;

      /* 형태 */
      --radius-sm:  4px;
      --radius-md:  8px;
      --radius-lg:  10px;
      --radius-xl:  14px;
      --radius-pill: 36px;

      /* 효과 */
      --blur:        blur(12px);
      --shadow-panel: 0 4px 20px rgba(0,0,0,0.5);
      --shadow-float: 0 6px 32px rgba(0,0,0,0.7);

      /* 폰트 */
      --font-mono: 'Courier New', 'Consolas', monospace;

      /* 레이아웃 치수 */
      --sidebar-w:   72px;   /* 데스크톱 사이드바 폭 */
      --item-size:   54px;   /* 사이드바 아이템 크기 */
      --btn-size:    36px;   /* 원형 버튼 크기 */
    }

    /* ════════════════════════════════════════════════════════════════
     * 1. 리셋 & 기본 레이아웃
     * ════════════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }

    body {
      display: flex; flex-direction: row;
      height: 100dvh; overflow: hidden;
      background: var(--bg-app);
      font-family: var(--font-mono);
      color: var(--text-base);
    }

    /* ════════════════════════════════════════════════════════════════
     * 2. 사이드바 (소자 팔레트)
     * ════════════════════════════════════════════════════════════════ */
    #sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--bg-sidebar); border-right: 1px solid var(--border-dim);
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 0; gap: 6px;
      overflow-y: auto; overflow-x: hidden;
      z-index: 10; scrollbar-width: none;
    }
    #sidebar::-webkit-scrollbar { display: none; }
    .sidebar-sep { width: 40px; height: 1px; background: var(--border-dim); margin: 2px 0; }

    .sidebar-item {
      width: var(--item-size); height: var(--item-size);
      background: var(--bg-item); border: 1px solid var(--border-item); border-radius: var(--radius-md);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: grab; touch-action: none; user-select: none;
      transition: background 0.12s, border-color 0.12s, transform 0.08s; gap: 2px;
    }
    .sidebar-item:hover      { background: #243352; border-color: #3a7bd5; }
    .sidebar-item.dragging   { opacity: 0.38; transform: scale(0.88); }
    .s-label { font-size: 8.5px; color: var(--text-label); text-align: center; line-height: 1; letter-spacing: 0.3px; pointer-events: none; }

    /* 회로 초기화 버튼 (사이드바 하단) */
    .sidebar-clear {
      margin-top: auto; margin-bottom: 4px;
      background: #1a1010; border: 1px solid #3a1515; border-radius: var(--radius-md);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; touch-action: none; user-select: none;
      transition: background 0.12s, border-color 0.12s; gap: 2px;
    }
    .sidebar-clear:hover { background: #2a1515; border-color: #6a2020; }
    .sidebar-clear .s-label { color: #804040; }

    /* ════════════════════════════════════════════════════════════════
     * 3. 캔버스 영역
     * ════════════════════════════════════════════════════════════════ */
    #canvas-container { flex: 1; position: relative; overflow: hidden; background: var(--bg-app); }
    #canvas-bg, #canvas-main, #canvas-anim { position: absolute; top: 0; left: 0; display: block; }
    #canvas-bg   { z-index: 1; }
    #canvas-main { z-index: 2; }
    #canvas-anim { z-index: 3; pointer-events: none; }

    /* 드래그 미리보기 고스트 */
    #drag-ghost {
      position: fixed; pointer-events: none; z-index: 9998;
      display: none; transform: translate(-50%,-50%);
      opacity: 0.82; filter: drop-shadow(0 0 8px #3a9de0);
    }

    /* 드래그 삭제 존 (canvas-container 기준 absolute) */
    #delete-zone {
      position: absolute; left: 9px; bottom: 60px; top: auto;
      width: var(--item-size);
      border-radius: var(--radius-lg); border: 2px dashed #3a5a7a;
      background: rgba(8,14,32,0.90); color: #3a5a7a; text-align: center;
      display: none; flex-direction: column; align-items: center; justify-content: flex-end;
      padding-bottom: 10px; gap: 4px;
      z-index: 20;   /* canvas-anim(3)보다 위 */
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      pointer-events: none; user-select: none;
    }
    #delete-zone.visible { display: flex; }
    #delete-zone.hover {
      border-color: #e05050; background: rgba(80,10,10,0.85); color: #ff8080;
      box-shadow: 0 0 16px rgba(220,50,50,0.5);
    }
    #delete-zone .dz-icon  { font-size: 20px; line-height: 1; }
    #delete-zone .dz-label { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; font-family: var(--font-mono); }

    /* ════════════════════════════════════════════════════════════════
     * 4. 모드 바 (편집/실행/비유/촬영)
     * ════════════════════════════════════════════════════════════════ */
    #mode-bar {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      z-index: 20; display: flex; gap: 4px;
      background: rgba(17,24,39,0.93); border: 1px solid var(--border-base); border-radius: var(--radius-pill);
      padding: 5px 8px; backdrop-filter: var(--blur);
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }
    .mode-btn {
      padding: 7px 18px; border: 1px solid transparent; border-radius: 28px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      background: transparent; color: var(--text-dim);
      transition: all 0.18s; font-family: var(--font-mono); letter-spacing: 0.5px;
    }
    .mode-btn:hover:not(.active) { color: #a0b8cc; background: rgba(255,255,255,0.05); }
    .mode-btn.active { background: #1a3a6a; border-color: var(--border-active); color: var(--text-accent); box-shadow: 0 0 10px rgba(60,130,220,0.3); }

    /* ════════════════════════════════════════════════════════════════
     * 5. Undo/Redo + 표시 토글 바 (canvas-container 기준 absolute)
     *    left:8px = 캔버스 좌측 끝에서 8px → 사이드바와 분리
     * ════════════════════════════════════════════════════════════════ */
    #undo-bar {
      position: absolute; bottom: 14px; left: 8px;
      z-index: 20; display: flex; gap: 2px;
    }
    /* 원형 버튼 공통 (undo·redo·가시토글 공유) */
    .undo-btn, .vis-btn {
      width: var(--btn-size); height: var(--btn-size); border-radius: 18px;
      background: var(--bg-glass); border: 1px solid var(--border-base);
      color: var(--text-dim); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; backdrop-filter: blur(8px);
    }
    .undo-btn { font-size: 14px; }
    .vis-btn  { font-size: 15px; font-family: var(--font-mono); font-weight: 700; }
    .undo-btn:hover:not(:disabled),
    .vis-btn:hover:not(.active) { color: var(--text-accent); border-color: var(--border-active); background: rgba(30,60,120,0.7); }
    .undo-btn:disabled { opacity: 0.28; cursor: default; }
    .vis-btn.active {
      color: var(--text-accent); border-color: var(--border-active);
      background: rgba(20,50,110,0.85); box-shadow: 0 0 8px rgba(60,140,240,0.3);
    }
    .vis-btn .vis-label { display: none; }
    #vis-sep { width: 1px; height: 24px; background: var(--border-base); margin: 0 4px; align-self: center; }

    /* ════════════════════════════════════════════════════════════════
     * 6. 속성 패널
     * ════════════════════════════════════════════════════════════════ */
    #prop-panel {
      position: absolute; bottom: 72px; right: 12px; width: 210px;
      background: var(--bg-panel); border: 1px solid var(--border-base);
      border-radius: var(--radius-lg); padding: 12px 14px; z-index: 20; display: none;
      backdrop-filter: var(--blur); box-shadow: var(--shadow-panel);
    }
    #prop-panel.visible { display: block; }
    .pp-title { font-size: 10px; font-weight: 700; color: var(--text-title); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; border-bottom: 1px solid var(--border-base); padding-bottom: 6px; }
    #prop-content { font-size: 11px; color: #8aaccc; }
    .pp-row { display: flex; justify-content: space-between; margin-bottom: 5px; align-items: center; }
    .pp-key { color: var(--text-dim); }
    .pp-val { color: var(--text-accent); font-weight: 600; }
    .pp-input { background: #0d1828; border: 1px solid #2a4a70; border-radius: var(--radius-sm); color: var(--text-accent); font-size: 11px; font-family: var(--font-mono); width: 80px; padding: 3px 6px; text-align: right; }
    .pp-input:focus { outline: none; border-color: var(--border-focus); }
    .pp-input.invalid { border-color: #c05050 !important; background: #1e0a0a !important; }
    .pp-input.changed { border-color: var(--border-focus); }
    .pp-measure { margin-top: 7px; padding-top: 7px; border-top: 1px solid #1a2a40; }
    .pp-btns { display: flex; gap: 5px; margin-top: 10px; }
    .pp-btn { flex: 1; padding: 5px 0; border-radius: 5px; font-size: 10px; cursor: pointer; font-family: var(--font-mono); border: 1px solid; transition: background 0.1s; }
    .pp-btn-rotate { background:#1a3050; border-color:#2a4a70; color:var(--text-accent); }
    .pp-btn-rotate:hover { background:#253d65; }
    .pp-btn-delete { background:var(--danger-bg); border-color:var(--danger-border); color:var(--danger-text); }
    .pp-btn-delete:hover { background:#4f1c1c; }
    .pp-wire-dir { background:#162535; border-color:#1e4060; color:#60a8d8; }
    .pp-wire-dir:hover { background:#1c3045; }

    /* ════════════════════════════════════════════════════════════════
     * 7. 과도 응답 그래프 패널
     * ════════════════════════════════════════════════════════════════ */
    #transient-panel {
      position: absolute; top: 12px; right: 12px; z-index: 25;
      background: var(--bg-panel-deep); border: 1px solid #2a4878;
      border-radius: 12px; padding: 12px 14px; width: 380px;
      max-width: calc(100vw - 24px); box-sizing: border-box;
      backdrop-filter: var(--blur); box-shadow: var(--shadow-float);
      display: none;
    }
    #transient-panel.visible { display: block; }
    #transient-panel .tp-title {
      font-size: 12px; color: var(--text-accent); font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      border-bottom: 1px solid #1e3860; padding-bottom: 7px; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    #transient-panel .tp-close { cursor: pointer; color: #4a7aaa; font-size: 16px; line-height: 1; }
    #transient-panel .tp-close:hover { color: #a0d8f8; }
    #transient-canvas { width: 100%; display: block; border-radius: var(--radius-sm); }
    #transient-toggles { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tp-toggle {
      font-size: 11px; font-family: var(--font-mono); padding: 3px 10px;
      border-radius: var(--radius-sm); border: 1px solid; cursor: pointer;
      transition: opacity 0.15s, background 0.15s; opacity: 0.5; font-weight: 600;
    }
    .tp-toggle.active { opacity: 1; }
    .tp-toggle:hover  { opacity: 0.85; }
    #transient-legend { margin-top: 7px; font-size: 11px; font-family: var(--font-mono); color: #7090b0; display: flex; gap: 10px; flex-wrap: wrap; line-height: 1.6; }
    /* KaTeX 수식 레이블 (그래프 오버레이) */
    .tg-formula-label .katex { font-size: 10px !important; }
    .tg-formula-label .katex-html { color: inherit; }

    /* ════════════════════════════════════════════════════════════════
     * 8. 값 입력 팝업
     * ════════════════════════════════════════════════════════════════ */
    #val-popup {
      position: fixed; z-index: 9999;
      background: var(--bg-popup); border: 1px solid #2a4878;
      border-radius: var(--radius-xl); padding: 16px 18px; width: 220px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8); backdrop-filter: blur(16px);
      display: none; flex-direction: column; gap: 10px;
    }
    #val-popup.visible { display: flex; }
    #val-popup .vp-title { font-size: 11px; color: var(--text-accent); font-weight: 700; }
    #val-popup input[type=number] {
      width: 100%; box-sizing: border-box;
      background: rgba(14,24,50,0.95); border: 1px solid #2a5090;
      border-radius: var(--radius-md); color: #e8f4ff; font-size: 24px;
      font-family: var(--font-mono); font-weight: 700;
      padding: 8px 12px; text-align: right; outline: none;
    }
    #val-popup input[type=number]:focus { border-color: var(--border-focus); }
    #val-popup .vp-hint { font-size: 10px; color: #3a5a7a; text-align: center; }
    #val-popup .vp-btns { display: flex; gap: 6px; }
    #val-popup .vp-ok {
      flex: 1; padding: 8px 0; border-radius: var(--radius-md);
      background: rgba(30,70,160,0.8); border: 1px solid #3a70d0;
      color: var(--text-accent2); font-size: 13px; font-weight: 700; cursor: pointer;
    }
    #val-popup .vp-ok:hover { background: rgba(40,90,200,0.9); }
    #val-popup .vp-cancel {
      padding: 8px 14px; border-radius: var(--radius-md);
      background: rgba(20,30,60,0.6); border: 1px solid var(--border-base);
      color: var(--text-dim); font-size: 13px; cursor: pointer;
    }
    #val-popup .vp-cancel:hover { color: #7090b8; }

    /* ════════════════════════════════════════════════════════════════
     * 9. 컨텍스트 메뉴 (우클릭)
     * ════════════════════════════════════════════════════════════════ */
    #ctx-menu {
      position: fixed; z-index: 9990; display: none;
      background: var(--bg-ctx); border: 1px solid #2a4060;
      border-radius: var(--radius-lg); padding: 5px 0; min-width: 140px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6); backdrop-filter: blur(8px);
    }
    #ctx-menu.visible { display: block; }
    .ctx-item {
      padding: 9px 16px; font-size: 12px; font-family: var(--font-mono);
      cursor: pointer; color: #a0c0e0; display: flex; align-items: center; gap: 8px;
      transition: background 0.1s;
    }
    .ctx-item:hover { background: rgba(60,100,160,0.35); }
    .ctx-item.danger { color: var(--danger-text); }
    .ctx-item.danger:hover { background: rgba(160,40,40,0.35); }
    .ctx-sep { height: 1px; background: var(--border-base); margin: 3px 0; }
    .ctx-icon { font-size: 13px; width: 16px; text-align: center; }

    /* ════════════════════════════════════════════════════════════════
     * 10. 토스트 & 연결 힌트 & 정보 오버레이
     * ════════════════════════════════════════════════════════════════ */
    #toast {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: #9b2c2c; border: 1px solid #c53030; color: #fff;
      padding: 9px 20px; border-radius: 6px; font-size: 12px; font-family: var(--font-mono);
      z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s;
      white-space: nowrap; box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }
    #toast.visible { opacity: 1; }

    #conn-hint {
      position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(22,60,130,0.9); border: 1px solid #3a7bd5; color: var(--text-accent2);
      padding: 5px 16px; border-radius: 20px; font-size: 11px; font-family: var(--font-mono);
      z-index: 15; pointer-events: none; opacity: 0; transition: opacity 0.25s; white-space: nowrap;
    }
    #conn-hint.visible { opacity: 1; }

    #info-overlay {
      position: absolute; bottom: 14px; left: 8px; font-size: 10px; color: #2a3e58;
      font-family: var(--font-mono); z-index: 5; pointer-events: none; letter-spacing: 0.5px;
    }

    /* ════════════════════════════════════════════════════════════════
     * 11. 모바일 전용 요소 (기본: 숨김 — 데스크톱)
     *     실제 표시는 아래 @media (max-width:480px) 에서 정의
     * ════════════════════════════════════════════════════════════════ */
    #hamburger-btn, #sidebar-overlay, #mobile-info-btn, #mobile-graph-btn { display: none; }

    /* ════════════════════════════════════════════════════════════════
     * 12. 모바일 레이아웃 (≤ 480px)
     * ════════════════════════════════════════════════════════════════ */
    @media (max-width: 480px) {
      /* 사이드바: 슬라이드 오버레이 방식 */
      #sidebar {
        position: fixed; left: 0; top: 0; bottom: 0;
        width: 220px; z-index: 200;
        transform: translateX(-100%);
        transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
        box-shadow: 4px 0 24px rgba(0,0,0,0.7);
        flex-direction: column; align-items: center;
        padding: 56px 0 12px 0;
      }
      #sidebar.mobile-open { transform: translateX(0); }
      .sidebar-item { width: 180px; height: 48px; flex-direction: row; justify-content: flex-start; gap: 12px; padding: 0 16px; }
      .s-label { font-size: 13px; }

      /* 사이드바 배경 딤 */
      #sidebar-overlay {
        display: none; position: fixed; inset: 0; z-index: 199;
        background: rgba(0,0,0,0.55);
      }
      #sidebar-overlay.visible { display: block; }

<!-- ═══════════════════ Script 1 — 상수 & 설정 ═══════════════════ -->
<script>
'use strict';

/* ════════════════════════════════════════════════════════════════════
 * 소자 타입 열거형
 *   Object.freeze로 불변 보장. 값은 문자열(직렬화/디버깅 용이).
 * ════════════════════════════════════════════════════════════════════ */
var TYPE = Object.freeze({
  DC_SOURCE:  'DC_SOURCE',  AC_SOURCE:  'AC_SOURCE',
  RESISTOR:   'RESISTOR',   CAPACITOR:  'CAPACITOR',
  INDUCTOR:   'INDUCTOR',
  JUNCTION_3: 'JUNCTION_3', JUNCTION_4: 'JUNCTION_4',
});

/* ════════════════════════════════════════════════════════════════════
 * 그리드 & 뷰포트
 * ════════════════════════════════════════════════════════════════════ */
var CELL_SIZE = 40;     // 그리드 1칸 = 40px (scale=1 기준)
var GRID_COLS = 100;    // 그리드 가로 칸 수
var GRID_ROWS = 100;    // 그리드 세로 칸 수
var SCALE_MIN = 0.25;   // 최소 줌 배율
var SCALE_MAX = 4.0;    // 최대 줌 배율

/* ════════════════════════════════════════════════════════════════════
 * 입력/인터랙션 튜닝값
 * ════════════════════════════════════════════════════════════════════ */
var INERTIA_FRICTION  = 0.92;  // 패닝 관성 감속 계수 (1에 가까울수록 오래 미끄러짐)
var INERTIA_THRESHOLD = 0.5;   // 관성 정지 임계 속도(px/frame)
var WHEEL_ZOOM_STEP   = 1.1;   // 휠 1회당 줌 배율
var DOUBLE_TAP_MS     = 220;   // 더블탭 판정 간격(ms)
var HIT_RADIUS_TOUCH  = 22;    // 터치 히트 반지름(px)
var HIT_RADIUS_MOUSE  = 10;    // 마우스 히트 반지름(px)
var BEND_HIT_RADIUS   = 10;    // 꺾임점 핸들 히트 반지름(px)
var PORT_DOT_R        = 5;     // 포트 점 기본 반지름(px)
var WIRE_FLASH_MS     = 350;   // 도선 완성 플래시 지속(ms)
var LONGPRESS_MS      = 480;   // 롱프레스 판정 시간(ms)
var UNDO_MAX          = 30;    // Undo 최대 단계

/* ════════════════════════════════════════════════════════════════════
 * 소자 정의 테이블
 * ════════════════════════════════════════════════════════════════════ */

/* 사이드바 팔레트 항목 (생성 가능한 소자 목록)
 *   defValue : 기본 1차값 (저항Ω/전압V/전기용량F/인덕턴스H)
 *   defValue2: 기본 2차값 (AC 주파수Hz, 그 외 null)
 *   shortUnit: 사이드바·라벨 표시 단위 */
var SIDEBAR_ITEMS = [
  { type:TYPE.DC_SOURCE,  label:'DC',  defValue:12,      defValue2:null, shortUnit:'V'  },
  { type:TYPE.AC_SOURCE,  label:'AC',  defValue:220,     defValue2:60,   shortUnit:'V~' },
  { type:TYPE.RESISTOR,   label:'R',   defValue:100,     defValue2:null, shortUnit:'Ω'  },
  { type:TYPE.CAPACITOR,  label:'C',   defValue:100e-6,  defValue2:null, shortUnit:'µF' },
  { type:TYPE.INDUCTOR,   label:'L',   defValue:10e-3,   defValue2:null, shortUnit:'mH' },
  { type:TYPE.JUNCTION_3, label:'J3',  defValue:0,       defValue2:null, shortUnit:''   },
  { type:TYPE.JUNCTION_4, label:'J4',  defValue:0,       defValue2:null, shortUnit:''   },
];

/* 소자별 포트 문자열 (rotation=0 로컬 기준)
 *   L=좌, R=우, T=상, B=하
 *   2단자 소자는 'LR', 분기점은 다중 포트 */
var COMP_PORTS = {
  DC_SOURCE:'LR', AC_SOURCE:'LR', RESISTOR:'LR',
  CAPACITOR:'LR', INDUCTOR:'LR',
  JUNCTION_3:'LRB', JUNCTION_4:'LRTB',
};

/* 다중 연결 허용 타입 (분기점) — 한 포트에 여러 도선 연결 가능 */
var MULTI_PORT_TYPES = { JUNCTION_3:true, JUNCTION_4:true };

/* 90° 시계방향 회전 시 포트 재매핑 (L→T→R→B→L)
 *   주의: 토폴로지용 포트 ID는 회전해도 불변. 이 테이블은
 *   포트 ID를 시각적/논리적으로 회전 변환할 때만 사용. */
var PORT_ROTATE_CW = { L:'T', T:'R', R:'B', B:'L' };

/* ════════════════════════════════════════════════════════════════════
 * 전역 네임스페이스 — 모든 모듈이 App에 등록됨
 * ════════════════════════════════════════════════════════════════════ */
window.App = {};
</script>


<!-- ═══════════════════ Script 2 — State + Events ═══════════════════ -->
<script>
(function(){
'use strict';
var App=window.App;

/* ════════════════════════════════════════════════════════════════════
 * App.Events — 경량 이벤트 버스 (옵저버 패턴)
 *   on/off/emit 만 제공. emit 시 핸들러 배열 복사 후 순회하여
 *   콜백 내 on/off 호출에도 안전.
 * ════════════════════════════════════════════════════════════════════ */
App.Events=(function(){
  var m=Object.create(null);
  return{
    on:  function(ev,fn){(m[ev]||(m[ev]=[])).push(fn);},
    off: function(ev,fn){if(m[ev])m[ev]=m[ev].filter(function(f){return f!==fn;});},
    emit:function(ev,d){(m[ev]||[]).slice().forEach(function(fn){fn(d);});},
  };
})();

/* ════════════════════════════════════════════════════════════════════
 * App.State — 단일 상태 저장소 (싱글턴)
 *
 *   모든 회로 데이터(소자/도선)·뷰포트·해석결과·UI플래그를 보유.
 *   변경은 반드시 메서드를 통해야 하며, 변경 후 'state:changed' emit.
 *
 *   Undo/Redo 규약:
 *     뮤테이션은 _beginAction() … 변경 … _endAction() 으로 감쌀 것.
 *     _beginAction: 현재 위치 이후 히스토리 폐기(분기 정리)
 *     _endAction:   변경 후 스냅샷 push
 * ════════════════════════════════════════════════════════════════════ */
App.State=(function(){
  var s={
    components:[], wires:[],
    selectedId:null, connectingPort:null,
    mode:'edit',
    viewTransform:{offsetX:0,offsetY:0,scale:1.0},
    solverResult:{nodeVoltages:{},componentVoltages:{},branchCurrents:{},valid:false,error:null},
    /* 가시 토글 */
    showArrows:false,  /* 전류 방향 화살표 (기본 꺼짐) */
    showBadges:false,  /* 전류 세기 배지   (기본 꺼짐) */
    showLabels:true,   /* 소자 특성값      (기본 켜짐) */
  };

  /* ──────────────────────────────────────────────────────────────────
   * Undo/Redo 히스토리
   * ────────────────────────────────────────────────────────────────── */
  var _history=[];      // 스냅샷 배열 (최신 = 마지막)
  var _hIdx=-1;         // 현재 히스토리 위치
  var _skipSave=false;  // restore 중 재저장 방지 플래그

  function _snap(){
    return{
      components:JSON.parse(JSON.stringify(s.components)),
      wires:JSON.parse(JSON.stringify(s.wires)),
      selectedId:s.selectedId,
    };
  }
  function _beginAction(){
    if(_skipSave) return;
    _history.splice(_hIdx+1);   // 현재 이후 분기(redo 대상) 폐기
  }
  function _endAction(){
    if(_skipSave) return;
    _history.push(_snap());
    if(_history.length>UNDO_MAX) _history.shift();
    _hIdx=_history.length-1;
  }
  function _restoreSnap(snap){
    if(!snap) return;
    _skipSave=true;
    s.components=JSON.parse(JSON.stringify(snap.components));
    s.wires=JSON.parse(JSON.stringify(snap.wires));
    s.selectedId=snap.selectedId;
    s.connectingPort=null;
    _skipSave=false;
    App.Events.emit('state:changed');
  }

  /* 고유 ID 생성 (crypto.randomUUID 우선, 폴백 제공) */
  function genId(){
    return typeof crypto!=='undefined'&&crypto.randomUUID
      ?crypto.randomUUID()
      :Date.now().toString(36)+Math.random().toString(36).slice(2);
  }

  /* 변경 1건을 묶어 실행하는 헬퍼: begin → fn() → end → emit */
  function _mutate(fn){
    _beginAction();
    fn();
    _endAction();
    App.Events.emit('state:changed');
  }

  /* ──────────────────────────────────────────────────────────────────
   * 공개 API
   * ────────────────────────────────────────────────────────────────── */
  var api={
    genId:genId,

    /* ── 회로 변경 ── */
    addComponent:function(c){ _mutate(function(){ s.components.push(c); }); },
    removeComponent:function(id){
      _mutate(function(){
        /* 규칙: 도선 먼저 제거 후 소자 제거 (역순 금지) */
        s.wires=s.wires.filter(function(w){return w.fromId!==id&&w.toId!==id;});
        s.components=s.components.filter(function(c){return c.id!==id;});
        if(s.selectedId===id)s.selectedId=null;
      });
    },
    addWire:function(w){ _mutate(function(){ s.wires.push(w); }); },
    removeWire:function(id){
      _mutate(function(){
        s.wires=s.wires.filter(function(w){return w.id!==id;});
        if(s.selectedId===id)s.selectedId=null;
      });
    },

    /* ── 회전: rotation += 90 ──
     * 주의: 포트 이름(L/R/T/B)은 단자 식별자이며 회전으로 변경되지 않는다.
     * getPortPixel()이 rotation을 읽어 시각적 위치를 계산하므로,
     * 도선의 fromPort/toPort는 그대로 유지해야 토폴로지가 올바르다. */
    rotateComponent:function(id){
      var comp=api.getComponent(id);
      if(!comp) return;
      _mutate(function(){ comp.rotation=(comp.rotation+90)%360; });
    },
    setComponentValue:function(id,key,val){
      var comp=api.getComponent(id);
      if(!comp) return;
      _mutate(function(){ comp[key]=val; });
    },

    /* ── 조회 ── */
    getComponent:function(id){return s.components.find(function(c){return c.id===id;})||null;},
    getWire:function(id){return s.wires.find(function(w){return w.id===id;})||null;},
    isOccupied:function(gx,gy,excId){
      return s.components.some(function(c){return c.id!==excId&&c.gridX===gx&&c.gridY===gy;});
    },
    /* 특정 포트에 연결된 도선 목록 */
    getPortWires:function(compId,portId){
      return s.wires.filter(function(w){
        return (w.fromId===compId&&w.fromPort===portId)||(w.toId===compId&&w.toPort===portId);
      });
    },
    /* 포트가 비어 있는지 (JUNCTION은 항상 true) */
    isPortFree:function(compId,portId){
      var comp=api.getComponent(compId);
      if(!comp) return false;
      if(MULTI_PORT_TYPES[comp.type]) return true;
      return s.wires.every(function(w){
        return !((w.fromId===compId&&w.fromPort===portId)||(w.toId===compId&&w.toPort===portId));
      });
    },

    /* ── Undo / Redo ── */
    undo:function(){ if(_hIdx>0){_hIdx--;_restoreSnap(_history[_hIdx]);} },
    redo:function(){ if(_hIdx<_history.length-1){_hIdx++;_restoreSnap(_history[_hIdx]);} },
    canUndo:function(){return _hIdx>0;},
    canRedo:function(){return _hIdx<_history.length-1;},

    /* ── 인접 부품 자동 연결 ──
     * 배치/이동 직후 호출. compId의 각 포트를 다른 부품 포트와
     * 논리 좌표가 일치하면 자동으로 도선 연결한다. */
    autoConnectAdjacent:function(compId){
      var comp=api.getComponent(compId);
      if(!comp) return;
      var myPorts=App.Geo.getCompPorts(comp);
      var connected=false;
      myPorts.forEach(function(myPort){
        var myPos=App.Geo.getPortGridPos(comp,myPort);
        s.components.forEach(function(other){
          if(other.id===compId) return;
          App.Geo.getCompPorts(other).forEach(function(otherPort){
            var otherPos=App.Geo.getPortGridPos(other,otherPort);
            /* 논리 좌표 일치 여부 (허용오차 0.01) */
            if(Math.abs(myPos.x-otherPos.x)>0.01||Math.abs(myPos.y-otherPos.y)>0.01) return;
            /* 중복 도선 방지 */
            var dup=s.wires.some(function(w){
              return(w.fromId===compId&&w.fromPort===myPort&&w.toId===other.id&&w.toPort===otherPort)||
                     (w.fromId===other.id&&w.fromPort===otherPort&&w.toId===compId&&w.toPort===myPort);
            });
            if(dup) return;
            /* JUNCTION 아닌 포트는 단일 연결 — 기존 도선 제거 후 연결 */
            if(!MULTI_PORT_TYPES[comp.type]){
              s.wires=s.wires.filter(function(w){
                return !((w.fromId===compId&&w.fromPort===myPort)||(w.toId===compId&&w.toPort===myPort));
              });
            }
            if(!MULTI_PORT_TYPES[other.type]){
              s.wires=s.wires.filter(function(w){
                return !((w.fromId===other.id&&w.fromPort===otherPort)||(w.toId===other.id&&w.toPort===otherPort));
              });
            }
            s.wires.push({
              id:genId(),
              fromId:compId, fromPort:myPort,
              toId:other.id, toPort:otherPort,
              direction:'H-first',
            });
            connected=true;
          });
        });
      });
      if(connected) App.Events.emit('state:changed');
    },

    /* ── 뷰포트 초기화: 그리드를 화면 중앙에 정렬 ── */
    initViewTransform:function(){
      var el=document.getElementById('canvas-container');
      var W=el.clientWidth,H=el.clientHeight;
      s.viewTransform.scale=1.0;
      s.viewTransform.offsetX=Math.round((W-GRID_COLS*CELL_SIZE)/2);
      s.viewTransform.offsetY=Math.round((H-GRID_ROWS*CELL_SIZE)/2);
      _endAction();   // 초기 빈 상태 스냅샷
    },
  };

  /* ──────────────────────────────────────────────────────────────────
   * 게터/세터 정의 (반복 제거: 테이블 기반 자동 생성)
   *   readonly: 게터만 / readwrite: 게터+세터
   * ────────────────────────────────────────────────────────────────── */
  ['components','wires','viewTransform'].forEach(function(k){
    Object.defineProperty(api,k,{get:function(){return s[k];},enumerable:true});
  });
  ['solverResult','selectedId','connectingPort','mode',
   'showArrows','showBadges','showLabels'].forEach(function(k){
    Object.defineProperty(api,k,{
      get:function(){return s[k];},
      set:function(v){s[k]=v;},
      enumerable:true,
    });
  });

  return api;
})();

}());
</script>


<!-- ═══════════════════ Script 3 — Geometry ═══════════════════ -->
<script>
(function(){
'use strict';
var App=window.App;

/* ════════════════════════════════════════════════════════════════════
 * App.Geo — 좌표 변환 · 포트 위치 · 도선 경로 · 방향 결정
 *
 *   좌표계:
 *     grid  : 논리 좌표 (정수 칸). 소자 위치·인접 판정 기준.
 *     pixel : 화면 좌표. pixel = grid·CELL_SIZE·scale + offset
 *
 *   포트 방향 벡터 (rotation=0 로컬):
 *     L=(-1,0) R=(1,0) T=(0,-1) B=(0,1)
 *     회전 시 표준 2D 회전행렬 적용:
 *       dx' = dx·cosθ - dy·sinθ
 *       dy' = dx·sinθ + dy·cosθ
 * ════════════════════════════════════════════════════════════════════ */
App.Geo=(function(){

  /* 포트 단위 방향 벡터 (모듈 공유 — 중복 제거) */
  var PORT_DIR={ L:[-1,0], R:[1,0], T:[0,-1], B:[0,1] };

  /* 회전 적용된 방향 벡터 반환. 알 수 없는 포트는 null. */
  function rotatedDir(portId, rotation){
    var d=PORT_DIR[portId];
    if(!d) return null;
    var rad=(rotation||0)*Math.PI/180;
    var cos=Math.cos(rad), sin=Math.sin(rad);
    return{ dx:d[0]*cos-d[1]*sin, dy:d[0]*sin+d[1]*cos };
  }

  /* ── 좌표 변환 ───────────────────────────────────────────────────── */
  function gridToPixel(gx,gy){
    var vt=App.State.viewTransform;
    return{x:gx*CELL_SIZE*vt.scale+vt.offsetX, y:gy*CELL_SIZE*vt.scale+vt.offsetY};
  }
  function pixelToGrid(px,py){
    var vt=App.State.viewTransform;
    return{
      gridX:Math.round((px-vt.offsetX)/(CELL_SIZE*vt.scale)),
      gridY:Math.round((py-vt.offsetY)/(CELL_SIZE*vt.scale)),
    };
  }
  function clampGrid(gx,gy){
    return{
      gridX:Math.max(0,Math.min(GRID_COLS-1,Math.round(gx))),
      gridY:Math.max(0,Math.min(GRID_ROWS-1,Math.round(gy))),
    };
  }
  /* 뷰포트 오프셋을 화면 밖으로 너무 벗어나지 않게 제한 */
  function clampOffset(){
    var vt=App.State.viewTransform;
    var el=document.getElementById('canvas-main');
    var W=el?el.clientWidth:window.innerWidth, H=el?el.clientHeight:window.innerHeight;
    var gW=GRID_COLS*CELL_SIZE*vt.scale, gH=GRID_ROWS*CELL_SIZE*vt.scale;
    var M=80;   // 여백(px)
    vt.offsetX=Math.min(M,Math.max(W-gW-M,vt.offsetX));
    vt.offsetY=Math.min(M,Math.max(H-gH-M,vt.offsetY));
  }

  /* ── 포트 위치 ───────────────────────────────────────────────────── */

  /* 포트 픽셀 좌표 (회전 반영) — 소자 중심에서 half만큼 방향 이동 */
  function getPortPixel(comp,portId){
    var vt=App.State.viewTransform;
    var half=CELL_SIZE*vt.scale/2;
    var gp=gridToPixel(comp.gridX,comp.gridY);
    var cx=gp.x+half, cy=gp.y+half;
    var d=rotatedDir(portId, comp.rotation);
    if(!d) return{x:cx,y:cy};
    return{x:cx+d.dx*half, y:cy+d.dy*half};
  }

  /* 포트 논리 그리드 좌표 (뷰포트 독립) — 인접 자동 연결 판정용
   *   예: rotation=0, L포트 → {x:gx, y:gy+0.5} */
  function getPortGridPos(comp, portId){
    var d=rotatedDir(portId, comp.rotation);
    if(!d) return{x:comp.gridX+0.5,y:comp.gridY+0.5};
    return{x:comp.gridX+0.5+d.dx*0.5, y:comp.gridY+0.5+d.dy*0.5};
  }

  /* 소자 포트 목록 (문자 배열). 미정의 타입은 'LR' 기본. */
  function getCompPorts(comp){
    return (COMP_PORTS[comp.type]||'LR').split('');
  }

  /* 포트 ID를 90° 시계방향으로 n회 회전 */
  function rotatePortId(portId,times){
    var result=portId;
    for(var i=0;i<times;i++) result=PORT_ROTATE_CW[result]||result;
    return result;
  }

  /* ── 거리 & 도선 경로 ────────────────────────────────────────────── */

  /* 점-선분 최소 거리 */
  function distToSegment(px,py,x1,y1,x2,y2){
    var dx=x2-x1,dy=y2-y1;
    var lenSq=dx*dx+dy*dy;
    if(lenSq===0) return Math.hypot(px-x1,py-y1);
    var t=Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/lenSq));
    return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));
  }

  /* L자 도선 경로 (3점). H-first=가로 먼저, V-first=세로 먼저 */
  function calcWirePath(x1,y1,x2,y2,dir){
    if(dir==='H-first') return [{x:x1,y:y1},{x:x2,y:y1},{x:x2,y:y2}];
    return [{x:x1,y:y1},{x:x1,y:y2},{x:x2,y:y2}];
  }

  /* 도선 꺾임점(path[1]) 픽셀 좌표 */
  function getWireBendPoint(wire){
    var from=App.State.getComponent(wire.fromId);
    var to=App.State.getComponent(wire.toId);
    if(!from||!to) return null;
    var p1=getPortPixel(from,wire.fromPort);
    var p2=getPortPixel(to,wire.toPort);
    return calcWirePath(p1.x,p1.y,p2.x,p2.y,wire.direction)[1];
  }

  /* ─────────────────────────────────────────────────────────────────
   * getBestDirection(p1, p2, fromId, toId) → 'H-first' | 'V-first'
   *
   * 두 꺾임 방향 중 다른 소자들과 가장 멀리 떨어진 방향을 선택.
   * 각 후보 경로에서 (연결 당사자 제외) 소자 중심까지의 최소 거리를
   * 구해, 최소 거리가 더 큰(=더 여유로운) 방향을 반환.
   * 장애물이 없으면 수평/수직 거리 비교로 폴백.
   * ──────────────────────────────────────────────────────────────── */
  function getBestDirection(p1, p2, fromId, toId){
    var comps=App.State?App.State.components:[];
    var vt=App.State.viewTransform;
    var cellPx=CELL_SIZE*vt.scale;

    /* 연결 당사자 제외 소자 중심 목록 */
    var obstacles=[];
    comps.forEach(function(c){
      if(c.id===fromId||c.id===toId) return;
      var gp=gridToPixel(c.gridX,c.gridY);
      obstacles.push({x:gp.x+cellPx/2, y:gp.y+cellPx/2});
    });

    /* 경로의 모든 선분에서 모든 장애물까지 최소 거리 */
    function pathMinDist(path){
      if(obstacles.length===0) return Infinity;
      var minD=Infinity;
      for(var si=0; si<path.length-1; si++){
        var a=path[si], b=path[si+1];
        for(var oi=0; oi<obstacles.length; oi++){
          var d=distToSegment(obstacles[oi].x,obstacles[oi].y, a.x,a.y, b.x,b.y);
          if(d<minD) minD=d;
        }
      }
      return minD;
    }

    var pathH=calcWirePath(p1.x,p1.y,p2.x,p2.y,'H-first');
    var pathV=calcWirePath(p1.x,p1.y,p2.x,p2.y,'V-first');
    var distH=pathMinDist(pathH);
    var distV=pathMinDist(pathV);

    /* 장애물 없음 → 수평/수직 거리 폴백 */
    if(!isFinite(distH)&&!isFinite(distV)){
      var dx=Math.abs(p2.x-p1.x), dy=Math.abs(p2.y-p1.y);
      return dx>=dy?'H-first':'V-first';
    }
    return distH>=distV?'H-first':'V-first';
  }

  /* ─────────────────────────────────────────────────────────────────
   * wireConvDir(wire, sr) → +1 | -1
   *   관례 전류 방향: +1 = fromPort→toPort, -1 = 반대
   *   1순위: sr.wireSignedI[wire.id] 부호 직접 사용 (JUNCTION 포함 정확)
   *   2순위: portVoltages 기반 폴백 (미해석 상태 등)
   * ──────────────────────────────────────────────────────────────── */
  function wireConvDir(wire, sr){
    /* 1순위: wireSignedI */
    var wsi=sr&&sr.wireSignedI;
    if(wsi && wsi[wire.id]!=null && Math.abs(wsi[wire.id])>1e-15){
      return wsi[wire.id]>0 ? 1 : -1;
    }

    /* 2순위: portVoltages 폴백 */
    var pv    =(sr&&sr.portVoltages)   || {};
    var nodeV =(sr&&sr.nodeVoltages)   || {};
    var compN =(sr&&sr.componentNodes) || {};

    function portV(comp, portId){
      if(pv[comp.id] && pv[comp.id][portId]!=null) return pv[comp.id][portId];
      var ports=getCompPorts(comp);
      var idx=ports.indexOf(portId);
      var nodes=compN[comp.id];
      if(!nodes) return 0;
      return nodeV[nodes[idx>=0?idx:0]]||0;
    }
    function otherPortV(comp, portId){
      var ports=getCompPorts(comp);
      var idx=ports.indexOf(portId);
      return portV(comp, ports[idx===0?1:0]);
    }

    var from=App.State.getComponent(wire.fromId);
    var to  =App.State.getComponent(wire.toId);
    if(!from||!to) return 1;

    var vFrom=portV(from,wire.fromPort), vFromO=otherPortV(from,wire.fromPort);
    if(Math.abs(vFrom-vFromO)>1e-9) return vFrom>vFromO?1:-1;

    var vTo=portV(to,wire.toPort), vToO=otherPortV(to,wire.toPort);
    if(Math.abs(vTo-vToO)>1e-9) return vTo>vToO?1:-1;

    return 1;
  }

  return{gridToPixel,pixelToGrid,clampGrid,clampOffset,
         getPortPixel,getCompPorts,getPortGridPos,rotatePortId,
         distToSegment,calcWirePath,getWireBendPoint,getBestDirection,
         wireConvDir};
})();

}());
</script>


<!-- ═══════════════════ Script 4 — Symbols ═══════════════════ -->
<script>
(function(){
'use strict';
var App=window.App;

/* ════════════════════════════════════════════════════════════════════
 * App.Symbols — 소자 심볼 Canvas 렌더링
 *
 *   좌표 규약: 모든 그리기 함수는 (cx,cy) 중심, r=size/2 반지름 기준.
 *   심볼은 좌우 단자(±r)를 잇는 가로선 위에 그려진다.
 *   회전은 draw()에서 ctx 변환으로 일괄 처리 (개별 함수는 rotation 무관).
 *   선 두께 = size*0.042 (draw에서 설정), 색상은 opts.color로 오버라이드.
 * ════════════════════════════════════════════════════════════════════ */
App.Symbols=(function(){

  /* ── 직류 전원: 긴 판(+) / 짧은 판(−) ──────────────────────────── */
  function drawDCSource(ctx,cx,cy,r){
    var gap=r*.11;       // 두 판 사이 절반 간격
    var longH=r*.40;     // 긴 판(양극) 절반 높이
    var shortH=r*.24;    // 짧은 판(음극) 절반 높이
    ctx.beginPath();
    ctx.moveTo(cx-r,cy); ctx.lineTo(cx-gap,cy);              // 좌측 단자선
    ctx.moveTo(cx+gap,cy); ctx.lineTo(cx+r,cy);              // 우측 단자선
    ctx.moveTo(cx-gap,cy-longH);  ctx.lineTo(cx-gap,cy+longH);  // 긴 판
    ctx.moveTo(cx+gap,cy-shortH); ctx.lineTo(cx+gap,cy+shortH); // 짧은 판
    ctx.stroke();
  }

  /* ── 교류 전원: 원 + 사인파 ─────────────────────────────────────── */
  function drawACSource(ctx,cx,cy,r){
    var R=r*.45;   // 원 반지름
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();
    /* 내부 사인파 (2개 베지어로 1주기) */
    ctx.beginPath();
    ctx.moveTo(cx-r*.30,cy);
    ctx.bezierCurveTo(cx-r*.15,cy-r*.25, cx,cy-r*.25, cx,cy);
    ctx.bezierCurveTo(cx,cy+r*.25, cx+r*.15,cy+r*.25, cx+r*.30,cy);
    ctx.stroke();
    /* 좌우 단자선 */
    ctx.beginPath();
    ctx.moveTo(cx-r,cy); ctx.lineTo(cx-R,cy);
    ctx.moveTo(cx+R,cy); ctx.lineTo(cx+r,cy);
    ctx.stroke();
  }

  /* ── 저항: ANSI 지그재그 (6회 꺾임) ─────────────────────────────── */
  function drawResistor(ctx,cx,cy,r){
    var amp=r*.22;             // 지그재그 진폭
    var x0=cx-r*.64, x1=cx+r*.64;  // 지그재그 시작/끝 x
    var d=(x1-x0)/12;          // 반 스텝 폭 (균일 기울기 보장)
    ctx.beginPath();
    ctx.moveTo(cx-r,   cy);    // 좌측 단자
    ctx.lineTo(x0,     cy);
    ctx.lineTo(x0+ 1*d,cy-amp);
    ctx.lineTo(x0+ 3*d,cy+amp);
    ctx.lineTo(x0+ 5*d,cy-amp);
    ctx.lineTo(x0+ 7*d,cy+amp);
    ctx.lineTo(x0+ 9*d,cy-amp);
    ctx.lineTo(x0+11*d,cy+amp);
    ctx.lineTo(x1,     cy);
    ctx.lineTo(cx+r,   cy);    // 우측 단자
    ctx.stroke();
  }

  /* ── 커패시터: 평행 두 판 ───────────────────────────────────────── */
  function drawCapacitor(ctx,cx,cy,r){
    var g=r*.10;         // 두 판 사이 절반 간격
    var plateH=r*.38;    // 판 절반 높이
    ctx.beginPath();
    ctx.moveTo(cx-g,cy-plateH); ctx.lineTo(cx-g,cy+plateH);  // 좌측 판
    ctx.moveTo(cx+g,cy-plateH); ctx.lineTo(cx+g,cy+plateH);  // 우측 판
    ctx.moveTo(cx-r,cy); ctx.lineTo(cx-g,cy);                 // 좌측 단자
    ctx.moveTo(cx+g,cy); ctx.lineTo(cx+r,cy);                 // 우측 단자
    ctx.stroke();
  }

  /* ── 인덕터: 4개 원형 코일 (G1 연속 베지어 필렛) ─────────────────
   *   각 코일은 원호(arc) + 코일 간 부드러운 연결(quadraticCurveTo).
   *   R=코일 반지름, space=코일 중심 간격(R√2). */
  function drawInductor(ctx,cx,cy,r){
    var loops=4;
    var R    =r*0.25;            // 코일 반지름
    var space=R*Math.SQRT2;      // 코일 중심 간격
    var x0   =cx-(loops-1)*space/2;   // 첫 코일 중심 x
    var f    =0.28;              // 필렛 계수
    var eps  =R*f;
    var th1s =Math.PI+Math.asin(f);   // 첫 코일 시작각
    var thEnd=Math.PI/4-f;            // 코일 종료각
    var thSt =3*Math.PI/4+f;          // 코일 시작각
    var thLE =-f;                     // 마지막 코일 종료각
    var xLast=x0+(loops-1)*space;     // 마지막 코일 중심 x
    ctx.beginPath();
    ctx.moveTo(cx-r,cy);              // 좌측 단자
    ctx.lineTo(x0-R-eps,cy);
    ctx.quadraticCurveTo(x0-R,cy, x0+R*Math.cos(th1s),cy+R*Math.sin(th1s));
    ctx.arc(x0,cy,R,th1s,thEnd,false);
    for(var i=0;i<loops-1;i++){
      var xci=x0+i*space, xci1=xci+space;
      ctx.quadraticCurveTo(
        xci +R*Math.cos(Math.PI/4), cy+R*Math.sin(Math.PI/4),
        xci1+R*Math.cos(thSt),      cy+R*Math.sin(thSt));
      ctx.arc(xci1,cy,R,thSt,(i===loops-2)?thLE:thEnd,false);
    }
    ctx.quadraticCurveTo(xLast+R,cy, xLast+R+eps,cy);
    ctx.lineTo(cx+r,cy);             // 우측 단자
    ctx.stroke();
  }

  /* ── 분기점: 중심 점 + 각 포트로의 선 (3way/4way) ───────────────── */
  function drawJunction(ctx,cx,cy,r,ways){
    ctx.beginPath(); ctx.arc(cx,cy,r*.10,0,Math.PI*2); ctx.fill();   // 중심 점
    ctx.beginPath();
    ctx.moveTo(cx-r,cy); ctx.lineTo(cx+r,cy);   // 좌우(L-R)
    ctx.moveTo(cx,cy);   ctx.lineTo(cx,cy+r);   // 하(B)
    if(ways===4){ ctx.moveTo(cx,cy-r); ctx.lineTo(cx,cy); }  // 상(T)
    ctx.stroke();
  }

  /* ════════════════════════════════════════════════════════════════
   * 값 라벨 (소자 아래 표시)
   * ════════════════════════════════════════════════════════════════ */
  function drawLabel(ctx,comp,cx,cy,cellPx){
    var type=comp.type;
    if(type===TYPE.JUNCTION_3||type===TYPE.JUNCTION_4) return;  // 분기점은 라벨 없음
    if(!App.State.showLabels) return;                          // 특성값 숨김 상태
    var text=_makeLabel(comp);
    if(!text) return;

    var fs=Math.max(10,Math.min(14,cellPx*0.26));   // 폰트 크기 (셀 비례, 10~14px)
    ctx.save();
    ctx.font='bold '+fs+'px "Courier New",monospace';
    ctx.textAlign='center'; ctx.textBaseline='top';
    /* 전원은 심볼이 크므로 라벨을 더 아래로 */
    var lyOffset=(type===TYPE.DC_SOURCE||type===TYPE.AC_SOURCE)?0.52:0.44;
    var ly=cy+cellPx*lyOffset;
    var tw=ctx.measureText(text).width+10;
    /* 배경 알약 박스 (진한 불투명 + 파란 테두리) */
    ctx.fillStyle='rgba(4,8,18,0.92)';
    ctx.strokeStyle='rgba(60,120,200,0.55)';
    ctx.lineWidth=0.8;
    _pill(ctx,cx-tw/2,ly-2,tw,fs+5,3);
    ctx.fill(); ctx.stroke();
    /* 텍스트 (밝은 흰색 + 글로우) */
    ctx.fillStyle='#e8f4ff';
    ctx.shadowColor='#60b8ff'; ctx.shadowBlur=4;
    ctx.fillText(text,cx,ly);
    ctx.restore();
  }

  /* 둥근 사각형(알약) 경로 생성 — 라벨 배경용 */
  function _pill(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
    ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
  }

  /* 소자 값 → 표시 문자열 (SI 접두어 자동 선택) */
  function _makeLabel(comp){
    var v=comp.value; if(v==null) return '';
    switch(comp.type){
      case TYPE.DC_SOURCE: return v+' V';
      case TYPE.AC_SOURCE: return v+' V~';
      case TYPE.RESISTOR:
        if(v>=1e6) return (v/1e6).toFixed(v%1e6?1:0)+' MΩ';
        if(v>=1e3) return (v/1e3).toFixed(v%1e3?1:0)+' kΩ';
        return v+' Ω';
      case TYPE.CAPACITOR:
        if(v>=1e-3) return (v*1e3).toFixed(1)+' mF';
        if(v>=1e-6) return Math.round(v*1e6)+' µF';
        return (v*1e9).toFixed(0)+' nF';
      case TYPE.INDUCTOR:
        if(v>=1)    return v+' H';
        if(v>=1e-3) return Math.round(v*1e3)+' mH';
        return (v*1e6).toFixed(0)+' µH';
      default: return '';
    }
  }

  /* ════════════════════════════════════════════════════════════════
   * 공개 그리기 진입점
   * ════════════════════════════════════════════════════════════════ */

  /* 타입→그리기 함수 디스패치 테이블 */
  var DRAWERS={};
  DRAWERS[TYPE.DC_SOURCE] =function(ctx,cx,cy,r){ drawDCSource(ctx,cx,cy,r); };
  DRAWERS[TYPE.AC_SOURCE] =function(ctx,cx,cy,r){ drawACSource(ctx,cx,cy,r); };
  DRAWERS[TYPE.RESISTOR]  =function(ctx,cx,cy,r){ drawResistor(ctx,cx,cy,r); };
  DRAWERS[TYPE.CAPACITOR] =function(ctx,cx,cy,r){ drawCapacitor(ctx,cx,cy,r); };
  DRAWERS[TYPE.INDUCTOR]  =function(ctx,cx,cy,r){ drawInductor(ctx,cx,cy,r); };
  DRAWERS[TYPE.JUNCTION_3]=function(ctx,cx,cy,r){ drawJunction(ctx,cx,cy,r,3); };
  DRAWERS[TYPE.JUNCTION_4]=function(ctx,cx,cy,r){ drawJunction(ctx,cx,cy,r,4); };

  /* draw: 회전 변환 + 스타일 설정 후 타입별 그리기 함수 호출
   *   opts.color : 선/채움 색상 오버라이드 (촬영 모드에서 '#000000') */
  function draw(ctx,type,cx,cy,size,rotation,opts){
    opts=opts||{};
    ctx.save();
    ctx.translate(cx,cy); ctx.rotate((rotation||0)*Math.PI/180); ctx.translate(-cx,-cy);
    ctx.lineWidth=Math.max(1.5,size*.042);
    var col=opts.color||'#c8e0f4';
    ctx.strokeStyle=col; ctx.fillStyle=col;
    var fn=DRAWERS[type];
    if(fn) fn(ctx,cx,cy,size/2);
    ctx.restore();
  }

  /* drawMini: 사이드바 미니 심볼 (캔버스 중앙에 회전 없이) */
  function drawMini(canvas,type){
    var ctx=canvas.getContext('2d');
    var w=canvas.width,h=canvas.height;
    ctx.clearRect(0,0,w,h);
    draw(ctx,type,w/2,h/2,Math.min(w,h)*.78,0,{color:'#4a90d9'});
  }

  return{draw,drawLabel,drawMini};
})();

}());
</script>


<!-- ═══ Script 5 — Topology Builder (Union-Find) ═══ -->
<script>
(function(){
'use strict';
var App=window.App;

/* ════════════════════════════════════════════════════════════════════
 * App.Topology — 회로 토폴로지 분석 (Union-Find 기반 노드 병합)
 *
 *   목적: 소자·도선 그래프에서 전기적으로 동일한 노드를 병합하여
 *   각 소자 단자의 노드 번호를 결정. MNA 솔버의 입력이 된다.
 *
 *   처리 순서:
 *     1) (소자,포트) 쌍마다 고유 슬롯 부여
 *     2) 도선으로 연결된 슬롯 Union
 *     3) JUNCTION 내부 포트 전부 Union
 *     4) 슬롯 root → 노드번호 매핑 (1부터, 0=접지 예약)
 *     5) 포트별 노드번호 수집
 *     6) 전원 탐색 + 접지 후보(전원 음극) 결정
 *     7) 접지 노드를 0으로 스왑 + 갭 없이 재압축
 *     8) compNodes[id]=[nA,nB] 구성
 *     9~10) 단락/미연결 검사
 * ════════════════════════════════════════════════════════════════════ */
App.Topology=(function(){

  /* 소자 포트 목록 반환 ('LR' 등 → ['L','R']) */
  function portsOf(c){ return (COMP_PORTS[c.type]||'LR').split(''); }

  /* 전원(DC/AC) 여부 */
  function isSource(c){ return c.type===TYPE.DC_SOURCE||c.type===TYPE.AC_SOURCE; }
  /* 분기점 여부 */
  function isJunction(c){ return c.type===TYPE.JUNCTION_3||c.type===TYPE.JUNCTION_4; }

  /* 실패 결과 객체 생성 (반복 제거) */
  function fail(msg){
    return{valid:false,error:msg,nodeCount:0,groundNode:0,compNodes:{},portNode:{},hasAC:false};
  }

  /* ── Union-Find (경로 압축 + 랭크) ── */
  function _uf(n){
    var p=new Int32Array(n), r=new Int32Array(n);
    for(var i=0;i<n;i++) p[i]=i;
    return{
      find:function(x){while(p[x]!==x){p[x]=p[p[x]];x=p[x];}return x;},
      union:function(a,b){
        a=this.find(a); b=this.find(b);
        if(a===b)return;
        if(r[a]<r[b]){var t=a;a=b;b=t;}
        p[b]=a; if(r[a]===r[b])r[a]++;
      }
    };
  }

  /*
   * build(components, wires, Geo) → topology
   *
   * Topology = {
   *   valid      : bool,
   *   error      : string|null,
   *   nodeCount  : number,          // 접지(0) 포함 총 노드 수
   *   groundNode : 0,
   *   compNodes  : { id:[nA,nB] },  // 소자 양단 노드번호
   *   portNode   : { id:{L:n,R:n,…} }, // 포트별 노드번호
   *   hasAC      : bool,
   * }
   */
  function build(comps, wires, Geo){
    if(!comps.length) return fail('부품이 없습니다');

    /* 1. (소자,포트) 쌍마다 고유 슬롯 번호 부여 */
    var slotOf={};   // slotOf[compId][port] = slotIndex
    var slot=0;
    comps.forEach(function(c){
      slotOf[c.id]={};
      portsOf(c).forEach(function(p){ slotOf[c.id][p]=slot++; });
    });
    var uf=_uf(slot);

    /* 2. 도선으로 연결된 슬롯 Union */
    wires.forEach(function(w){
      var fSlots=slotOf[w.fromId], tSlots=slotOf[w.toId];
      if(!fSlots||!tSlots) return;
      var a=fSlots[w.fromPort], b=tSlots[w.toPort];
      if(a!=null && b!=null) uf.union(a,b);
    });

    /* 3. JUNCTION 내부 포트 전부 Union (한 점으로 단락) */
    comps.forEach(function(c){
      if(!isJunction(c)) return;
      var ports=portsOf(c);
      var base=slotOf[c.id][ports[0]];
      for(var i=1;i<ports.length;i++) uf.union(base, slotOf[c.id][ports[i]]);
    });

    /* 4. slot root → 임시 노드번호 (1부터; 0은 접지 예약) */
    var rootNode={};
    var nextNode=1;
    function getNode(root){
      if(rootNode[root]==null) rootNode[root]=nextNode++;
      return rootNode[root];
    }

    /* 5. 포트별 노드번호 수집 */
    var portNode={};
    comps.forEach(function(c){
      portNode[c.id]={};
      portsOf(c).forEach(function(p){
        var s=slotOf[c.id][p];
        if(s!=null) portNode[c.id][p]=getNode(uf.find(s));
      });
    });

    /* 6. 전원 탐색 + 접지 후보 = 전원 2번째 포트(음극) */
    var hasDC=false, hasAC=false, groundRoot=null;
    comps.forEach(function(c){
      if(!isSource(c)) return;
      if(c.type===TYPE.DC_SOURCE) hasDC=true; else hasAC=true;
      var ports=portsOf(c);
      groundRoot=uf.find(slotOf[c.id][ports[1]||ports[0]]);
    });
    if(!hasDC&&!hasAC) return fail('전원이 없습니다');

    /* 7a. 접지 노드를 0으로 스왑 (groundRoot의 임시번호 ↔ 0) */
    if(groundRoot!=null && rootNode[groundRoot]!=null){
      var gNum=rootNode[groundRoot];
      if(gNum!==0){
        Object.keys(rootNode).forEach(function(k){
          if(rootNode[k]===gNum) rootNode[k]=0;
          else if(rootNode[k]===0) rootNode[k]=gNum;
        });
        /* portNode 재계산 */
        comps.forEach(function(c){
          portNode[c.id]={};
          portsOf(c).forEach(function(p){
            var s=slotOf[c.id][p];
            if(s!=null){
              var r=uf.find(s);
              portNode[c.id][p]=rootNode[r]!=null?rootNode[r]:0;
            }
          });
        });
      }
    }

    /* 7b. 노드 번호 갭 없이 재압축 (예: {0,1,3,4} → {0,1,2,3}) */
    var usedSet={};
    Object.keys(rootNode).forEach(function(k){ usedSet[rootNode[k]]=1; });
    var nonZero=Object.keys(usedSet).map(Number).filter(function(v){return v!==0;});
    nonZero.sort(function(a,b){return a-b;});
    var compactMap={0:0};
    nonZero.forEach(function(v,i){ compactMap[v]=i+1; });
    comps.forEach(function(c){
      Object.keys(portNode[c.id]).forEach(function(p){
        var prev=portNode[c.id][p];
        portNode[c.id][p]=compactMap[prev]!=null?compactMap[prev]:0;
      });
    });
    var nodeCount=nonZero.length+1;   // 접지(0) + 비접지 노드

    /* 8. compNodes[id]=[nA,nB]: 첫 두 포트 노드 */
    var compNodes={};
    comps.forEach(function(c){
      var ports=portsOf(c);
      var nA=portNode[c.id][ports[0]]||0;
      var nB=portNode[c.id][ports[1]!=null?ports[1]:ports[0]]||0;
      compNodes[c.id]=[nA,nB];
    });

    /* 9. 전압원 단락 검사 (양단 동일 노드 = 단락) */
    for(var ci=0;ci<comps.length;ci++){
      if(!isSource(comps[ci])) continue;
      var nn=compNodes[comps[ci].id];
      if(nn[0]===nn[1]) return fail('단락 회로가 감지되었습니다');
    }

    /* 10. 미연결 소자 검사 (JUNCTION 제외, 양단 동일 노드 = 미연결) */
    for(var ci2=0;ci2<comps.length;ci2++){
      if(isJunction(comps[ci2])) continue;
      var nn2=compNodes[comps[ci2].id];
      if(nn2[0]===nn2[1]) return fail('연결되지 않은 부품이 있습니다');
    }

    return{valid:true,error:null,nodeCount:nodeCount,groundNode:0,
           compNodes:compNodes,portNode:portNode,hasAC:hasAC};
  }

  return{build:build};
})();

}());
</script>


<!-- ═══ Script 6 — MNA Solver ═══ -->
<script>
(function(){
'use strict';
var App=window.App;

/* ════════════════════════════════════════════════════════════════════
 * App.Solver — 회로 해석 (Modified Nodal Analysis)
 *
 *   DC 회로: 실수 MNA. 인덕터=단락(SMALL_R), 커패시터=개방.
 *   AC 회로: 복소 페이저 MNA. 임피던스 jωL, 1/(jωC) 반영.
 *
 *   결과(solverResult)는 _buildResult가 공통 조립:
 *     nodeVoltages, portVoltages, componentVoltages,
 *     branchCurrents, wireCurrents, wireSignedI, componentNodes
 *
 *   run()은 idle 콜백으로 디바운스 실행 (잦은 편집 중 과도한 재계산 방지).
 * ════════════════════════════════════════════════════════════════════ */
App.Solver=(function(){

  /* 물리 근사 상수 */
  var SMALL_R     = 1e-6;   // 인덕터 DC 단락 / 0Ω 저항 대체 (µΩ)
  var R_SER_FALLBACK = 1e-4; // 특이행렬 시 전압원 직렬저항 (병렬전원 등)
  var OVERCURRENT = 1e10;   // 과전류(단락) 판정 임계 (A)

  var _schedId=null;

  /* ── 밀집 행렬 헬퍼 ── */
  function _mat(n){var m=[];for(var i=0;i<n;i++)m.push(new Float64Array(n));return m;}
  function _vec(n){return new Float64Array(n);}

  /* ── 가우스 소거 (부분 피벗) → 해 벡터 또는 null(특이행렬) ── */
  function _gauss(A,b){
    var n=b.length;
    var a=A.map(function(r){return Float64Array.from(r);});
    var x=Float64Array.from(b);
    for(var col=0;col<n;col++){
      var mx=col, mv=Math.abs(a[col][col]);
      for(var rr=col+1;rr<n;rr++){var v=Math.abs(a[rr][col]);if(v>mv){mv=v;mx=rr;}}
      if(mv<1e-12) return null;
      if(mx!==col){var t=a[col];a[col]=a[mx];a[mx]=t;var tb=x[col];x[col]=x[mx];x[mx]=tb;}
      var piv=a[col][col];
      for(var r2=col+1;r2<n;r2++){
        var f=a[r2][col]/piv; if(Math.abs(f)<1e-15) continue;
        for(var cc=col;cc<n;cc++) a[r2][cc]-=f*a[col][cc];
        x[r2]-=f*x[col];
      }
    }
    var sol=new Float64Array(n);
    for(var i=n-1;i>=0;i--){
      sol[i]=x[i];
      for(var j=i+1;j<n;j++) sol[i]-=a[i][j]*sol[j];
      sol[i]/=a[i][i];
    }
    return sol;
  }

  /* ── 실패 결과 객체 ── */
  function _fail(msg){
    return{valid:false,error:msg,
           nodeVoltages:{},portVoltages:{},
           componentVoltages:{},branchCurrents:{},wireCurrents:{}};
  }

  /* ══════════════════════════════════════════════════════
   *  _buildResult — solverResult 객체 공통 조립
   *
   *  DC·AC 솔버가 노드전압(nodeV)과 전원전류(vsrcI)를 구한 뒤 호출.
   *  소자 전압/전류, 포트전압, 도선 부호전류(wireSignedI)를 계산한다.
   *  overrideCompI: AC 모드에서 복소 전류 크기를 직접 주입 (DC 공식 우회).
   * ══════════════════════════════════════════════════════ */
  function _buildResult(comps, wires, topo, nodeV, vsrcI, overrideCompI){
    var cn  = topo.compNodes;
    var pn  = topo.portNode;

    /* 부품별 전압·전류 */
    var compV={}, compI={};
    comps.forEach(function(c){
      var nn=cn[c.id]; if(!nn) return;
      var vA=nodeV[nn[0]]||0, vB=nodeV[nn[1]]||0;
      var dV=vA-vB;
      compV[c.id]=dV;

      /* overrideCompI 가 있으면 DC 공식 무시 (AC 모드) */
      if(overrideCompI && overrideCompI[c.id]!=null){
        compI[c.id]=overrideCompI[c.id];
        return;
      }
      switch(c.type){
        case TYPE.DC_SOURCE:
        case TYPE.AC_SOURCE:
          compI[c.id]=vsrcI[c.id]||0; break;
        case TYPE.RESISTOR:
          compI[c.id]=c.value>0?dV/c.value:dV/SMALL_R; break;
        case TYPE.INDUCTOR:
          compI[c.id]=dV/SMALL_R; break;
        case TYPE.CAPACITOR:
          compI[c.id]=0; break;
        default:
          compI[c.id]=0;
      }
    });

    /* portVoltages */
    var portV={};
    comps.forEach(function(c){
      portV[c.id]={};
      var pm=pn[c.id]; if(!pm) return;
      Object.keys(pm).forEach(function(p){
        portV[c.id][p]=nodeV[pm[p]]||0;
      });
    });

    /* ════════════════════════════════════════════════════════════════
     * wireSignedI / wireCurrents  계산
     *
     * 목표: 각 도선에 대해
     *   wireSignedI[id] = fromPort→toPort 방향의 부호 있는 전류 (A)
     *   wireCurrents[id] = |wireSignedI[id]|  (절댓값, 기존 호환)
     *
     * 알고리즘:
     *  (1) 각 비-JUNCTION 부품 c에 대해 compI[c.id] 는
     *      portA(ports[0]) → portB(ports[1]) 방향을 양(+)으로 정의한
     *      내부 전류.
     *      → nodeSignedOut[nodeA] += compI[c.id]   (nodeA 에서 나감)
     *      → nodeSignedOut[nodeB] -= compI[c.id]   (nodeB 로 들어옴)
     *
     *  (2) 각 도선 w 에 대해:
     *      fromNode = pn[w.fromId][w.fromPort]
     *      toNode   = pn[w.toId  ][w.toPort  ]
     *
     *    Case A: from 이 비-JUNCTION 부품
     *      fromPort 가 ports[0] 이면 → 전류가 fromPort에서 나감
     *        wireSignedI = +compI[from.id]
     *      fromPort 가 ports[1] 이면 → 전류가 fromPort로 들어옴(반대)
     *        wireSignedI = -compI[from.id]
     *
     *    Case B: to 가 비-JUNCTION 부품 (from 이 JUNCTION)
     *      Case A 와 대칭: toPort 기준으로 부호 결정 후 반전
     *
     *    Case C: 양쪽 모두 JUNCTION
     *      nodeSignedOut[fromNode] 이 도선을 통해 흘러나감
     *      → wireSignedI = +nodeSignedOut[fromNode]
     *         (양수 = fromNode에서 전류가 나가므로 w 방향으로 흐름)
     *
     *  (3) JUNCTION 노드에서 도선이 여러 개인 경우:
     *      각 도선의 wireSignedI 를 먼저 구한 뒤
     *      KCL 검증: Σ wireSignedI (들어오는 방향 기준) = 0
     * ════════════════════════════════════════════════════════════════ */
    var jT={JUNCTION_3:1,JUNCTION_4:1};

    /* Step 1: nodeSignedOut 구성 */
    var nodeSignedOut={};
    comps.forEach(function(c){
      if(jT[c.type]) return;
      var nn=cn[c.id]; if(!nn) return;
      var I=compI[c.id]||0;
      var ports=App.Geo.getCompPorts(c);
      /* ports[0] → nn[0]: I 만큼 나감 */
      nodeSignedOut[nn[0]]=(nodeSignedOut[nn[0]]||0)+I;
      /* ports[1] → nn[1]: I 만큼 들어옴(= -I 나감) */
      nodeSignedOut[nn[1]]=(nodeSignedOut[nn[1]]||0)-I;
    });

    /* Step 2: 각 도선의 부호 있는 전류 계산 */
    var wireSignedI={};
    wires.forEach(function(w){
      var fc=comps.find(function(c){return c.id===w.fromId;});
      var tc=comps.find(function(c){return c.id===w.toId;});
      var fcIsJ=!fc||jT[fc.type];
      var tcIsJ=!tc||jT[tc.type];

      if(!fcIsJ){
        /* Case A: from 이 비-JUNCTION
         * compI[from] > 0 = 전류가 ports[0]→ports[1] (부품 내부)
         * fromPort==ports[0]: 전류가 fromPort 쪽으로 들어옴
         *   → 외부 도선은 toPort→fromPort 방향 → wireSignedI 음수
         * fromPort==ports[1]: 전류가 fromPort 쪽에서 나감
         *   → 외부 도선은 fromPort→toPort 방향 → wireSignedI 양수 */
        var ports=App.Geo.getCompPorts(fc);
        var idx=ports.indexOf(w.fromPort);
        wireSignedI[w.id]=(idx===0?-1:1)*(compI[fc.id]||0);
        return;
      }

      if(!tcIsJ){
        /* Case B: to 가 비-JUNCTION (from 은 JUNCTION)
         * compI[to] > 0 = 전류가 ports[0]→ports[1] (부품 내부)
         * toPort==ports[0]: 전류가 toPort 쪽으로 들어옴
         *   → 도선은 fromPort→toPort 방향 → wireSignedI 양수
         * toPort==ports[1]: 전류가 toPort 쪽에서 나감
         *   → 도선은 toPort→fromPort 방향 → wireSignedI 음수 */
        var portsT=App.Geo.getCompPorts(tc);
        var idxT=portsT.indexOf(w.toPort);
        wireSignedI[w.id]=(idxT===0?1:-1)*(compI[tc.id]||0);
        return;
      }

      /* Case C: 양쪽 모두 JUNCTION ─────────────────────────────────────
       * w.fromId/toId 각각에 대해 KCL을 계산, 절댓값이 큰 쪽 사용.
       * (한쪽이 0이 나오는 경우 다른 쪽에서 정확한 값을 얻을 수 있음)
       * ─────────────────────────────────────────────────────────────── */
      (function(){
        function kclAt(juncId, sign){
          var sumI=0,found=false;
          wires.forEach(function(other){
            if(other.id===w.id) return;
            var isOtherFrom=(other.fromId===juncId);
            var isOtherTo  =(other.toId  ===juncId);
            if(!isOtherFrom&&!isOtherTo) return;
            var ofc2=comps.find(function(c2){return c2.id===other.fromId;});
            var otc2=comps.find(function(c2){return c2.id===other.toId;});
            var otherI=null;
            if(ofc2&&!jT[ofc2.type]){
              var p2=App.Geo.getCompPorts(ofc2),i2=p2.indexOf(other.fromPort);
              otherI=(i2===0?-1:1)*(compI[ofc2.id]||0);
            } else if(otc2&&!jT[otc2.type]){
              var p3=App.Geo.getCompPorts(otc2),i3=p3.indexOf(other.toPort);
              otherI=(i3===0?1:-1)*(compI[otc2.id]||0);
            } else if(wireSignedI[other.id]!=null){
              otherI=wireSignedI[other.id];
            }
            if(otherI==null) return;
            found=true;
            sumI += isOtherTo ? otherI : -otherI;
          });
          return found ? sumI*sign : null;
        }
        /* fromId 기준 계산 (w를 통해 나가는 전류) */
        var fromVal=kclAt(w.fromId, 1);
        /* toId 기준 계산 (w를 통해 들어오는 전류 → 부호 반전) */
        var toVal  =kclAt(w.toId,  -1);
        /* 절댓값이 큰 값 선택 (0이 아닌 쪽이 더 정확) */
        if(fromVal==null && toVal==null){ wireSignedI[w.id]=0; return; }
        if(fromVal==null){ wireSignedI[w.id]=toVal; return; }
        if(toVal  ==null){ wireSignedI[w.id]=fromVal; return; }
        wireSignedI[w.id]=Math.abs(fromVal)>=Math.abs(toVal)?fromVal:toVal;
      })();
    });

    /* Step 3: wireCurrents = |wireSignedI| */
    var wireI={};
    wires.forEach(function(w){ wireI[w.id]=Math.abs(wireSignedI[w.id]||0); });

    return{
      valid:true, error:null,
      nodeVoltages:nodeV,
      portVoltages:portV,
      componentVoltages:compV,
      branchCurrents:compI,
      wireCurrents:wireI,
      wireSignedI:wireSignedI,   /* 부호 있는 도선 전류 (fromPort→toPort 양) */
      componentNodes:cn,
    };
  }

  /* ══════════════════════════════════════════════════════
   *  DC MNA Solver
   *
   *  회로 방정식:
   *    [G  B][v]   [i_s]
   *    [C  0][j] = [v_s]
   *
   *  G: (n×n) 컨덕턴스 행렬
   *  B: (n×m) 전압원 B 블록 (+1/-1)
   *  C: B^T
   *  v: (n)   노드전압 미지수 (접지 제외)
   *  j: (m)   전압원 전류 미지수
   *  i_s: (n) 전류원 벡터 (현재 없음)
   *  v_s: (m) 전압원 전압값
   * ══════════════════════════════════════════════════════ */
  function _solveDC(comps, wires, topo){
    var cn   = topo.compNodes;
    var N    = topo.nodeCount;  // 접지(0) 포함
    var n    = N - 1;           // 미지수: 접지 제외 노드

    if(n <= 0) return _fail('회로를 해석할 수 없습니다');

    /* 전압원 목록 수집 */
    var vsrcs=[];
    comps.forEach(function(c){
      var nn=cn[c.id]; if(!nn) return;
      if(c.type===TYPE.DC_SOURCE)
        vsrcs.push({id:c.id, V:+(c.value)||0, posNode:nn[0], negNode:nn[1]});
    });
    if(vsrcs.length===0) return _fail('전원이 없습니다');

    /* ── 병렬 전압원 전압 불일치 사전 검사 ──────────────────────────
     * 같은 노드 쌍을 공유하는 두 전압원의 전압이 다르면 물리적 단락.
     * 전압이 같으면 중복 제거 후 허용. */
    for(var _ka=0;_ka<vsrcs.length;_ka++){
      for(var _kb=_ka+1;_kb<vsrcs.length;_kb++){
        var _va=vsrcs[_ka], _vb=vsrcs[_kb];
        var _sameDir =(_va.posNode===_vb.posNode&&_va.negNode===_vb.negNode);
        var _revDir  =(_va.posNode===_vb.negNode&&_va.negNode===_vb.posNode);
        if(!_sameDir&&!_revDir) continue;
        var _effVb=_sameDir?_vb.V:-_vb.V;
        if(Math.abs(_va.V-_effVb)>0.5)   /* 0.5V 이상 차이 → 단락 */
          return _fail('서로 다른 전압의 전원이 병렬 연결되어 있습니다 (V₁='+_va.V+'V, V₂='+_vb.V+'V)');
        vsrcs.splice(_kb,1); _kb--;   /* 동일 전압 → 중복 제거 */
      }
    }

    var m=vsrcs.length;
    var sz=n+m;

    /* 수동소자 컨덕턴스를 G 행렬에 스탬프 (정상/폴백 공용 헬퍼)
     *   인덕터: DC 단락(1/SMALL_R), 저항: 1/R, 커패시터: 개방(기여 없음) */
    function stampPassives(G){
      comps.forEach(function(c){
        var nn=cn[c.id]; if(!nn) return;
        var gA=nn[0]-1, gB=nn[1]-1;
        var g=0;
        if(c.type===TYPE.RESISTOR) g=c.value>0?1/c.value:1/SMALL_R;
        if(c.type===TYPE.INDUCTOR) g=1/SMALL_R;
        if(g===0) return;
        if(gA>=0) G[gA][gA]+=g;
        if(gB>=0) G[gB][gB]+=g;
        if(gA>=0&&gB>=0){G[gA][gB]-=g; G[gB][gA]-=g;}
      });
    }

    /* ── 1차 시도: 이상 전압원 ── */
    var G=_mat(sz), rhs=_vec(sz);
    stampPassives(G);
    vsrcs.forEach(function(vs,k){
      var row=n+k, gP=vs.posNode-1, gN=vs.negNode-1;
      if(gP>=0){G[gP][row]+=1; G[row][gP]+=1;}
      if(gN>=0){G[gN][row]-=1; G[row][gN]-=1;}
      rhs[row]=vs.V;
    });
    var sol=_gauss(G, rhs);

    /* ── 폴백: 특이행렬 시 전압원에 미소 직렬저항 삽입 후 재시도 ── */
    if(!sol){
      var G2=_mat(sz), rhs2=_vec(sz);
      stampPassives(G2);
      vsrcs.forEach(function(vs,k){
        var row=n+k, gP=vs.posNode-1, gN=vs.negNode-1;
        if(gP>=0){G2[gP][row]+=1; G2[row][gP]+=1;}
        if(gN>=0){G2[gN][row]-=1; G2[row][gN]-=1;}
        G2[row][row]-=R_SER_FALLBACK;   /* D 블록: 내부 전압강하 */
        rhs2[row]=vs.V;
      });
      sol=_gauss(G2,rhs2);
      if(!sol) return _fail('회로를 해석할 수 없습니다');
    }

    /* 노드전압 추출 */
    var nodeV={0:0};
    for(var i=0;i<n;i++) nodeV[i+1]=sol[i];

    /* 전원 전류 추출 + 과전류(단락) 검사 */
    var vsrcI={};
    for(var k2=0;k2<m;k2++){
      vsrcI[vsrcs[k2].id]=sol[n+k2];
      if(Math.abs(sol[n+k2])>OVERCURRENT) return _fail('단락 회로가 감지되었습니다');
    }

    return _buildResult(comps, wires, topo, nodeV, vsrcI);
  }

  /* ══════════════════════════════════════════════════════
   *  AC 페이저 솔버 (복소 MNA)
   * ══════════════════════════════════════════════════════ */

  /* ── 복소수 연산 헬퍼 ──
   *   복소수는 {re, im} 객체로 표현. 페이저 계산 전반에 사용. */
  function _c(re,im){return{re:re||0,im:im||0};}
  function _cadd(a,b){return{re:a.re+b.re,im:a.im+b.im};}
  function _csub(a,b){return{re:a.re-b.re,im:a.im-b.im};}
  function _cmul(a,b){return{re:a.re*b.re-a.im*b.im,im:a.re*b.im+a.im*b.re};}
  function _cdiv(a,b){var d=b.re*b.re+b.im*b.im;if(d<1e-300)return _c();return{re:(a.re*b.re+a.im*b.im)/d,im:(a.im*b.re-a.re*b.im)/d};}
  function _cabs(a){return Math.hypot(a.re,a.im);}

  /* ── 복소 가우스 소거 ── */
  function _gaussC(A,b){
    var n=b.length;
    var a=A.map(function(r){return r.map(function(v){return{re:v.re,im:v.im};});});
    var x=b.map(function(v){return{re:v.re,im:v.im};});
    for(var col=0;col<n;col++){
      var mx=col, mv=_cabs(a[col][col]);
      for(var rr=col+1;rr<n;rr++){var v=_cabs(a[rr][col]);if(v>mv){mv=v;mx=rr;}}
      if(mv<1e-20) return null;
      if(mx!==col){var t=a[col];a[col]=a[mx];a[mx]=t;var tb=x[col];x[col]=x[mx];x[mx]=tb;}
      var piv=a[col][col];
      for(var r2=col+1;r2<n;r2++){
        var f=_cdiv(a[r2][col],piv);
        for(var cc=col;cc<n;cc++) a[r2][cc]=_csub(a[r2][cc],_cmul(f,a[col][cc]));
        x[r2]=_csub(x[r2],_cmul(f,x[col]));
      }
    }
    var sol=new Array(n);
    for(var i=n-1;i>=0;i--){
      sol[i]=x[i];
      for(var j=i+1;j<n;j++) sol[i]=_csub(sol[i],_cmul(a[i][j],sol[j]));
      sol[i]=_cdiv(sol[i],a[i][i]);
    }
    return sol;
  }

  function _solveAC(comps, wires, topo){
    var cn=topo.compNodes;
    var N=topo.nodeCount, n=N-1;
    if(n<=0) return _fail('회로를 해석할 수 없습니다');

    /* 교류 전원 목록 (모두 동일 주파수 가정) */
    var vsrcs=[];
    comps.forEach(function(c){
      var nn=cn[c.id]; if(!nn) return;
      if(c.type===TYPE.AC_SOURCE){
        var f=c.value2||60, w=2*Math.PI*f;
        /* RHS: V_peak * e^(j*0) = (V_peak, 0) (기준 페이저) */
        vsrcs.push({id:c.id, V:+(c.value)||0, omega:w, posNode:nn[0], negNode:nn[1]});
      }
    });
    var m=vsrcs.length;
    if(m===0) return _fail('전원이 없습니다');

    var omega=vsrcs[0].omega;
    var sz=n+m;

    /* ── 복소 MNA 행렬 구성 ── */
    var G=[]; for(var i=0;i<sz;i++){var row=[];for(var j=0;j<sz;j++)row.push(_c());G.push(row);}
    var rhs=[]; for(var i2=0;i2<sz;i2++) rhs.push(_c());

    /* 소자 어드미턴스 스탬프 */
    comps.forEach(function(c){
      var nn=cn[c.id]; if(!nn) return;
      var gA=nn[0]-1, gB=nn[1]-1;
      var Y=_c();
      if(c.type===TYPE.RESISTOR){
        /* Y_R = 1/R (실수) */
        Y=_c(c.value>0?1/c.value:1/SMALL_R, 0);
      } else if(c.type===TYPE.CAPACITOR){
        /* Z_C = 1/(jωC)  →  Y_C = jωC */
        Y=_c(0, omega*(c.value||0));
      } else if(c.type===TYPE.INDUCTOR){
        /* Z_L = jωL  →  Y_L = 1/(jωL) = -j/(ωL) */
        var wL=omega*(c.value||SMALL_R);
        Y=_c(0, wL>0?-1/wL:-1/SMALL_R);
      }
      if(Y.re===0&&Y.im===0) return;
      if(gA>=0) G[gA][gA]=_cadd(G[gA][gA],Y);
      if(gB>=0) G[gB][gB]=_cadd(G[gB][gB],Y);
      if(gA>=0&&gB>=0){G[gA][gB]=_csub(G[gA][gB],Y);G[gB][gA]=_csub(G[gB][gA],Y);}
    });

    /* 전압원 B/C 블록 스탬프 */
    vsrcs.forEach(function(vs,k){
      var row=n+k, gP=vs.posNode-1, gN=vs.negNode-1;
      var ONE=_c(1), M=_c(-1);
      if(gP>=0){G[gP][row]=_cadd(G[gP][row],ONE);G[row][gP]=_cadd(G[row][gP],ONE);}
      if(gN>=0){G[gN][row]=_cadd(G[gN][row],M); G[row][gN]=_cadd(G[row][gN],M);}
      /* RHS: V_peak 기준 페이저 (실수부만) */
      rhs[row]=_c(vs.V, 0);
    });

    var solC=_gaussC(G,rhs);
    if(!solC) return _fail('회로를 해석할 수 없습니다');

    /* ── 복소 노드전압 페이저 추출 ── */
    /* solC[0..n-1]: 노드전압 복소 페이저 */
    /* solC[n..n+m-1]: 전압원 전류 복소 페이저 */
    var nodeVphasor=[];  /* nodeVphasor[i] = complex phasor for node i+1 */
    for(var i3=0;i3<n;i3++) nodeVphasor[i3]=solC[i3];

    /* nodeVoltages (크기, 편집모드 표시용) */
    var nodeV={0:0};
    for(var i4=0;i4<n;i4++) nodeV[i4+1]=_cabs(solC[i4]);

    /* ── 부품별 복소 전류 페이저 계산 ── */
    var compI_phasor={};   /* {re, im} — 복소 전류 페이저 */
    var compV_phasor={};   /* {re, im} — 복소 전압 페이저 */

    comps.forEach(function(c){
      var nn=cn[c.id]; if(!nn) return;
      /* 양단 복소 노드전압 */
      var VA = nn[0]>0 ? nodeVphasor[nn[0]-1] : _c();
      var VB = nn[1]>0 ? nodeVphasor[nn[1]-1] : _c();
      var dV = _csub(VA, VB);  /* 복소 전압 페이저 V_A - V_B */
      compV_phasor[c.id] = dV;

      if(c.type===TYPE.AC_SOURCE){
        /* 전압원 전류는 MNA 보조 미지수에서 직접 추출 */
        var k=vsrcs.findIndex(function(v){return v.id===c.id;});
        compI_phasor[c.id] = k>=0 ? solC[n+k] : _c();
      } else if(c.type===TYPE.RESISTOR){
        /* I = V/R (순수 실수 임피던스, 전압과 동위상) */
        var R=c.value>0?c.value:SMALL_R;
        compI_phasor[c.id]=_c(dV.re/R, dV.im/R);
      } else if(c.type===TYPE.CAPACITOR){
        /* Z_C = 1/(jωC), I = V·Y_C = V·(jωC) */
        var wC=omega*(c.value||0);
        /* Multiply dV by (j·wC): (re+j·im)*(j·wC) = (-im·wC) + j*(re·wC) */
        compI_phasor[c.id]=_c(-dV.im*wC, dV.re*wC);
      } else if(c.type===TYPE.INDUCTOR){
        /* Z_L = jωL, I = V/Z_L = V/(jωL) = V·(-j/(ωL)) */
        var wL=omega*(c.value||SMALL_R);
        if(wL>0){
          /* Divide dV by (j·wL): (re+j·im)/(j·wL) = (im/wL) + j*(-re/wL) */
          compI_phasor[c.id]=_c(dV.im/wL, -dV.re/wL);
        } else {
          compI_phasor[c.id]=_c();
        }
      } else {
        compI_phasor[c.id]=_c();
      }
    });

    /* ── compI(크기), compV(크기) — _buildResult 호환용 ── */
    var compI_mag={}, compV_mag={};
    comps.forEach(function(c){
      compI_mag[c.id] = compI_phasor[c.id] ? _cabs(compI_phasor[c.id]) : 0;
      compV_mag[c.id] = compV_phasor[c.id] ? _cabs(compV_phasor[c.id]) : 0;
    });

    /* ── _buildResult 호출: compI_mag 를 override 해서 DC 공식(dV/1e-6) 차단 ── */
    var base = _buildResult(comps, wires, topo, nodeV, {}, compI_mag);

    /* ── AC 전용 wireCurrents/wireSignedI 재계산 ───────────────────────────
     * _buildResult 내부 wireSignedI 는 nodeSignedOut 을 쓰는데,
     * AC 에서는 복소 phasor 의 크기(magnitude)를 직접 써야 한다.
     * 직렬 회로에서 모든 도선의 전류가 동일하게 나오도록 보장.
     * ─────────────────────────────────────────────────────────────────── */
    var jT_ac={JUNCTION_3:1,JUNCTION_4:1};

    /* JUNCTION 노드 처리를 위한 nodeSignedOut (복소) */
    var nso_re={}, nso_im={};
    comps.forEach(function(c){
      if(jT_ac[c.type]) return;
      var nn=cn[c.id]; if(!nn) return;
      var p=compI_phasor[c.id]||_c();
      nso_re[nn[0]]=(nso_re[nn[0]]||0)+p.re; nso_im[nn[0]]=(nso_im[nn[0]]||0)+p.im;
      nso_re[nn[1]]=(nso_re[nn[1]]||0)-p.re; nso_im[nn[1]]=(nso_im[nn[1]]||0)-p.im;
    });

    var wireSignedI_ac={}, wireCurrents_ac={};
    wires.forEach(function(w){
      var fc=comps.find(function(c2){return c2.id===w.fromId;});
      var tc=comps.find(function(c2){return c2.id===w.toId;});
      var fcJ=!fc||jT_ac[fc.type];
      var tcJ=!tc||jT_ac[tc.type];
      var pre=0, pim=0, mag=0;

      if(!fcJ){
        /* Case A: from 이 비-JUNCTION */
        var ports=App.Geo.getCompPorts(fc);
        var idx=ports.indexOf(w.fromPort);
        var sign=(idx===0?-1:1);
        var p=compI_phasor[fc.id]||_c();
        pre=sign*p.re; pim=sign*p.im; mag=_cabs(p);
      } else if(!tcJ){
        /* Case B: to 가 비-JUNCTION */
        var portsT=App.Geo.getCompPorts(tc);
        var idxT=portsT.indexOf(w.toPort);
        var signT=(idxT===0?1:-1);
        var pT=compI_phasor[tc.id]||_c();
        pre=signT*pT.re; pim=signT*pT.im; mag=_cabs(pT);
      } else {
        /* Case C: 양쪽 JUNCTION */
        var fn=topo.portNode[w.fromId]&&topo.portNode[w.fromId][w.fromPort];
        pre=fn!=null?(nso_re[fn]||0):0;
        pim=fn!=null?(nso_im[fn]||0):0;
        mag=Math.hypot(pre,pim);
      }

      /* 방향 부호: |실수부| > 1% × |페이저| 이면 실수부로, 아니면 허수부로 */
      var signRef=Math.abs(pre)>mag*0.01?pre:pim;
      wireSignedI_ac[w.id]=(signRef>=0?1:-1)*mag;
      wireCurrents_ac[w.id]=mag; /* peak 크기 */
    });

    base.wireCurrents = wireCurrents_ac;
    base.wireSignedI  = wireSignedI_ac;

    /* ── AC 전용 페이저 데이터 추가 ── */
    base.acPhasor = {
      omega     : omega,
      compI     : compI_phasor,   /* {id: {re,im}} — 복소 전류 페이저 */
      compV     : compV_phasor,   /* {id: {re,im}} — 복소 전압 페이저 */
      /* 편의 함수: t(초)에서의 순시 전류 i(t) = Re[I·e^(jωt)] */
      instCurrent: function(compId, t){
        var p=compI_phasor[compId];
        if(!p) return 0;
        /* i(t) = |I|·cos(ωt + φ_I) = Re[(p.re + j·p.im)·(cos(ωt)+j·sin(ωt))]
         *      = p.re·cos(ωt) - p.im·sin(ωt) */
        var ct=Math.cos(omega*t), st=Math.sin(omega*t);
        return p.re*ct - p.im*st;
      },
      /* 편의 함수: t(초)에서의 순시 전압 v(t) = Re[V·e^(jωt)] */
      instVoltage: function(compId, t){
        var p=compV_phasor[compId];
        if(!p) return 0;
        var ct=Math.cos(omega*t), st=Math.sin(omega*t);
        return p.re*ct - p.im*st;
      },
    };

    return base;
  }

  /* ══════════════════════════════════════════════════════
   *  개방 회로 검사 (BFS)
   * ══════════════════════════════════════════════════════ */
  function _checkOpen(topo, comps){
    var cn=topo.compNodes, N=topo.nodeCount;
    var adj=[]; for(var i=0;i<N;i++) adj.push([]);
    comps.forEach(function(c){
      var nn=cn[c.id]; if(!nn||nn[0]===nn[1]) return;
      adj[nn[0]].push(nn[1]); adj[nn[1]].push(nn[0]);
    });
    var vis=new Uint8Array(N);
    var q=[0]; vis[0]=1;
    while(q.length){
      var cur=q.shift();
      adj[cur].forEach(function(nb){if(!vis[nb]){vis[nb]=1;q.push(nb);}});
    }
    for(var i2=1;i2<N;i2++) if(!vis[i2]) return true;
    return false;
  }

  /* ══════════════════════════════════════════════════════
   *  진입점
   * ══════════════════════════════════════════════════════ */
  function _doSolve(){
    var comps=App.State.components;
    var ws   =App.State.wires;

    if(!comps.length){
      App.State.solverResult={valid:false,error:null,
        nodeVoltages:{},portVoltages:{},componentVoltages:{},branchCurrents:{},wireCurrents:{}};
      App.Events.emit('solver:done'); return;
    }

    var topo=App.Topology.build(comps,ws,App.Geo);
    if(!topo.valid){
      App.State.solverResult=_fail(topo.error||'토폴로지 오류');
      App.Events.emit('solver:done'); return;
    }

    if(_checkOpen(topo,comps)){
      App.State.solverResult=_fail('회로가 열려 있습니다');
      App.Events.emit('solver:done'); return;
    }

    var result;
    try{
      result=topo.hasAC?_solveAC(comps,ws,topo):_solveDC(comps,ws,topo);
    }catch(e){
      result=_fail('내부 오류: '+e.message);
    }

    App.State.solverResult=result;
    App.Events.emit('solver:done');
  }

  function run(){
    if(_schedId!==null){
      if(typeof cancelIdleCallback!=='undefined') cancelIdleCallback(_schedId);
      else clearTimeout(_schedId);
      _schedId=null;
    }
    if(typeof requestIdleCallback!=='undefined')
      _schedId=requestIdleCallback(function(){_schedId=null;_doSolve();},{timeout:120});
    else
      _schedId=setTimeout(function(){_schedId=null;_doSolve();},50);
  }

  return{run:run};
})();

}());
</script>

<!-- ═══════════════════ Script 7 — Renderers ═══════════════════ -->
<script>
(function(){
'use strict';
var App=window.App;

/* ════════════════════════════════════════════════════════════════════
 * App.GridRenderer — 격자 배경 (canvas-bg)
 *   뷰포트 변화 시에만 재렌더. 화면에 보이는 칸만 점으로 그린다.
 * ════════════════════════════════════════════════════════════════════ */
App.GridRenderer=(function(){
  var _cv,_ctx;
  function init(){_cv=document.getElementById('canvas-bg');_ctx=_cv.getContext('2d');}
  function render(){
    if(!_cv||!_ctx) return;
    var W=_cv.width,H=_cv.height;
    _ctx.clearRect(0,0,W,H);
    var vt=App.State.viewTransform, cp=CELL_SIZE*vt.scale;
    /* 화면에 보이는 칸 범위만 순회 (성능) */
    var sC=Math.max(0,Math.floor(-vt.offsetX/cp)), eC=Math.min(GRID_COLS,Math.ceil((W-vt.offsetX)/cp)+1);
    var sR=Math.max(0,Math.floor(-vt.offsetY/cp)), eR=Math.min(GRID_ROWS,Math.ceil((H-vt.offsetY)/cp)+1);
    var alpha=Math.min(0.55,0.12+vt.scale*.18);
    _ctx.fillStyle='rgba(90,120,180,'+alpha+')';
    for(var c=sC;c<eC;c++){
      for(var r=sR;r<eR;r++) _ctx.fillRect(c*cp+vt.offsetX-1,r*cp+vt.offsetY-1,2,2);
    }
    var info=document.getElementById('info-overlay');
    if(info) info.textContent='scale:'+vt.scale.toFixed(2)+'  off:('+Math.round(vt.offsetX)+','+Math.round(vt.offsetY)+')';
  }
  return{init,render};
})();


/* ════════════════════════════════════════════════════════════════════
 * App.EditRenderer — 편집 모드 렌더링 (canvas-main)
 *
 *   렌더 순서(레이어): 도선 → 부품/라벨 → 선택박스 → 포트점
 *                      → 도선 미리보기 → 드래그 고스트 → 솔버 오버레이
 *   scheduleRender(): rAF 디바운스. 선택/연결 시 애니메이션 루프 가동.
 * ════════════════════════════════════════════════════════════════════ */
App.EditRenderer=(function(){
  var _cv,_ctx;
  var _pending=false;
  var _wirePreview=null;       // {x1,y1,x2,y2,dir} — 도선 미리보기
  var _nearestPort=null;       // {componentId,port} — 연결 중 가장 가까운 포트
  var _flashWires={};          // {wireId: endTime} — 도선 완성 플래시
  var _selAnimId=null;

  function init(){_cv=document.getElementById('canvas-main');_ctx=_cv.getContext('2d');}

  function scheduleRender(){
    if(_pending) return;
    _pending=true;
    requestAnimationFrame(function(){_pending=false;render();});
  }

  function setWirePreview(v){_wirePreview=v;}
  function setNearestPort(v){_nearestPort=v;}
  function flashWire(wireId){_flashWires[wireId]=Date.now()+WIRE_FLASH_MS;}

  /* ── 공통 헬퍼 ────────────────────────────────────────────────────
   * 도선의 양 끝 포트 픽셀 좌표 반환 (없으면 null) */
  function _wireEndpoints(wire){
    var from=App.State.getComponent(wire.fromId);
    var to  =App.State.getComponent(wire.toId);
    if(!from||!to) return null;
    return{from:from, to:to,
           p1:App.Geo.getPortPixel(from,wire.fromPort),
           p2:App.Geo.getPortPixel(to,wire.toPort)};
  }
  /* 두 점이 모두 뷰포트 밖이면 false (클리핑) */
  function _segVisible(p1,p2,W,H){
    if(Math.max(p1.x,p2.x)<-10||Math.min(p1.x,p2.x)>W+10) return false;
    if(Math.max(p1.y,p2.y)<-10||Math.min(p1.y,p2.y)>H+10) return false;
    return true;
  }
  /* 도선 전류 크기: wireCurrents 우선, 없으면 양단 부품 branchCurrent 폴백 */
  function _wireCurrentMag(wire,sr,wc){
    var I=wc[wire.id];
    if(I==null){
      I=sr.branchCurrents[wire.fromId];
      if(I==null) I=sr.branchCurrents[wire.toId];
      if(I!=null) I=Math.abs(I);
    }
    return I;
  }

  // ─── 메인 렌더 함수 ───
  function render(){
    if(!_cv||!_ctx) return;
    var W=_cv.width,H=_cv.height;
    _ctx.clearRect(0,0,W,H);

    var vt=App.State.viewTransform;
    var cellPx=CELL_SIZE*vt.scale;
    var selId=App.State.selectedId;
    var conPort=App.State.connectingPort;
    var draggedId=App.Interaction?App.Interaction.getDraggedId():null;
    var dragInfo=App.Interaction?App.Interaction.getDragInfo():null;
    var now=Date.now();

    /* ── 1. 도선 ── */
    App.State.wires.forEach(function(wire){
      var ep=_wireEndpoints(wire);
      if(!ep) return;
