        tries++;
      }
      usedLabelY.push(y);
      return y;
    }

    _compList.forEach(function(c){
      if(!_active[c.id]||!_history[c.id]) return;
      var arr=_history[c.id];
      var N=arr.length;

      var rgb=c.color.replace('#','');
      var r=parseInt(rgb.slice(0,2),16),g2=parseInt(rgb.slice(2,4),16),b2=parseInt(rgb.slice(4,6),16);

      /* 커브 아래 그라데이션 — t=0에서 수직 점프 없이 시작 */
      _ctx.save();
      _ctx.beginPath();
      var started=false;
      for(var k=0;k<N;k++){
        var t=k/(N-1)*_tMax;
        if(t>xMax*1.001) break;
        var pxk=toPixX(t), pyk=toPixY(arr[k]);
        if(!started){
          _ctx.moveTo(pxk, toPixY(0)); /* 그라데이션 하단 시작 */
          _ctx.lineTo(pxk, pyk);        /* 첫 값으로 이동 (수직) */
          started=true;
        } else {
          _ctx.lineTo(pxk,pyk);
        }
      }
      var tClip=Math.min(_tMax,xMax);
      var kClip=Math.round((tClip/_tMax)*(N-1));
      _ctx.lineTo(toPixX(tClip), toPixY(arr[Math.min(kClip,N-1)]));
      _ctx.lineTo(toPixX(tClip), toPixY(0));
      _ctx.closePath();
      var grad=_ctx.createLinearGradient(0,PAD.top,0,PAD.top+gH);
      grad.addColorStop(0,'rgba('+r+','+g2+','+b2+',0.22)');
      grad.addColorStop(1,'rgba('+r+','+g2+','+b2+',0.02)');
      _ctx.fillStyle=grad;
      _ctx.fill();
      _ctx.restore();

      /* 커브 라인 — arr[0]이 t=0의 정확한 초기값 */
      _ctx.save();
      _ctx.shadowColor=c.color; _ctx.shadowBlur=4;
      _ctx.beginPath();
      _ctx.strokeStyle=c.color; _ctx.lineWidth=2.4; _ctx.lineJoin='round';
      var started2=false;
      var lastPxk=PAD.left, lastPyk=PAD.top+gH;
      for(var k2=0;k2<N;k2++){
        var t2=k2/(N-1)*_tMax;
        if(t2>xMax*1.001) break;
        var pxk2=toPixX(t2), pyk2=toPixY(arr[k2]);
        if(!started2){_ctx.moveTo(pxk2,pyk2);started2=true;}
        else _ctx.lineTo(pxk2,pyk2);
        lastPxk=pxk2; lastPyk=pyk2;
      }
      if(started2) _ctx.stroke();

      /* 종점 강조 */
      if(started){
        _ctx.beginPath(); _ctx.arc(lastPxk,lastPyk,4,0,Math.PI*2);
        _ctx.fillStyle=c.color; _ctx.fill();
        _ctx.strokeStyle='#ffffff'; _ctx.lineWidth=1; _ctx.shadowBlur=0;
        _ctx.stroke();
      }
      _ctx.restore();

      /* ── 수식 레이블 ──────────────────────────────────────────────
       * _systemPoles(Schur complement 극점) 기반 정확한 수식 표기.
       * 배열 역산 대신 실제 시스템 고유값(α, ωd)을 직접 사용.
       *
       * 판별: 증가형(RL-like) vs 감소형(RC-like)
       *   |arr[N-1]| > |arr[0]| * 0.5  → 증가형
       *
       * 수식 형식:
       *   단순(isOsc=false):
       *     증가: I∞·(1−e^(−αt))
       *     감소: I₀·e^(−αt)
       *   진동(isOsc=true):
       *     증가: I∞·(1−e^(−αt)·(cos+sin 항))
       *     감소: e^(−αt)·(I₀·cos(ωdt)+…)
       *   α 대신 1/τ 표기: τ = 1/α
       * ──────────────────────────────────────────────────────────── */
      var N_f=arr.length;
      var Iinf_f=arr[N_f-1];
      var absIinf_f=Math.abs(Iinf_f);
      var absI0_f=Math.abs(arr[0]);
      var absPeak_f=0;
      for(var kf=0;kf<N_f;kf++) if(Math.abs(arr[kf])>absPeak_f) absPeak_f=Math.abs(arr[kf]);

      var isRising_f=absIinf_f>absPeak_f*0.5;

      var alpha_f =_systemPoles.alpha;
      var wd_f    =_systemPoles.omegad;
      var isOsc_f =_systemPoles.isOsc;

      function fmtRate(r){
        var v,u;
        if(r>=1e6){v=(r/1e6).toPrecision(3);u='\\,\\mathrm{M/s}';}
        else if(r>=1e3){v=(r/1e3).toPrecision(3);u='\\,\\mathrm{k/s}';}
        else if(r>=1){v=r.toPrecision(3);u='\\,\\mathrm{/s}';}
        else if(r>=1e-3){v=(r*1e3).toPrecision(3);u='\\,\\mathrm{/ms}';}
        else{v=(r*1e6).toPrecision(3);u='\\,/\\mu\\mathrm{s}';}  /* µ → \mu */
        return v+u;
      }
      function fmtFreq(w){
        var v,u;
        if(w>=1e6){v=(w/1e6).toPrecision(3);u='\\,\\mathrm{Mrad/s}';}
        else if(w>=1e3){v=(w/1e3).toPrecision(3);u='\\,\\mathrm{krad/s}';}
        else if(w>=1){v=w.toPrecision(3);u='\\,\\mathrm{rad/s}';}
        else{v=(w*1e3).toPrecision(3);u='\\,\\mathrm{rad/ms}';}
        return v+u;
      }

      /* _fmtVal 반환값의 유니코드 µ (U+00B5) → LaTeX \mu 치환 */
      function toLatex(s){
        return s.replace(/µ/g,'\\mu ');
      }

      var Iinf_s='\\mathrm{'+toLatex(_fmtVal(absIinf_f,false))+'}';
      var I0_s  ='\\mathrm{'+toLatex(_fmtVal(absI0_f||absPeak_f,false))+'}';

      var formula='';
      if(isOsc_f){
        var a_tex=fmtRate(alpha_f);
        var w_tex=fmtFreq(wd_f);
        if(isRising_f)
          formula=Iinf_s+'\\!\\left(1-e^{-'+a_tex+'\\cdot t}\\bigl(\\cos('+w_tex+'\\cdot t)+\\cdots\\bigr)\\right)';
        else
          formula=I0_s+'\\,e^{-'+a_tex+'\\cdot t}\\bigl(\\cos('+w_tex+'\\cdot t)+\\cdots\\bigr)';
      } else {
        var tau_f=alpha_f>1e-10?1/alpha_f:_tMax;
        var tau_s='\\mathrm{'+toLatex(_fmtVal(tau_f,true))+'}';
        if(isRising_f) formula=Iinf_s+'\\!\\left(1-e^{-t/'+tau_s+'}\\right)';
        else           formula=I0_s+'\\,e^{-t/'+tau_s+'}';
      }

      var kMid=Math.round(0.4*(N_f-1)*Math.min(xMax,_tMax)/_tMax);
      kMid=Math.max(0,Math.min(N_f-1,kMid));
      var labelPreferY=toPixY(arr[kMid])-14;
      labelPreferY=Math.max(PAD.top+2,Math.min(PAD.top+gH-14,labelPreferY));
      var labelY=freeLabelY(labelPreferY,14);

      /* KaTeX DOM 오버레이용 데이터 수집 */
      _pendingLabels.push({formula:formula, lx:null, ly:labelY, color:c.color, preferLx:PAD.left+gW*0.38, gW:gW, PAD_left:PAD.left});
    });

    /* ── 축 레이블 ── */
    _ctx.save();
    _ctx.font='bold 11px "Courier New",monospace';
    _ctx.fillStyle='#7ab0d8';
    _ctx.textAlign='left'; _ctx.textBaseline='top';
    _ctx.fillText('i(t)', PAD.left+4, PAD.top+3);
    _ctx.textAlign='right'; _ctx.textBaseline='bottom';
    _ctx.fillText('t →', PAD.left+gW-2, PAD.top+gH-3);
    _ctx.restore();

    /* ── KaTeX DOM 오버레이 ──────────────────────────────────────────
     * 캔버스 위에 절대 위치 div를 올려 KaTeX로 수식을 렌더링.
     * 캔버스 재드로우 시 기존 레이블 div를 모두 제거 후 재생성.
     * ────────────────────────────────────────────────────────────── */
    var cvContainer=_cv.parentElement;
    /* 기존 수식 레이블 div 모두 제거 */
    var oldLabels=cvContainer.querySelectorAll('.tg-formula-label');
    for(var oi=0;oi<oldLabels.length;oi++) oldLabels[oi].parentNode.removeChild(oldLabels[oi]);

    /* KaTeX가 로드되어 있을 때만 렌더링 */
    if(typeof katex!=='undefined'&&_pendingLabels.length>0){
      var cvRect=_cv.getBoundingClientRect();
      var conRect=cvContainer.getBoundingClientRect();
      var offX=cvRect.left-conRect.left;
      var offY=cvRect.top-conRect.top;

      _pendingLabels.forEach(function(lb){
        var div=document.createElement('div');
        div.className='tg-formula-label';
        div.style.cssText=[
          'position:absolute',
          'pointer-events:none',
          'z-index:30',
          'white-space:nowrap',
          'background:rgba(4,10,24,0.82)',
          'border-radius:3px',
          'padding:1px 4px',
          'color:'+lb.color,
          'top:'+(offY+lb.ly-8)+'px',
          'left:'+(offX+lb.preferLx)+'px',
          'max-width:'+(lb.gW*0.55)+'px'
        ].join(';');

        try{
          katex.render(lb.formula,div,{throwOnError:false,displayMode:false,fontSize:'9px'});
        } catch(e){
          div.textContent=lb.formula;
        }

        /* 오른쪽 경계 초과 방지: 렌더 후 위치 재조정 */
        cvContainer.appendChild(div);
        var dw=div.offsetWidth;
        var maxLeft=offX+lb.PAD_left+lb.gW-dw-4;
        if(offX+lb.preferLx+dw>offX+lb.PAD_left+lb.gW){
          div.style.left=maxLeft+'px';
        }
      });
    } else if(_pendingLabels.length>0){
      /* KaTeX 미로드 시 캔버스 폴백 */
      _pendingLabels.forEach(function(lb){
        _ctx.save();
        _ctx.font='bold 9px "Courier New",monospace';
        _ctx.textAlign='left'; _ctx.textBaseline='middle';
        var tw=_ctx.measureText(lb.formula).width;
        var lx=lb.preferLx;
        if(lx+tw+6>lb.PAD_left+lb.gW) lx=lb.PAD_left+lb.gW-tw-6;
        _ctx.fillStyle='rgba(4,10,24,0.75)';
        _ctx.fillRect(lx-2,lb.ly-7,tw+6,14);
        _ctx.fillStyle=lb.color;
        _ctx.fillText(lb.formula,lx,lb.ly);
        _ctx.restore();
      });
    }
  }

  /* ── 공개 API ── */
  function show(){
    var params=_extractParams();
    if(!params){return;}
    var panel=document.getElementById('transient-panel');
    if(!panel) return;
    _cv=document.getElementById('transient-canvas');
    _ctx=_cv.getContext('2d');
    _tMax=0.1;
    _history=_computeTransient(params);
    _buildToggles(params);
    panel.classList.add('visible');
    _running=true;
    /* 패널이 보이고 나서 크기가 확정된 뒤 그래프 그리기 */
    requestAnimationFrame(function(){
      requestAnimationFrame(_drawGraph);
    });
    /* ResizeObserver: 패널 크기 변화(모바일 방향 전환 등) 시 자동 재렌더 */
    if(window.ResizeObserver && !_resizeObs){
      _resizeObs=new ResizeObserver(function(){
        if(_running) requestAnimationFrame(_drawGraph);
      });
      _resizeObs.observe(panel);
    }
  }

  function hide(){
    var panel=document.getElementById('transient-panel');
    if(panel) panel.classList.remove('visible');
    _running=false;
    if(_resizeObs){_resizeObs.disconnect();_resizeObs=null;}
  }

  function toggle(){
    var panel=document.getElementById('transient-panel');
    if(!panel) return;
    if(panel.classList.contains('visible')) hide();
    else show();
  }

  function init(){
    var closeBtn=document.getElementById('tp-close-btn');
    if(closeBtn) closeBtn.addEventListener('click',function(){
      hide();
      var gb=document.getElementById('mobile-graph-btn');
      if(gb) gb.classList.remove('graph-active');
    });
    App.Events.on('solver:done',function(){
      if(_running) show();
    });
  }

  /* ── 비유 모드 재사용: 과도응답 핏 데이터 계산/반환 ──
   *   반환: { byId:{compId:{amp,tau,isRising}}, domTau:지배시상수 }
   *   동적 소자(L/C)가 없으면 null. 패널 표시 여부와 무관하게 계산. */
  function getTransientData(){
    var params=_extractParams();
    if(!params) return null;
    var savedTMax=_tMax, savedPoles=_systemPoles;
    _computeTransient(params);   /* _fitData, _domTau, _branchModel 갱신 (부수효과로 _tMax 변경) */
    var data={ byId:_fitData, domTau:_domTau, branchModel:_branchModel };
    /* 패널이 실행 중이 아니면 _tMax 등 원복 (그래프 상태 보호) */
    if(!_running){ _tMax=savedTMax; _systemPoles=savedPoles; }
    return data;
  }

  return{init:init, show:show, hide:hide, toggle:toggle,
         _extractParams:_extractParams, getTransientData:getTransientData};
})();

}());
</script>

<!-- ═══════════════════ Script 12a — Value Edit Popup ═══════════════════ -->
<script>
(function(){
'use strict';
var App=window.App;

/* ════════════════════════════════════════════════════════════════════
 * App.ValPopup — 소자 값 인라인 수정 팝업
 *   open({title,value,step,min,max,anchorEl,onConfirm}) 로 호출.
 *   anchorEl 아래에 위치하며, 화면 밖으로 넘치면 위/좌로 자동 보정.
 *   Enter=확정, Esc=취소, 외부 클릭=닫기.
 * ════════════════════════════════════════════════════════════════════ */
App.ValPopup=(function(){
  var _popup,_input,_title,_onConfirm=null;

  function _init(){
    _popup=document.getElementById('val-popup');
    _input=document.getElementById('vp-input');
    _title=document.getElementById('vp-title');
    document.getElementById('vp-ok').addEventListener('click',_confirm);
    document.getElementById('vp-cancel').addEventListener('click',_close);
    _input.addEventListener('keydown',function(e){
      e.stopPropagation();
      if(e.key==='Enter') _confirm();
      if(e.key==='Escape') _close();
    });
    _input.addEventListener('pointerdown',function(e){e.stopPropagation();});
    /* 외부 클릭 닫기 */
    document.addEventListener('pointerdown',function(e){
      if(_popup.classList.contains('visible')&&!_popup.contains(e.target)) _close();
    },true);
  }

  function open(opts){
    _onConfirm=opts.onConfirm||null;
    _title.textContent=opts.title||'값 입력';
    _input.step =opts.step||'any';
    _input.min  =opts.min!=null?opts.min:'';
    _input.max  =opts.max!=null?opts.max:'';
    _input.value=opts.value;
    /* 위치: 버튼 아래 */
    if(opts.anchorEl){
      var r=opts.anchorEl.getBoundingClientRect();
      var left=r.left, top=r.bottom+6;
      if(left+224>window.innerWidth-8) left=window.innerWidth-232;
      if(top+170>window.innerHeight-8) top=r.top-176;
      _popup.style.left=left+'px'; _popup.style.top=top+'px';
    }
    _popup.classList.add('visible');
    setTimeout(function(){_input.focus();_input.select();},30);
  }

  function _confirm(){
    var v=parseFloat(_input.value);
    if(!isNaN(v)&&_onConfirm) _onConfirm(v);
    _close();
  }
  function _close(){_popup.classList.remove('visible');_onConfirm=null;}

  return{init:_init,open:open,close:_close};
})();

}());
</script>

<!-- ═══════════════════ Script 12b — Property Panel ═══════════════════ -->
<script>
(function(){
'use strict';
var App=window.App;

/* ════════════════════════════════════════════════════════════════════
 * App.PropPanel — 선택된 소자/도선의 속성 패널
 *
 *   소자: 유형 헤더 · 이름 입력 · 물리량(값 버튼→ValPopup) · 연결 정보
 *         · 측정값(전류/전압/전력, DC/AC 분기) · 회전/삭제
 *   도선: 출발/도착 · 꺾임 방향 전환 · 전류 · 삭제
 *
 *   FIELDS 테이블: 소자별 편집 가능 물리량 정의
 *     {label, key, unit, ds(표시배율), df(소수자리), min, max, step}
 * ════════════════════════════════════════════════════════════════════ */
App.PropPanel=(function(){
  var _panel,_content;

  var LABELS={
    DC_SOURCE:'직류 전원',AC_SOURCE:'교류 전원',RESISTOR:'저항',
    CAPACITOR:'축전기',INDUCTOR:'인덕터',
    JUNCTION_3:'3방향 교차',JUNCTION_4:'4방향 교차',
  };

  // {label, key, unit, displayScale, displayFixed, min, max, step}
  var FIELDS={
    DC_SOURCE:[{label:'전압',    key:'value', unit:'V',  ds:1,   df:1, min:0,     max:9999, step:1}],
    AC_SOURCE:[{label:'전압',    key:'value', unit:'V',  ds:1,   df:1, min:0,     max:9999, step:1},
               {label:'주파수', key:'value2',unit:'Hz', ds:1,   df:0, min:1,     max:1e6,  step:1}],
    RESISTOR: [{label:'저항',   key:'value', unit:'Ω',  ds:1,   df:0, min:0.001, max:1e9,  step:1}],
    CAPACITOR:[{label:'전기용량',key:'value',unit:'µF', ds:1e6, df:2, min:0.001, max:1e6,  step:1}],
    INDUCTOR: [{label:'인덕턴스',key:'value',unit:'mH', ds:1e3, df:2, min:0.001, max:1e6,  step:1}],
  };

  // ── 측정값 포맷 — 크기에 따라 단위 자동 선택 ──

  /* 범용 SI 소단위 포맷터: value(기본단위) → "12.34 µX" 형태
   *   unit: 기본 단위 문자(C/Wb/J 등). p/n/µ/m 접두어 자동 선택. */
  function _fmtSI(value, unit){
    var a=Math.abs(value);
    if(a<1e-9) return (value*1e12).toFixed(2)+' p'+unit;
    if(a<1e-6) return (value*1e9 ).toFixed(2)+' n'+unit;
    if(a<1e-3) return (value*1e6 ).toFixed(2)+' µ'+unit;
    if(a<1)    return (value*1e3 ).toFixed(2)+' m'+unit;
    return value.toFixed(4)+' '+unit;
  }
  function _fmtCurrent(A){
    if(A==null) return '계산 불가';
    var abs=Math.abs(A);
    if(abs===0) return '0 A';
    if(abs<1e-6)  return (A*1e9).toFixed(2)+' nA';
    if(abs<1e-3)  return (A*1e6).toFixed(2)+' µA';
    if(abs<1)     return (A*1e3).toFixed(3)+' mA';
    return A.toFixed(4)+' A';
  }
  function _fmtVoltage(V){
    if(V==null) return '계산 불가';
    if(Math.abs(V)<0.001) return (V*1000).toFixed(2)+' mV';
    return V.toFixed(4)+' V';
  }
  function _fmtPower(W){
    if(W==null) return '계산 불가';
    return W.toFixed(2)+' W'; // 교육용: W 고정
  }

  function init(){_panel=document.getElementById('prop-panel');_content=document.getElementById('prop-content');}

  function show(id){
    var comp=App.State.getComponent(id);
    if(!comp){var wire=App.State.getWire(id);if(wire){_renderWire(wire);return;}hide();return;}
    _panel.classList.add('visible');
    _renderComp(comp);
  }

  function hide(){_panel.classList.remove('visible');if(_content)_content.innerHTML='';}

  function refresh(){var id=App.State.selectedId;if(id)show(id);else hide();}

  function _renderComp(comp){
    _content.innerHTML='';

    /* ── 유형 헤더 ── */
    var hdr=document.createElement('div');
    hdr.style.cssText='color:#7ec8f0;font-weight:700;font-size:11px;margin-bottom:8px;'+
                      'display:flex;align-items:center;justify-content:space-between';
    var typeSpan=document.createElement('span');typeSpan.textContent=LABELS[comp.type]||comp.type;
    var rotInfo=document.createElement('span');
    rotInfo.style.cssText='color:#3a5a7a;font-size:10px';
    rotInfo.textContent=comp.rotation+'°';
    hdr.appendChild(typeSpan);hdr.appendChild(rotInfo);
    _content.appendChild(hdr);

    /* ── 사용자 라벨 입력 ── */
    var lblRow=document.createElement('div');lblRow.className='pp-row';
    var lblKey=document.createElement('span');lblKey.className='pp-key';lblKey.textContent='이름';
    var lblInp=document.createElement('input');
    lblInp.className='pp-input';lblInp.type='text';
    lblInp.style.width='100px';
    lblInp.placeholder='(선택사항)';
    lblInp.value=comp.label||'';
    lblInp.addEventListener('focus',function(){this.select();});
    lblInp.addEventListener('keydown',function(e){
      e.stopPropagation(); // 키보드 단축키 차단
      if(e.key==='Enter'){this.blur();}
      if(e.key==='Escape'){this.value=comp.label||'';this.blur();}
    });
    lblInp.addEventListener('change',function(){
      comp.label=this.value.trim();
      rotInfo.textContent=comp.rotation+'°';
      App.Events.emit('state:changed');
    });
    lblInp.addEventListener('pointerdown',function(e){e.stopPropagation();});
    lblRow.appendChild(lblKey);lblRow.appendChild(lblInp);
    _content.appendChild(lblRow);

    /* ── 물리량 입력 ── */
    (FIELDS[comp.type]||[]).forEach(function(f){
      var raw=comp[f.key];if(raw==null) return;
      var row=document.createElement('div');row.className='pp-row';
      var k=document.createElement('span');k.className='pp-key';k.textContent=f.label+' ('+f.unit+')';

      /* 현재 값 표시 버튼 — 클릭 시 팝업 열기 */
      var valBtn=document.createElement('button');
      valBtn.className='pp-input';
      valBtn.style.cssText='cursor:pointer;text-align:right;width:90px;padding:3px 8px;'+
        'font-size:12px;font-family:monospace;font-weight:700;color:#e8f4ff;'+
        'background:rgba(14,24,50,0.9);border:1px solid #2a5090;border-radius:6px;';
      function _refreshValBtn(){
        valBtn.textContent=(comp[f.key]*f.ds).toFixed(f.df)+' '+f.unit;
      }
      _refreshValBtn();

      valBtn.addEventListener('click',function(e){
        e.stopPropagation();
        App.ValPopup.open({
          title: f.label+' ('+f.unit+')',
          value: comp[f.key]*f.ds,
          step:  f.step||'any',
          min:   f.min||0,
          max:   f.max,
          anchorEl: valBtn,
          onConfirm: function(v){
            var clamped=Math.max(f.min||0, f.max?Math.min(f.max,v):v);
            comp[f.key]=clamped/f.ds;
            _refreshValBtn();
            App.Events.emit('state:changed');
          }
        });
      });
      valBtn.addEventListener('pointerdown',function(e){e.stopPropagation();});
      row.appendChild(k);row.appendChild(valBtn);_content.appendChild(row);
    });

    /* ── 연결 정보 ── */
    if(comp.type!==TYPE.JUNCTION_3&&comp.type!==TYPE.JUNCTION_4){
      var ports=App.Geo.getCompPorts(comp);
      var connCount=ports.reduce(function(n,p){return n+App.State.getPortWires(comp.id,p).length;},0);
      _content.appendChild(_row('연결',connCount>0?connCount+'개 도선':'없음'));
    }

    /* ── 측정값 ── */
    var mDiv=document.createElement('div');mDiv.className='pp-measure';
    var sr=App.State.solverResult;
    if(sr&&sr.valid){
      var I=sr.branchCurrents[comp.id], V=sr.componentVoltages[comp.id];
      var isAC=!!(sr.acPhasor);

      if(isAC){
        /* ── AC: 피크값 + RMS + 임피던스 ── */
        var omega=sr.acPhasor.omega;
        var Ipk=I!=null?Math.abs(I):null;
        var Vpk=V!=null?Math.abs(V):null;
        var Irms=Ipk!=null?Ipk/Math.SQRT2:null;
        var Vrms=Vpk!=null?Vpk/Math.SQRT2:null;
        mDiv.appendChild(_row('전류(peak)',_fmtCurrent(Ipk)));
        mDiv.appendChild(_row('전류(RMS)', _fmtCurrent(Irms)));
        mDiv.appendChild(_row('전압(peak)',_fmtVoltage(Vpk)));
        mDiv.appendChild(_row('전압(RMS)', _fmtVoltage(Vrms)));
        /* 임피던스 */
        var Z=null, Zlabel='임피던스';
        if(comp.type===TYPE.RESISTOR){
          Z=comp.value||0; Zlabel='R';
        } else if(comp.type===TYPE.CAPACITOR){
          var wC2=omega*(comp.value||0);
          Z=wC2>1e-15?1/wC2:Infinity; Zlabel='|Z_C|=1/ωC';
        } else if(comp.type===TYPE.INDUCTOR){
          Z=omega*(comp.value||0); Zlabel='|Z_L|=ωL';
        }
        if(Z!=null&&isFinite(Z))
          mDiv.appendChild(_row(Zlabel, Z>=1000?(Z/1000).toFixed(3)+' kΩ':Z.toFixed(3)+' Ω'));
        if(comp.type===TYPE.RESISTOR&&Irms!=null&&Vrms!=null)
          mDiv.appendChild(_row('소비전력(평균)',_fmtPower(Vrms*Irms)));
        if((comp.type===TYPE.AC_SOURCE)&&Irms!=null&&Vrms!=null)
          mDiv.appendChild(_row('공급전력(평균)',_fmtPower(Vrms*Irms)));
      } else {
        /* ── DC ── */
        mDiv.appendChild(_row('전류',_fmtCurrent(I)));
        mDiv.appendChild(_row('전압강하',_fmtVoltage(V)));
        if(comp.type===TYPE.RESISTOR&&I!=null&&V!=null)
          mDiv.appendChild(_row('소비전력',_fmtPower(Math.abs(V*I))));
        if((comp.type===TYPE.DC_SOURCE||comp.type===TYPE.AC_SOURCE)&&V!=null&&I!=null)
          mDiv.appendChild(_row('공급전력',_fmtPower(Math.abs(V*I))));

        /* ── 커패시터: 충전량 Q = C·V ── */
        if(comp.type===TYPE.CAPACITOR){
          var Vcap=V!=null?Math.abs(V):0;
          var Ccap=comp.value||0;
          var Q=Ccap*Vcap;  /* 쿨롱 */
          var Qstr=_fmtSI(Q,'C');
          mDiv.appendChild(_row('충전량 Q=CV', Qstr));
          mDiv.appendChild(_row('+극판 전하', '+'+Qstr));
          mDiv.appendChild(_row('−극판 전하', '−'+Qstr));
          mDiv.appendChild(_row('상태',_makeBadge('DC 개방 (정상상태)','#1a4030')));

          /* 병렬 연결된 다른 커패시터 합산 */
          var nn=sr.componentNodes?sr.componentNodes[comp.id]:null;
          if(nn){
            var parallelComps=App.State.components.filter(function(c2){
              if(c2.id===comp.id||c2.type!==TYPE.CAPACITOR) return false;
              var nn2=sr.componentNodes[c2.id];
              if(!nn2) return false;
              return (nn2[0]===nn[0]&&nn2[1]===nn[1])||(nn2[0]===nn[1]&&nn2[1]===nn[0]);
            });
            if(parallelComps.length>0){
              var Qtotal=Q;
              parallelComps.forEach(function(c2){
                var V2=sr.componentVoltages[c2.id]||0;
                Qtotal+=(c2.value||0)*Math.abs(V2);
              });
              mDiv.appendChild(_row('병렬 총 충전량', _fmtSI(Qtotal,'C')));
              /* 전하 보존 검증: +극판 합 = -극판 합 (크기 동일) → 표시 */
              mDiv.appendChild(_row('전하 보존',_makeBadge('ΣQ+ = ΣQ−  ✓','#1a3a4a')));
            }
          }
        }

        /* ── 인덕터: 자기장 Φ = L·I, 자기에너지 E = ½LI² ── */
        if(comp.type===TYPE.INDUCTOR){
          var Lval=comp.value||0;
          var Iind=I!=null?Math.abs(I):0;
          var phi=Lval*Iind;             /* 자속 Φ = L·I (Wb=V·s) */
          var Emag=0.5*Lval*Iind*Iind;   /* 자기에너지 (J) */
          mDiv.appendChild(_row('자속 Φ=LI', _fmtSI(phi,'Wb')));
          mDiv.appendChild(_row('자기에너지 ½LI²', _fmtSI(Emag,'J')));
          mDiv.appendChild(_row('상태',_makeBadge('DC 단락 (정상상태)','#1a2a50')));
        }
      }
    } else if(sr&&sr.error){
      var errDiv=document.createElement('div');
      errDiv.style.cssText='background:rgba(100,20,20,0.30);border:1px solid #5a2020;'+
        'border-radius:5px;padding:6px 8px;margin-top:2px;color:#f08a8a;font-size:10px;line-height:1.5';
      errDiv.textContent='⚠ '+sr.error;
      mDiv.appendChild(errDiv);
    } else {
      var hint=document.createElement('div');
      hint.style.cssText='color:#2d4a60;font-size:10px;text-align:center;padding:3px 0';
      hint.textContent='— 회로 완성 후 자동 계산 —';mDiv.appendChild(hint);
    }
    _content.appendChild(mDiv);

    /* ── 회전 / 삭제 버튼 ── */
    var isJunction=comp.type===TYPE.JUNCTION_3||comp.type===TYPE.JUNCTION_4;
    var btns=document.createElement('div');btns.className='pp-btns';
    if(comp.type!==TYPE.JUNCTION_4){  /* JUNCTION_4만 회전 제외, J3는 허용 */
      btns.appendChild(_btn('↻ 회전','pp-btn-rotate',function(){
        App.State.rotateComponent(comp.id);
        rotInfo.textContent=comp.rotation+'°';
        show(comp.id);
      }));
    }
    btns.appendChild(_btn('✕ 삭제','pp-btn-delete',function(){
      var id=App.State.selectedId;if(!id) return;
      App.State.removeComponent(id);App.EditRenderer.stopSelAnimation();hide();
    }));
    _content.appendChild(btns);
  }

  function _renderWire(wire){
    _panel.classList.add('visible');_content.innerHTML='';

    /* ── 헤더 ── */
    var hdr=document.createElement('div');
    hdr.style.cssText='color:#7ec8f0;font-weight:700;font-size:11px;margin-bottom:8px';
    hdr.textContent='도선';_content.appendChild(hdr);

    /* ── 연결 정보 ── */
    var fromComp=App.State.getComponent(wire.fromId);
    var toComp=App.State.getComponent(wire.toId);
    if(fromComp&&toComp){
      _content.appendChild(_row('출발',(LABELS[fromComp.type]||fromComp.type)+' · '+wire.fromPort));
      _content.appendChild(_row('도착',(LABELS[toComp.type]||toComp.type)+' · '+wire.toPort));
    }

    /* ── 꺾임 방향 전환 ── */
    var dirRow=document.createElement('div');dirRow.className='pp-row';
    var dk=document.createElement('span');dk.className='pp-key';dk.textContent='꺾임 방향';
    var tb=document.createElement('button');
    tb.style.cssText='flex:none;padding:3px 10px;font-size:10px;cursor:pointer;font-family:monospace;'+
                     'border-radius:4px;border:1px solid #1e4060;background:#162535;color:#60a8d8';
    tb.textContent=wire.direction==='H-first'?'H→V':'V→H';
    tb.addEventListener('click',function(){
      wire.direction=wire.direction==='H-first'?'V-first':'H-first';
      tb.textContent=wire.direction==='H-first'?'H→V':'V→H';
      App.Events.emit('state:changed');
    });
    tb.addEventListener('pointerdown',function(e){e.stopPropagation();});
    dirRow.appendChild(dk);dirRow.appendChild(tb);_content.appendChild(dirRow);

    /* ── 힌트 ── */
    var hintEl=document.createElement('div');
    hintEl.style.cssText='color:#2a4a60;font-size:9px;text-align:center;padding:2px 0 4px';
    hintEl.textContent='◇ 핸들 탭으로도 방향 전환';_content.appendChild(hintEl);

    /* ── 도선 측정값 ── */
    var sr2=App.State.solverResult;
    if(sr2&&sr2.valid){
      var wMeas=document.createElement('div');wMeas.className='pp-measure';
      var wireI=(sr2.wireCurrents&&sr2.wireCurrents[wire.id]!=null)
        ? sr2.wireCurrents[wire.id]
        : null;
      wMeas.appendChild(_row('전류', _fmtCurrent(wireI)));
      _content.appendChild(wMeas);
    } else if(sr2&&sr2.error){
      var wErr=document.createElement('div');
      wErr.style.cssText='color:#f08a8a;font-size:10px;padding:4px 0;text-align:center';
      wErr.textContent='⚠ '+sr2.error;_content.appendChild(wErr);
    }

    /* ── 삭제 ── */
    var btns=document.createElement('div');btns.className='pp-btns';
    var del=_btn('✕ 도선 삭제','pp-btn-delete',function(){
      App.State.removeWire(wire.id);App.EditRenderer.stopSelAnimation();hide();
    });
    del.style.width='100%';btns.appendChild(del);_content.appendChild(btns);
  }

  /* 키-값 행 생성.
   *   val이 문자열/숫자면 textContent, DOM 노드(배지 등)면 appendChild.
   *   (과거 _makeBadge 결과를 textContent로 넣어 [object HTMLSpanElement]
   *    표시되던 버그 수정) */
  function _row(key,val){
    var row=document.createElement('div');row.className='pp-row';
    var k=document.createElement('span');k.className='pp-key';k.textContent=key;
    var v=document.createElement('span');v.className='pp-val';
    if(val instanceof Node) v.appendChild(val);
    else v.textContent=val;
    row.appendChild(k);row.appendChild(v);return row;
  }
  function _makeBadge(text,bg){
    var s=document.createElement('span');
    s.style.cssText='background:'+bg+';border-radius:3px;padding:1px 5px;font-size:9px;color:#a0d0c0';
    s.textContent=text;return s;
  }
  function _btn(text,cls,onClick){
    var b=document.createElement('button');b.className='pp-btn '+cls;b.textContent=text;
    b.addEventListener('click',onClick);b.addEventListener('pointerdown',function(e){e.stopPropagation();});
    return b;
  }

  return{init,show,hide,refresh};
})();

}());
</script>


<!-- ═══════════════════ Script 13 — Main ═══════════════════ -->
<script>
(function(){
'use strict';
var App=window.App;

/* 전역 에러 토스트 (어느 모듈에서나 호출 가능) */
window.showErrorToast=function(msg,dur){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('visible');
  setTimeout(function(){t.classList.remove('visible');},dur||3000);
};

/* ════════════════════════════════════════════════════════════════════
 * App.Main — 앱 부트스트랩 & 오케스트레이션
 *
 *   init(): 캔버스 리사이즈 → 각 모듈 init → 이벤트 배선 →
 *           사이드바/모드바 구성 → (모바일이면) 모바일 UX → 버튼 연결.
 *   모드 FSM: edit ⇄ run ⇄ analogy, capture(일회성 PNG 저장).
 *   이벤트 흐름: state:changed → Solver.run → solver:done → 패널/렌더 갱신.
 * ════════════════════════════════════════════════════════════════════ */
App.Main=(function(){

  /* 지정한 요소들에서 주어진 이벤트들의 전파를 차단 (모바일 터치가
   * 캔버스로 새어 들어가 의도치 않은 제스처를 유발하는 것 방지) */
  function _blockPropagation(el, events){
    if(!el) return;
    events.forEach(function(ev){
      el.addEventListener(ev,function(e){e.stopPropagation();},{passive:false});
    });
  }
  var _TOUCH_EVENTS=['pointerdown','touchstart','touchmove','touchend','click'];

  function _resizeCanvases(){
    var c=document.getElementById('canvas-container');var W=c.clientWidth,H=c.clientHeight;
    ['canvas-bg','canvas-main','canvas-anim'].forEach(function(id){
      var cv=document.getElementById(id);if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;}
    });
  }

  function _buildSidebar(){
    var sb=document.getElementById('sidebar');sb.innerHTML='';
    SIDEBAR_ITEMS.forEach(function(item,idx){
      var div=document.createElement('div');div.className='sidebar-item';
      div.id='sidebar-item-'+item.type;  /* J4 위치 계산용 id */
      var cv=document.createElement('canvas');cv.width=32;cv.height=32;cv.style.pointerEvents='none';
      App.Symbols.drawMini(cv,item.type);
      var lbl=document.createElement('span');lbl.className='s-label';lbl.textContent=item.label;
      div.appendChild(cv);div.appendChild(lbl);
      div.addEventListener('pointerdown',function(e){e.stopPropagation();App.Interaction.startSidebarDrag(item,e.clientX,e.clientY,div);});
      sb.appendChild(div);
      if(idx===4){var sep=document.createElement('div');sep.className='sidebar-sep';sb.appendChild(sep);}
    });
    /* ── 전체 초기화 버튼 ── */
    var spacer=document.createElement('div');spacer.style.flex='1';sb.appendChild(spacer);
    var clearSep=document.createElement('div');clearSep.className='sidebar-sep';sb.appendChild(clearSep);
    var clrBtn=document.createElement('div');clrBtn.className='sidebar-item sidebar-clear';
    clrBtn.title='회로 초기화';
    var clrLbl=document.createElement('span');clrLbl.className='s-label';clrLbl.textContent='초기화';
    clrLbl.style.color='#804040';
    var clrIcon=document.createElement('span');clrIcon.style.cssText='font-size:16px;line-height:1;color:#804040';clrIcon.textContent='⌫';
    clrBtn.appendChild(clrIcon);clrBtn.appendChild(clrLbl);
    clrBtn.addEventListener('pointerdown',function(e){
      e.stopPropagation();
      if(!App.State.components.length&&!App.State.wires.length) return;
      showErrorToast('길게 눌러서 초기화하세요',1500);
    });
    /* 롱프레스 1.2초 → 전체 초기화 확인 */
    var clrTimer=null;
    clrBtn.addEventListener('pointerdown',function(e){
      e.stopPropagation();
      clrTimer=setTimeout(function(){
        /* 모드 강제 편집으로 복귀 */
        if(App.State.mode==='run')     App.RunRenderer.stop();
        if(App.State.mode==='analogy') App.AnalogyRenderer.stop();
        _setAnalogyUIHidden(false);   /* UI 복원 (#6) */
        App.State.mode='edit';
        document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.toggle('active',b.dataset.mode==='edit');});
        /* 상태 완전 초기화 */
        while(App.State.components.length) App.State.removeComponent(App.State.components[0].id);
        App.State.selectedId=null;
        App.PropPanel.hide();
        App.EditRenderer.stopSelAnimation();
        App.Events.emit('viewport:changed');
        showErrorToast('회로를 초기화했습니다',2000);
      },1200);
    });
    ['pointerup','pointercancel'].forEach(function(ev){
      clrBtn.addEventListener(ev,function(){clearTimeout(clrTimer);});
    });
    sb.appendChild(clrBtn);
  }

  function _captureCircuit(){
    var srcCv=document.getElementById('canvas-main');
    if(!srcCv) return;
    var W=srcCv.width, H=srcCv.height;
    var off=document.createElement('canvas');
    off.width=W; off.height=H;
    var ctx=off.getContext('2d');
    ctx.clearRect(0,0,W,H);
    var vt=App.State.viewTransform;
    var cellPx=CELL_SIZE*vt.scale;
    var lw=Math.max(1.5,cellPx*0.042);

    /* 도선 */
    ctx.save();
    ctx.strokeStyle='#000000'; ctx.lineWidth=lw;
    ctx.lineCap='round'; ctx.lineJoin='round';
    App.State.wires.forEach(function(wire){
      var from=App.State.getComponent(wire.fromId);
      var to=App.State.getComponent(wire.toId);
      if(!from||!to) return;
      var p1=App.Geo.getPortPixel(from,wire.fromPort);
      var p2=App.Geo.getPortPixel(to,wire.toPort);
      var path=App.Geo.calcWirePath(p1.x,p1.y,p2.x,p2.y,wire.direction);
      ctx.beginPath();
      ctx.moveTo(path[0].x,path[0].y);
      for(var i=1;i<path.length;i++) ctx.lineTo(path[i].x,path[i].y);
      ctx.stroke();
    });
    ctx.restore();

    /* 소자 심볼 */
    App.State.components.forEach(function(comp){
      var gp=App.Geo.gridToPixel(comp.gridX,comp.gridY);
      var cx=gp.x+cellPx/2, cy=gp.y+cellPx/2;
      if(comp.type===TYPE.JUNCTION_3||comp.type===TYPE.JUNCTION_4){
        ctx.save();
        ctx.strokeStyle='#000000'; ctx.lineWidth=lw; ctx.lineCap='round';
        App.State.wires.forEach(function(w){
          var isFrom=(w.fromId===comp.id), isTo=(w.toId===comp.id);
          if(!isFrom&&!isTo) return;
          var jPortPx=isFrom?App.Geo.getPortPixel(comp,w.fromPort):App.Geo.getPortPixel(comp,w.toPort);
          ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(jPortPx.x,jPortPx.y); ctx.stroke();
        });
        ctx.fillStyle='#000000';
        ctx.beginPath(); ctx.arc(cx,cy,lw/2,0,Math.PI*2); ctx.fill();
        ctx.restore();
        return;
      }
      App.Symbols.draw(ctx,comp.type,cx,cy,cellPx,comp.rotation,{color:'#000000'});
    });

    off.toBlob(function(blob){
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url; a.download='circuit_'+Date.now()+'.png';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(url);},1000);
    },'image/png');
  }

  function _updateModeBar(mode){
    document.querySelectorAll('.mode-btn').forEach(function(b){
      b.classList.toggle('active', b.dataset.mode===mode);
    });
  }

  /* 비유 모드 진입/이탈 시 UI 가시성 토글 (#6)
   *   비유 모드에서는 속성 패널·과도그래프·undo/redo·표시토글 바를 모두 숨기고,
   *   편집·실행 모드로 돌아오면 다시 보이게 한다. (모드 전환 바는 항상 표시) */
  function _setAnalogyUIHidden(hidden){
    /* 속성 패널 */
    var pp=document.getElementById('prop-panel');
    if(pp&&hidden) pp.classList.remove('visible');
    /* 과도 응답 그래프 */
    if(hidden && App.TransientGraph) App.TransientGraph.hide();
    /* undo/redo + 표시 토글 바 */
    var undoBar=document.getElementById('undo-bar');
    if(undoBar) undoBar.style.display=hidden?'none':'';
    /* 모바일 전용 버튼(속성·그래프 토글)도 비유 모드에서 숨김 */
    var infoBtn=document.getElementById('mobile-info-btn');
    var graphBtn=document.getElementById('mobile-graph-btn');
    if(hidden){
      if(infoBtn) infoBtn.style.display='none';
      if(graphBtn) graphBtn.style.display='none';
    }
    /* 복원은 각자 로직(state:changed / solver:done)이 자동 처리 */
  }

  function _setupModeBar(){
    document.querySelectorAll('.mode-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        var next=btn.dataset.mode;
        var cur =App.State.mode;
        if(next===cur) return;

        /* ── 현재 모드 종료 처리 ── */
        if(cur==='run')     App.RunRenderer.stop();
        if(cur==='analogy') App.AnalogyRenderer.stop();

        /* ── 편집 모드 진입 ── */
        if(next==='edit'){
          App.State.mode='edit';
          _updateModeBar('edit');
          App.TransientGraph.hide();
          _setAnalogyUIHidden(false);   /* UI 복원 (#6) */
          App.Events.emit('viewport:changed');
          return;
        }

        /* ── 실행 모드 진입 ── */
        if(next==='run'){
          App.State.mode='run';
          _updateModeBar('run');
          _setAnalogyUIHidden(false);   /* UI 복원 (#6) */
          App.RunRenderer.start();
          App.TransientGraph.show();  /* DC 동적 소자 있으면 그래프 표시 */
          return;
        }

        /* ── 비유 모드 진입 (AC 차단 포함) ── */
        if(next==='analogy'){
          var hasAC=App.State.components.some(function(c){return c.type===TYPE.AC_SOURCE;});
          if(hasAC){
            showErrorToast('교류 전원이 포함된 회로는 수로 비유를 지원하지 않습니다.');
            _updateModeBar(cur);
            return;
          }
          App.State.mode='analogy';
          _updateModeBar('analogy');
          _setAnalogyUIHidden(true);    /* 패널·버튼 숨김 (#6) */
          App.AnalogyRenderer.start();
          return;
        }

        /* ── 촬영 모드 ── */
        if(next==='capture'){
          _captureCircuit();
          _updateModeBar(cur);
          return;
        }
      });
    });
  }

  function placeComponent(item,px,py){
    var g=App.Geo.pixelToGrid(px,py);
    var cg=App.Geo.clampGrid(g.gridX,g.gridY);
    if(App.State.isOccupied(cg.gridX,cg.gridY,null)){
      var f=_findEmpty(cg.gridX,cg.gridY);if(!f){showErrorToast('배치 공간이 없습니다.');return;}cg=f;
    }
    _place(item,cg.gridX,cg.gridY);
  }

  function addComponentCenter(item){
    var c=document.getElementById('canvas-container');
    var g=App.Geo.pixelToGrid(c.clientWidth/2,c.clientHeight/2);
    var f=_findEmpty(g.gridX,g.gridY);if(!f){showErrorToast('배치 공간이 없습니다.');return;}
    _place(item,f.gridX,f.gridY);
  }

  function _findEmpty(gx,gy){
    for(var r=0;r<=15;r++){
      for(var dg=-r;dg<=r;dg++){for(var dr=-r;dr<=r;dr++){
        if(Math.abs(dg)!==r&&Math.abs(dr)!==r) continue;
        var cg=App.Geo.clampGrid(gx+dg,gy+dr);
        if(!App.State.isOccupied(cg.gridX,cg.gridY,null)) return cg;
      }}
    }return null;
  }

  function _place(item,gx,gy){
    var comp={id:App.State.genId(),type:item.type,gridX:gx,gridY:gy,rotation:0,value:item.defValue,value2:item.defValue2,label:''};
    App.State.addComponent(comp);          // state:changed emit
    App.State.autoConnectAdjacent(comp.id); // 인접 포트 자동 연결 (중복 emit 무해)
    App.State.selectedId=comp.id;
    App.PropPanel.show(comp.id);
    App.EditRenderer.startSelAnimation();
  }

  /* ── 모바일 전용 UX 설정 (≤480px 또는 모바일 UA) ──────────────────
   * 햄버거 사이드바, 인포/그래프 플로팅 버튼, 패널 슬라이드업,
   * 터치 전파 차단, 토글 버튼 터치 동기화 등. */
  function _setupMobileUX(){
    /* ── 1. 햄버거 사이드바 ── */
    var hbBtn=document.getElementById('hamburger-btn');
    var sbOvl=document.getElementById('sidebar-overlay');
    var sb   =document.getElementById('sidebar');
    hbBtn.style.display='flex';
    function _openSidebar(){sb.classList.add('mobile-open');sbOvl.classList.add('visible');}
    function _closeSidebar(){sb.classList.remove('mobile-open');sbOvl.classList.remove('visible');}
    hbBtn.addEventListener('click',function(e){e.stopPropagation();sb.classList.contains('mobile-open')?_closeSidebar():_openSidebar();});
    sbOvl.addEventListener('click',_closeSidebar);
    App.Events.on('component:placed',_closeSidebar);

    /* ── 2. 인포 버튼 (스타일은 CSS §12에 정의 — 여기선 표시만 토글) ── */
    var infoBtn=document.getElementById('mobile-info-btn');
    App.Events.on('state:changed',function(){
      var sel=App.State.selectedId;
      infoBtn.style.display=sel?'flex':'none';
      if(!sel) document.getElementById('prop-panel').classList.remove('visible');
    });

    var _origShow=App.PropPanel.show.bind(App.PropPanel);

    /* 인포 버튼 클릭: 속성 패널 토글 */
    infoBtn.addEventListener('click',function(e){
      e.stopPropagation();
      var pp=document.getElementById('prop-panel');
      var sel=App.State.selectedId;
      if(pp.classList.contains('visible')){
        pp.classList.remove('visible');
      } else if(sel){
        /* 먼저 visible로 만든 뒤 내용 갱신 (show 재정의가 visible 체크) */
        pp.classList.add('visible');
        _origShow(sel);
      }
    });

    /* 소자 선택 시 패널 자동으로 안 뜨게 — show/refresh 재정의 */
    App.PropPanel.show=function(id){
      var pp=document.getElementById('prop-panel');
      if(pp.classList.contains('visible')) _origShow(id);
    };
    var _origRefresh=App.PropPanel.refresh.bind(App.PropPanel);
    App.PropPanel.refresh=function(){
      var pp=document.getElementById('prop-panel');
      if(pp.classList.contains('visible')&&App.State.selectedId) _origRefresh();
    };

    /* ── 3. 터치 전파 차단 (패널/팝업 → 캔버스 누출 방지) ── */
    _blockPropagation(document.getElementById('prop-panel'), _TOUCH_EVENTS);
    _blockPropagation(document.getElementById('transient-panel'), _TOUCH_EVENTS);
    _blockPropagation(document.getElementById('val-popup'), _TOUCH_EVENTS);

    /* ── 4. 그래프 토글 버튼 ── */
    var graphBtn=document.getElementById('mobile-graph-btn');
    function _syncGraphBtn(){
      var params=App.TransientGraph._extractParams?App.TransientGraph._extractParams():null;
      if(params){
        graphBtn.style.display='flex';
        var tp=document.getElementById('transient-panel');
        graphBtn.classList.toggle('graph-active', tp&&tp.classList.contains('visible'));
      } else {
        graphBtn.style.display='none';
        App.TransientGraph.hide();
      }
    }
    App.Events.on('solver:done', _syncGraphBtn);
    graphBtn.addEventListener('click',function(e){
      e.stopPropagation();
      var tp=document.getElementById('transient-panel');
      if(tp&&tp.classList.contains('visible')){
        App.TransientGraph.hide();
        graphBtn.classList.remove('graph-active');
      } else {
        App.TransientGraph.show();
        graphBtn.classList.add('graph-active');
      }
    });

    /* ── 5. 배경 탭 → 속성 패널 닫기 ──
     * onPointerDown(먼저 등록됨)이 선택을 먼저 처리하므로, 이 리스너가
     * 실행될 때 selectedId 는 이미 확정돼 있다. 소자/도선을 탭하면
     * selectedId 가 설정되어 패널을 유지하고, 빈 곳을 탭한 경우에만 닫는다.
     * (이 조건이 없으면 소자 탭 시 패널이 떴다가 즉시 닫히는 버그 발생) */
    document.getElementById('canvas-main').addEventListener('pointerdown',function(){
      if(App.State.selectedId==null){
        document.getElementById('prop-panel').classList.remove('visible');
      }
    },{passive:true});

    /* ── 6. mode-bar / undo-bar 수직 분리 (CSS와 일치) ── */
    var modeBarEl=document.getElementById('mode-bar');
    var undoBarEl=document.getElementById('undo-bar');
    if(modeBarEl) modeBarEl.style.bottom='58px';
    if(undoBarEl) undoBarEl.style.bottom='8px';

    /* ── 7. 가시 토글 버튼 터치 동기화 ──
     * click 리스너만으론 모바일에서 active 클래스가 안 맞는 문제 보정 */
    ['vis-arrows','vis-badges','vis-labels'].forEach(function(btnId){
      var btn=document.getElementById(btnId);
      if(!btn) return;
      btn.addEventListener('touchend',function(e){
        e.preventDefault();
        if(btn.style.pointerEvents==='none') return;  /* AC 화살표 비활성 */
        var prop=btnId==='vis-arrows'?'showArrows':btnId==='vis-badges'?'showBadges':'showLabels';
        App.State[prop]=!App.State[prop];
        btn.classList.toggle('active',App.State[prop]);
        App.EditRenderer.scheduleRender();
      },{passive:false});
    });
  }

  function init(){
    _resizeCanvases();
    App.GridRenderer.init();App.EditRenderer.init();App.Interaction.init();App.PropPanel.init();
    App.State.initViewTransform();

    App.Events.on('viewport:changed',function(){App.GridRenderer.render();App.EditRenderer.scheduleRender();});
    App.Events.on('state:changed',function(){App.EditRenderer.scheduleRender();App.PropPanel.refresh();App.Solver.run();});
    App.Events.on('solver:done',function(){App.PropPanel.refresh();App.EditRenderer.scheduleRender();});

    window.addEventListener('resize',function(){_resizeCanvases();App.Geo.clampOffset();App.Events.emit('viewport:changed');});

    _buildSidebar();_setupModeBar();App.Events.emit('viewport:changed');
    App.TransientGraph.init();
    App.ValPopup.init();

    /* ── 모바일 UX ── */
    var _isMobile=window.innerWidth<=480||/Android|iPhone|iPod|Mobile/i.test(navigator.userAgent);
    if(_isMobile) _setupMobileUX();

    /* ── Undo/Redo 버튼 연결 ── */
    var btnUndo=document.getElementById('btn-undo');
    var btnRedo=document.getElementById('btn-redo');
    function _refreshUndoBtns(){
      btnUndo.disabled=!App.State.canUndo();
      btnRedo.disabled=!App.State.canRedo();
    }
    btnUndo.addEventListener('click',function(){App.State.undo();App.EditRenderer.stopSelAnimation();App.PropPanel.refresh();_refreshUndoBtns();});
    btnRedo.addEventListener('click',function(){App.State.redo();App.EditRenderer.stopSelAnimation();App.PropPanel.refresh();_refreshUndoBtns();});
    App.Events.on('state:changed',_refreshUndoBtns);
    _refreshUndoBtns();

    _setupVisBtns();

    console.log('[Circuit Sim] 초기화 완료');
  }

  /* ── 가시 토글 버튼(화살표/배지/라벨) 연결 ── */
  function _setupVisBtns(){
    function _makeToggle(btnId, prop){
      var btn=document.getElementById(btnId);
      if(!btn) return;
      function _sync(){btn.classList.toggle('active', App.State[prop]);}
      btn.addEventListener('click',function(){
        App.State[prop]=!App.State[prop];
        _sync();
        App.EditRenderer.scheduleRender();
      });
      _sync();
    }
    _makeToggle('vis-arrows','showArrows');
    _makeToggle('vis-badges','showBadges');
    _makeToggle('vis-labels','showLabels');

    /* ── AC 감지 시 화살표 버튼 자동 비활성화 ── */
    function _syncArrowsForAC(){
      var sr = App.State.solverResult;
      var isAC = !!(sr && sr.acPhasor);
      var btn  = document.getElementById('vis-arrows');
      if(!btn) return;
      if(isAC){
        App.State.showArrows = false;
        btn.classList.remove('active');
        btn.style.opacity       = '0.25';
        btn.style.cursor        = 'not-allowed';
        btn.style.pointerEvents = 'none';
        btn.title               = 'AC 회로에서는 화살표가 표시되지 않습니다';
      } else {
        btn.style.opacity       = '';
        btn.style.cursor        = '';
        btn.style.pointerEvents = '';
        btn.title               = '전류 방향 화살표 표시/숨김';
        App.State.showArrows = false;
        btn.classList.remove('active');
      }
      App.EditRenderer.scheduleRender();
    }
    App.Events.on('solver:done', _syncArrowsForAC);
    _syncArrowsForAC();
  }

  return{init,placeComponent,addComponentCenter};
})();

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',function(){App.Main.init();});
else App.Main.init();

}());
</script>
